# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: xbps-uunshare [OPTIONS] [--] <dir> <cmd> [<cmdargs>]
description: XBPS utility to chroot and bind mount with Linux user namespaces
flags:
    -b, --bind-rw=: Bind mounts <src> into <dir>/<dest> (read-write)
    -h, --help: Show usage
    -v, --verbose: Show XBPS version
