# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: themes
description: Manage kitty color schemes easily
flags:
    --cache-age=: Check for new themes only after the specified number of days. A value of zero will always check for new themes. A negative value will never check for new themes, instead raising an error if a local copy of the themes is not available.
    --config-file-name=: The name or path to the config file to edit. Relative paths are interpreted with respect to the kitty config directory. By default the kitty config file, kitty.conf is edited. This is most useful if you add include themes.conf to your kitty.conf and then have the kitten operate only on themes.conf, allowing kitty.conf to remain unchanged.
    --dump-theme: When running non-interactively, dump the specified theme to STDOUT instead of changing kitty.conf.
    --reload-in=: By default, this kitten will signal only the parent kitty instance it is running in to reload its config, after making changes. Use this option to instead either not reload the config at all or in all running kitty instances.
    -h, --help: Show help for this command

documentation:
  command: >-
    Browse, preview, and install kitty color themes from the community collection.
