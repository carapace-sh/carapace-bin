# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: hints
description: Select text from the screen using the keyboard
flags:
    --add-trailing-space=: Add trailing space after matched text. Defaults to auto, which adds the space when used together with --multiple.
    --alphabet=: The list of characters to use for hints. The default is to use numbers and lowercase English alphabets. Specify your preference as a string of characters. Note that you need to specify the --hints-offset as zero to use the first character to highlight the first match, otherwise it will start with the second character by default.
    --ascending: Make the hints increase from top to bottom, instead of decreasing from top to bottom.
    --customize-processing=: Name of a python file in the kitty config directory which will be imported to provide custom implementations for pattern finding and performing actions on selected matches. You can also specify absolute paths to load the script from elsewhere.
    --hints-background-color=: The background color for hints. You can use color names or hex values. For the eight basic named terminal colors you can also use the bright- prefix to get the bright variant of the color.
    --hints-foreground-color=: The foreground color for hints. You can use color names or hex values. For the eight basic named terminal colors you can also use the bright- prefix to get the bright variant of the color.
    --hints-offset=: The offset (from zero) at which to start hint numbering. Note that only numbers greater than or equal to zero are respected.
    --hints-text-color=: The foreground color for text pointed to by the hints. You can use color names or hex values. For the eight basic named terminal colors you can also use the bright- prefix to get the bright variant of the color. The default is to pick a suitable color automatically.
    --linenum-action=: Where to perform the action on matched errors. self means the current window, window a new kitty window, tab a new tab, os_window a new OS window and background run in the background. remote-control is like background but the program can use kitty remote control without needing to turn on remote control globally.
    --minimum-match-length=: The minimum number of characters to consider a match.
    --multiple: Select multiple matches and perform the action on all of them together at the end. In this mode, press Esc to finish selecting.
    --multiple-joiner=: 'String for joining multiple selections when copying to the clipboard or inserting into the terminal. The special values are: space - a space character, newline - a newline, empty - an empty joiner, json - a JSON serialized list, auto - an automatic choice, based on the type of text being selected. In addition, integers are interpreted as zero-based indices into the list of selections. You can use 0 for the first selection and -1 for the last.'
    --program=*: 'What program to use to open matched text. Defaults to the default open program for the operating system. Various special values are supported: - (paste into terminal), @ (copy to clipboard), * (copy to primary selection), @NAME (copy to specified buffer), default (run default open program), launch (run the launch command). Can be specified multiple times to run multiple programs.'
    --regex=: The regular expression to use when option --type is set to regex, in Perl 5 syntax. If you specify a numbered group in the regular expression, only the group will be matched. This allows you to match text ignoring a prefix/suffix, as needed. The default expression matches lines.
    --type=: 'The type of text to search for. A value of linenum is special, it looks for error messages using the pattern specified with --regex, which must have the named groups: path and line. If not specified, will look for path:line. The --linenum-action option controls where to display the selected error message, other options are ignored.'
    --url-excluded-characters=: Characters to exclude when matching URLs. Defaults to the list of characters defined by the url_excluded_characters option in kitty.conf. The syntax for this option is the same as for url_excluded_characters.
    --url-prefixes=: Comma separated list of recognized URL prefixes. Defaults to the list of prefixes defined by the url_prefixes option in kitty.conf.
    --window-title=: The title for the hints window, default title is based on the type of text being hinted.
    --word-characters=: Characters to consider as part of a word. In addition, all characters marked as alphanumeric in the Unicode database will be considered as word characters. Defaults to the select_by_word_characters option from kitty.conf.
    -h, --help: Show help for this command

documentation:
  command: >-
    Select text from the terminal screen using keyboard shortcuts. Find URLs, files, hashes, and more.
