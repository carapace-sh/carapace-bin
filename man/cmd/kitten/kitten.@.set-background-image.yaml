# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-background-image
description: Set the background image
flags:
    --layout=: How the image should be displayed
    --no-response: Don't wait for a response from kitty
    -a, --all: By default, background image is only changed for the currently active OS window
    -c, --configured: Change the configured background image which is used for new OS windows
    -h, --help: Show help for this command
    -m, --match=: The window to match
