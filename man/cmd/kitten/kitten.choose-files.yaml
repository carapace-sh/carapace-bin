# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: choose-files
description: Choose files, fast
flags:
    --clear-cache: Clear the caches used by this kitten.
    --config=: Specify a path to the configuration file(s) to use. All configuration files are merged onto the builtin choose-files.conf, overriding the builtin values. This option can be specified multiple times to read multiple configuration files in sequence, which are merged. Use the special value NONE to not load any config file.
    --display-title: Show the window title at the top, useful when this kitten is used in an OS window without a title bar.
    --file-filter=*: 'A list of filters to restrict the displayed files. Can be either mimetypes, or glob style patterns. Can be specified multiple times. The syntax is type:expression:Descriptive Name. For example: mime:image/png:Images and mime:image/gif:Images and glob:*.[tT][xX][Tt]:Text files.'
    --mode=: The type of object(s) to select
    --output-format=: The format in which to write the output. The text format is absolute paths separated by newlines. The shell format is quoted absolute paths separated by spaces, quoting is done only if needed. The shell-relative format is the same as shell except it returns paths relative to the starting directory.
    --suggested-save-file-name=: A suggested name when picking a save file.
    --suggested-save-file-path=: Path to an existing file to use as the save file.
    --title=: Window title to use for this chooser
    --write-output-to=: Path to a file to which the output is written in addition to STDOUT.
    --write-pid-to=: Path to a file to which to write the process ID (PID) of this process to.
    -h, --help: Show help for this command
    -o, --override=*: 'Override individual configuration options, can be specified multiple times. Syntax: name=value.'

documentation:
  command: >-
    Open a fast file picker overlay in kitty for selecting files.
