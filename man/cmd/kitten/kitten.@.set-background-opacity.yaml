# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-background-opacity
description: Set the background opacity
flags:
    --toggle: When specified, the background opacity for the matching OS windows will be reset to default if it is currently equal to the specified value
    -a, --all: By default, background opacity are only changed for the currently active OS window
    -h, --help: Show help for this command
    -m, --match=: The window to match
    -t, --match-tab=: The tab to match
