# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: send-text
description: Send arbitrary text to specified windows
flags:
    --all: Match all windows
    --bracketed-paste=: When sending text to a window, wrap the text in bracketed paste escape codes
    --exclude-active: Do not send text to the active window, even if it is one of the matched windows
    --from-file=: Path to a file whose contents you wish to send
    --stdin: Read the text to be sent from stdin
    -h, --help: Show help for this command
    -m, --match=: The window to match
    -t, --match-tab=: The tab to match
