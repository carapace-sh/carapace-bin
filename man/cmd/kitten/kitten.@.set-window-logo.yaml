# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-window-logo
description: Set the window logo
flags:
    --alpha=: The amount the window logo should be faded into the background
    --no-response: Don't wait for a response from kitty
    --position=: The position for the window logo
    --self: Act on the window this command is run in, rather than the active window
    -h, --help: Show help for this command
    -m, --match=: The window to match
