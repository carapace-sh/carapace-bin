# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: diff
description: Pretty, side-by-side diffing of files and images
flags:
    --config=*: Specify a path to the configuration file(s) to use. All configuration files are merged onto the builtin diff.conf, overriding the builtin values. This option can be specified multiple times to read multiple configuration files in sequence, which are merged. Use the special value NONE to not load any config file.
    --context=: Number of lines of context to show between changes. Negative values use the number set in diff.conf.
    -h, --help: Show help for this command
    -o, --override=: 'Override individual configuration options, can be specified multiple times. Syntax: name=value. For example: -o background=gray'

documentation:
  command: >-
    Display side-by-side diffs of files with syntax highlighting and image comparison support.
