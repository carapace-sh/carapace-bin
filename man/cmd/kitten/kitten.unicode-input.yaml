# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: unicode-input
description: Browse and select unicode characters by name
flags:
    --emoji-variation=: Whether to use the textual or the graphical form for emoji. By default the default form specified in the Unicode standard for the symbol is used.
    --tab=: The initial tab to display. Defaults to using the tab from the previous kitten invocation.
    -h, --help: Show help for this command

documentation:
  command: >-
    Browse and select Unicode characters by name for input into the terminal.
