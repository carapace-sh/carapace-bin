# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-colors
description: Set terminal colors
flags:
    --reset: Restore all colors to the values they had at kitty startup
    -a, --all: By default, colors are only changed for the currently active window
    -c, --configured: Also change the configured colors
    -h, --help: Show help for this command
    -m, --match=: The window to match
    -t, --match-tab=: The tab to match
