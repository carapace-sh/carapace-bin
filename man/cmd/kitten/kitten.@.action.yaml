# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: action
description: Run the specified mappable action
flags:
    --no-response: Don't wait for a response indicating the success of the action
    --self: Run the action on the window this command is run in instead of the active window
    -h, --help: Show help for this command
    -m, --match=: The window to match
