# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: detach-window
description: Detach the specified windows and place them in a different/new tab
flags:
    --self: Detach the window this command is run in, rather than the active window
    --stay-in-tab: Keep the focus on a window in the currently focused tab after moving the specified windows
    -h, --help: Show help for this command
    -m, --match=: The window to match
    -t, --target-tab=: The tab to match
