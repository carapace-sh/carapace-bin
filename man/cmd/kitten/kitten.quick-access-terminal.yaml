# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: quick-access-terminal
description: A quick access terminal window that you can bring up instantly with a keypress or a command.
flags:
    --debug-input: For debugging interactions with the compositor/window manager.
    --debug-rendering: For debugging interactions with the compositor/window manager.
    --detach: Detach from the controlling terminal, if any, running in an independent child process, the parent process exits immediately.
    --detached-log=: Path to a log file to store STDOUT/STDERR when using --detach
    --instance-group=: The unique name of this quick access terminal Use a different name if you want multiple such terminals.
    -c, --config=*: Specify a path to the configuration file(s) to use. All configuration files are merged onto the builtin quick-access-terminal.conf, overriding the builtin values. This option can be specified multiple times to read multiple configuration files in sequence, which are merged. Use the special value NONE to not load any config file.
    -h, --help: Show help for this command
    -o, --override=*: 'Override individual configuration options, can be specified multiple times. Syntax: name=value. For example: -o lines=12'
