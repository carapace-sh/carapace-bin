# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: get-text
description: Get text from the specified window
flags:
    --add-cursor: Add ANSI escape codes specifying the cursor position and style to the end of the text
    --add-wrap-markers: Add carriage returns at every line wrap location
    --ansi: Include the ANSI formatting escape codes for colors, bold, italic, etc.
    --clear-selection: Clear the selection in the matched window, if any
    --extent=: What text to get
    --self: Get text from the window this command is run in, rather than the active window
    -h, --help: Show help for this command
    -m, --match=: The window to match
