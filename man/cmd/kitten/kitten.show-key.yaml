# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-key
description: Show the codes generated by the terminal for key presses in various keyboard modes
flags:
    -h, --help: Show help for this command
    -m, --key-mode=: The keyboard mode to use when showing keys. normal mode is with DECCKM reset and application mode is with DECCKM set. kitty is the full kitty extended keyboard protocol.

documentation:
  command: >-
    Display the key codes generated by the terminal for keypresses in different keyboard modes.
