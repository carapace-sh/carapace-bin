# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-spacing
description: Set window paddings and margins
flags:
    -a, --all: By default, settings are only changed for the currently active window
    -c, --configured: Also change the configured paddings and margins
    -h, --help: Show help for this command
    -m, --match=: The window to match
    -t, --match-tab=: The tab to match
