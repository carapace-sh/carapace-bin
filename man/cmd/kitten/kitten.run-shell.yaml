# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: run-shell
description: Run the user's shell with shell integration enabled
flags:
    --cwd=: The working directory to use when executing the shell.
    --env=*: Specify an env var to set before running the shell. Of the form KEY=VAL. Can be specified multiple times. If no = is present KEY is unset.
    --inject-self-onto-path=: Add the directory containing this kitten binary to PATH. Directory is added only if not already present.
    --shell-integration=: Specify a value for the shell_integration option, overriding the one from kitty.conf.
    --shell=: Specify the shell command to run. The default value of . will use the parent shell if recognized, falling back to the value of the shell option from kitty.conf.
    -h, --help: Show help for this command
