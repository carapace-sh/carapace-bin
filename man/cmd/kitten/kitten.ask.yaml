# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: ask
description: Ask the user for input
flags:
    --hidden-text-placeholder=: The text in the message to be replaced by hidden text. The hidden text is read via STDIN.
    --title=: The title for the window in which the question is displayed. Only implemented for yesno and choices types.
    --unhide-key=: The key to be pressed to unhide hidden text
    --window-title=: The title for the window in which the question is displayed. Only implemented for yesno and choices types.
    -c, --choice=: 'A choice for the choices type. Can be specified multiple times. Every choice has the syntax: ``letter[;color]:text``, where text is the choice text and letter is the selection key. letter is a single letter belonging to text. This letter is highlighted within the choice text. There can be an optional color specification after the letter to indicate what color it should be. For example: y:Yes and n;red:No'
    -d, --default=: A default choice or text. If unspecified, it is y for the type yesno, the first choice for choices and empty for others types. The default choice is selected when the user presses the Enter key.
    -h, --help: Show help for this command
    -m, --message=: The message to display to the user. If not specified a default message is shown.
    -n, --name=: The name for this question. Used to store history of previous answers which can be used for completions and via the browse history readline bindings.
    -p, --prompt=: The prompt to use when inputting a line of text or a password.
    -t, --type=: Type of input. Defaults to asking for a line of text.

documentation:
  command: >-
    Prompt the user for input in a floating kitty window, useful for scripts.
