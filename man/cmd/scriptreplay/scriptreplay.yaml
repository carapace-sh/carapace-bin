# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: scriptreplay
description: play back typescripts, using timing information
flags:
    --summary: display overview about recorded session and exit
    -B, --log-io=: script stdin and stdout log file
    -I, --log-in=: script stdin log file
    -O, --log-out=: script stdout log file (default)
    -T, --log-timing=: alias to -t
    -V, --version: display version
    -c, --cr-mode=: CR char mode
    -d, --divisor=: speed up or slow down execution with time divisor
    -h, --help: display this help
    -m, --maxdelay=: wait at most this many seconds between updates
    -s, --typescript=: deprecated alias to -O
    -t, --timing=: script timing log file
    -x, --stream=: stream type
