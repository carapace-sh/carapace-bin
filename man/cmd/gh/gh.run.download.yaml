# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: download [<run-id>]
description: Download artifacts generated by a workflow run
flags:
    -D, --dir=: The directory to download artifacts into
    -n, --name=*: Download artifacts that match any of the given names
    -p, --pattern=*: Download artifacts that match a glob pattern
documentation:
    command: >-
        Download artifacts generated by a GitHub Actions workflow run. Contents are extracted under separate directories based on artifact name. If only a single artifact is specified, it is extracted into the current directory.
