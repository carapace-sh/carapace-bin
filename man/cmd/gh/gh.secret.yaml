# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: secret <command>
description: Manage GitHub secrets
persistentdocumentation:
    command: |
        Secrets can be set at the repository, environment, or organization level
        for use in GitHub Actions, Agents, or Dependabot. User, organization, and
        repository secrets can be set for use in GitHub Codespaces. Environment
        secrets are scoped to specific deployment environments. Run `gh help secret set`
        to learn how to get started.
flags:
    -R, --repo=: Select another repository using the `[HOST/]OWNER/REPO` format
