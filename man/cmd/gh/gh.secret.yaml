# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: secret <command>
description: Manage GitHub secrets
persistentflags:
    -R, --repo=: Select another repository using the `[HOST/]OWNER/REPO` format
documentation:
    command: >-
        Manage secrets at the repository, organization, or environment level for use in GitHub Actions, Agents, Dependabot, or Codespaces. Secret values are locally encrypted before being sent to GitHub.
