# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete <secret-name>
aliases:
    - remove
description: Delete secrets
flags:
    -a, --app=: 'Delete a secret for a specific application: {actions|agents|codespaces|dependabot}'
    -e, --env=: Delete a secret for an environment
    -o, --org=: Delete a secret for an organization
    -u, --user: Delete a secret for your user
documentation:
    command: >-
        Delete a secret at the repository, environment, organization, or user level.
