# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create <keyPrefix> <urlTemplate>
aliases:
    - new
description: Create a new autolink reference
flags:
    -n, --numeric: Mark autolink as numeric
documentation:
    command: >-
        Create an autolink reference for a repository. Autolinks automatically link references in issues and PRs to external services.
