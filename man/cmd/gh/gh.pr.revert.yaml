# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: revert {<number> | <url> | <branch>}
description: Revert a pull request
group: Targeted commands
flags:
    -F, --body-file=: Read body text from `file` (use "-" to read from standard input)
    -b, --body=: Body for the revert pull request
    -d, --draft: Mark revert pull request as a draft
    -t, --title=: Title for the revert pull request
documentation:
    command: >-
        Create a new pull request that reverts the changes from a merged PR.
