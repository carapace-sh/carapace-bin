# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable [<workflow-id> | <workflow-name>]
description: Enable a workflow
documentation:
    command: |
        Enable a workflow that was previously disabled. Pass the workflow ID or
        name as argument. Once enabled, the workflow will run normally triggered
        by its configured events (push, pull_request, schedule, etc.).
