# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-default [<repository>]
description: Configure default repository for this directory
group: Targeted commands
flags:
    -u, --unset: Unset the current default repository
    -v, --view: View the current default repository
documentation:
    command: >-
        Set the default remote repository for API queries on a locally cloned repository. gh uses the default repository for viewing and creating PRs, issues, releases, and working with Actions.
