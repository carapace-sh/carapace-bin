# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: pr <command>
description: Manage pull requests
group: core
persistentdocumentation:
    command: |
        Work with GitHub pull requests. Create PRs with `gh pr create`, view them
        with `gh pr view`, and manage their lifecycle (merge, close, reopen, ready).
        Use `-R` or `--repo` to operate on PRs in a different repository.
flags:
    -R, --repo=: Select another repository using the `[HOST/]OWNER/REPO` format
