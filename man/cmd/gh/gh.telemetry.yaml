# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: telemetry
description: Information about telemetry in gh
hidden: true
documentation:
    command: |
        gh collects telemetry to help us understand how the CLI is being used
        and to improve it. To learn more about what data is collected, how it
        is used, and how to opt out, see: https://cli.github.com/telemetry
