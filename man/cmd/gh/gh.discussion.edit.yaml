# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: edit {<number> | <discussion-url>} [flags]
description: Edit a discussion (preview)
group: Targeted commands
documentation:
    command: Edit a discussion's title, body, or category.
flags:
    --add-label=*: Add labels by `name`
    --remove-label=*: Remove labels by `name`
    -F, --body-file=: Read body text from file (use "-" to read from standard input)
    -b, --body=: New body for the discussion
    -c, --category=: New category name or slug for the discussion
    -t, --title=: New title for the discussion
persistentflags:
    -R, --repo=: Select another repository using the `[HOST/]OWNER/REPO` format
