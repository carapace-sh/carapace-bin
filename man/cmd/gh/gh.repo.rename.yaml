# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: rename [<new-name>]
description: Rename a repository
group: Targeted commands
flags:
    --confirm&: Skip confirmation prompt
    -y, --yes: Skip the confirmation prompt
persistentflags:
    -R, --repo=: Select another repository using the `[HOST/]OWNER/REPO` format
documentation:
    command: >-
        Rename a GitHub repository. The argument is the new name without the owner. By default, the current repository is renamed. To transfer ownership, additional steps are required on github.com.
