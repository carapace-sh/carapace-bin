# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: variable <command>
description: Manage GitHub Actions variables
persistentflags:
    -R, --repo=: Select another repository using the `[HOST/]OWNER/REPO` format
documentation:
    command: >-
        Manage variables at the repository, environment, or organization level for use in GitHub Actions or Dependabot.
