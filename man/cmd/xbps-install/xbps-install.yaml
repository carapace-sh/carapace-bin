# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: xbps-install [OPTIONS] [PKGNAME...]
description: XBPS utility to (re)install and update packages
flags:
    --reproducible: Enable reproducible mode in pkgdb
    --staging: Enable use of staged packages
    -A, --automatic: Set automatic installation mode
    -C, --config=: Path to confdir (xbps.d)
    -D, --download-only: Download packages and check integrity, nothing else
    -I, --ignore-file-conflicts: Ignore detected file conflicts
    -M, --memory-sync: Remote repository data is fetched and stored in memory, ignoring on-disk repodata archives
    -R, --repository=*: Add repository to the top of the list. This option can be specified multiple times
    -S, --sync: Sync remote repository index
    -U, --unpack-only: Unpack packages in transaction, do not configure them
    -V, --version: Show XBPS version
    -c, --cachedir=: Path to cachedir
    -d, --debug: Debug mode shown to stderr
    -f, --force*: Force package re-installation. If specified twice, all files will be overwritten.
    -h, --help: Show usage
    -i, --ignore-conf-repos: Ignore repositories defined in xbps.d
    -n, --dry-run: Dry-run mode
    -r, --rootdir=: Full path to rootdir
    -v, --verbose: Verbose messages
    -y, --yes: Assume yes to all questions
