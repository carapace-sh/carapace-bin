# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all variables
flags:
    --exports-only: Show only exported variables
    --shell-only: Show only non-exported (shell) variables
    --sort-by=: Sort results by field
    -h, --help: Print help (see more with '--help')
    -n, --name=: Filter variables by name (substring match)
    -r, --reverse: Sort in reverse (descending) order
    -v, --value=: Filter variables by value (substring match)
