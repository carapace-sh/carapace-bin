# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: node
description: server-side JavaScript runtime
flags:
    --abort-on-uncaught-exception: aborting instead of exiting causes a core file to be generated for analysis
    --allow-addons: allow use of addons when any permissions are set
    --allow-child-process: allow use of child process when any permissions are set
    --allow-fs-read=: allow permissions to read the filesystem
    --allow-fs-write=: allow permissions to write in the filesystem
    --allow-wasi: allow wasi when any permissions are set
    --allow-worker: allow worker threads when any permissions are set
    --build-snapshot: Generate a snapshot blob when the process exits
    --completion-bash: print source-able bash completion script
    --cpu-prof: Start the V8 CPU profiler on start up
    --cpu-prof-dir=: Directory where the V8 profiles generated by --cpu-prof will be placed
    --cpu-prof-interval=: specified sampling interval in microseconds for the V8 CPU profile
    --cpu-prof-name=: specified file name of the V8 CPU profile generated with --cpu-prof
    --debug-port: set host:port for inspector
    --diagnostic-dir=: set dir for all output files
    --disable-proto=: disable Object.prototype.__proto__
    --disable-sigusr1: Disable inspector thread to be listening for SIGUSR1 signal
    --disable-warning=: silence specific process warnings
    --disallow-code-generation-from-strings: disallow eval and friends
    --dns-result-order=: set default value of verbatim in dns.lookup
    --enable-etw-stack-walking: provides heap data to ETW Windows native tracing
    --enable-fips: enable FIPS crypto at startup
    --enable-network-family-autoselection: Enable network address family autodetection algorithm
    --enable-source-maps: Source Map V3 support for stack traces
    --entry-url: Treat the entrypoint as a URL
    --env-file-if-exists=: set environment variables from supplied file
    --env-file=: set environment variables from supplied file
    --experimental-addon-modules: experimental import support for addons
    --experimental-config-file=: set config file from supplied file
    --experimental-default-config-file: set config file from default config file
    --experimental-eventsource: experimental EventSource API
    --experimental-import-meta-resolve: experimental ES Module import.meta.resolve() parentURL support
    --experimental-inspector-network-resource: experimental load network resources via the inspector
    --experimental-network-inspection: experimental network inspection support
    --experimental-print-required-tla: Print pending top-level await
    --experimental-sea-config=: Generate a blob that can be embedded into the single executable application
    --experimental-test-coverage: enable code coverage in the test runner
    --experimental-test-isolation: configures the type of test isolation used in the test runner
    --experimental-test-module-mocks: enable module mocking in the test runner
    --experimental-transform-types: enable transformation of TypeScript-onlysyntax into JavaScript code
    --experimental-vm-modules: experimental ES Module support in vm module
    --experimental-webstorage: experimental Web Storage API
    --experimental-worker-inspection: experimental worker inspection support
    --expose-gc: expose gc extension
    --force-context-aware: disable loading non-context-aware addons
    --force-fips: force FIPS crypto (cannot be disabled)
    --force-node-api-uncaught-exceptions-policy: enforces 'uncaughtException' event on Node API asynchronous callbacks
    --frozen-intrinsics: experimental frozen intrinsics support
    --heap-prof: Start the V8 heap profiler on start up, and write the heap profile to disk before exit
    --heap-prof-dir=: Directory where the V8 heap profiles generated by --heap-prof will be placed
    --heap-prof-interval=: specified sampling interval in bytes for the V8 heap profile generated
    --heap-prof-name=: specified file name of the V8 heap profile generated with --heap-prof
    --heapsnapshot-near-heap-limit=: Generate heap snapshots whenever V8 is approaching the heap limit
    --heapsnapshot-signal=: Generate heap snapshot on specified signal
    --icu-data-dir=: set ICU data load path to dir
    --import=: ES module to preload
    --input-type=: set module type for string input
    --insecure-http-parser: use an insecure HTTP parser that accepts invalid HTTP headers
    --inspect-port=: set host:port for inspector
    --inspect-publish-uid=: comma separated list of destinations for inspector
    --inspect-wait=: activate inspector on host:port and wait for debugger to be attached
    --inspect=: activate inspector on host:port
    --interpreted-frames-native-stack: help system profilers to translate JavaScript interpreted frames
    --jitless: disable runtime allocation of executable memory
    --loader=: use the specified module as a custom loader
    --localstorage-file=: file used to persist localStorage data
    --max-http-header-size=: set the maximum size of HTTP headers
    --max-old-space-size-percentage=: set V8's max old space size as a percentage of available memory
    --network-family-autoselection-attempt-timeout=: Sets the default value for the network family autoselection attempt timeout
    --no-addons: disable loading native addons
    --no-async-context-frame: Improve AsyncLocalStorage performance with AsyncContextFrame
    --no-deprecation: silence deprecation warnings
    --no-experimental-detect-module: when ambiguous modules fail to evaluate because they contain ES module syntax, try again to evaluate them as ES modules
    --no-experimental-global-navigator: expose experimental Navigator API on the global scope
    --no-experimental-repl-await: experimental await keyword support in REPL
    --no-experimental-require-module: Allow loading synchronous ES Modules in require()
    --no-experimental-sqlite: experimental node:sqlite module
    --no-experimental-strip-types: Experimental type-stripping for TypeScript files
    --no-extra-info-on-fatal-exception: hide extra information on fatal exception that causes exit
    --no-force-async-hooks-checks: disable checks for async_hooks
    --no-global-search-paths: disable global module search paths
    --no-network-family-autoselection: Disable network address family autodetection algorithm
    --no-warnings: silence all process warnings
    --node-memory-debug: Run with extra debug checks for memory leaks in Node.js itself
    --openssl-config=: load OpenSSL configuration from the specified file
    --openssl-legacy-provider: enable OpenSSL 3.0 legacy provider
    --openssl-shared-config: enable OpenSSL shared configuration
    --pending-deprecation: emit pending deprecation warnings
    --permission: enable the permission system
    --preserve-symlinks: preserve symbolic links when resolving
    --preserve-symlinks-main: preserve symbolic links when resolving the main module
    --prof: Generate V8 profiler output
    --prof-process: process V8 profiler output generated using --prof
    --redirect-warnings=: write warnings to file instead of stderr
    --report-compact: output compact single-line JSON
    --report-dir=: define custom report pathname
    --report-directory=: define custom report pathname
    --report-exclude-env: Exclude environment variables when generating report
    --report-exclude-network: exclude network interface diagnostics
    --report-filename=: define custom report file name
    --report-on-fatalerror: generate diagnostic report on fatal (internal) errors
    --report-on-signal: generate diagnostic report upon receiving signals
    --report-signal=: causes diagnostic report to be produced on provided signal
    --report-uncaught-exception: generate diagnostic report on uncaught exceptions
    --run=: Run a script specified in package.json
    --secure-heap-min=: minimum allocation size from the OpenSSL secure heap
    --secure-heap=: total size of the OpenSSL secure heap
    --snapshot-blob=: Path to the snapshot blob that's either the result of snapshotbuilding
    --test: launch test runner on startup
    --test-concurrency=: specify test runner concurrency
    --test-coverage-branches=: the branch coverage minimum threshold
    --test-coverage-exclude=: exclude files from coverage report that match this glob pattern
    --test-coverage-functions=: the function coverage minimum threshold
    --test-coverage-include=: include files in coverage report that match this glob pattern
    --test-coverage-lines=: the line coverage minimum threshold
    --test-force-exit: force test runner to exit upon completion
    --test-global-setup=: specifies the path to the global setup file
    --test-isolation=: configures the type of test isolation used in the test runner
    --test-name-pattern=: run tests whose name matches this regular expression
    --test-only: run tests with 'only' option set
    --test-reporter-destination=: report given reporter to the given destination
    --test-reporter=: report test output using the given reporter
    --test-rerun-failures=: specifies the path to the rerun state file
    --test-shard=: run test at specific shard
    --test-skip-pattern=: run tests whose name do not match this regular expression
    --test-timeout=: specify test runner timeout
    --test-update-snapshots: regenerate test snapshots
    --throw-deprecation: throw an exception on deprecations
    --title=: the process title to use on startup
    --tls-cipher-list=: use an alternative default TLS cipher list
    --tls-keylog=: log TLS decryption keys to named file for traffic analysis
    --tls-max-v1.2: set default TLS maximum to TLSv1.2
    --tls-max-v1.3: set default TLS maximum to TLSv1.3
    --tls-min-v1.0: set default TLS minimum to TLSv1.0
    --tls-min-v1.1: set default TLS minimum to TLSv1.1
    --tls-min-v1.2: set default TLS minimum to TLSv1.2
    --tls-min-v1.3: set default TLS minimum to TLSv1.3
    --trace-deprecation: show stack traces on deprecations
    --trace-env: Print accesses to the environment variables
    --trace-env-js-stack: Print accesses to the environment variables and the JavaScript stack trace
    --trace-env-native-stack: Print accesses to the environment variables and the native stack trace
    --trace-event-categories=: comma separated list of trace event categories to record
    --trace-event-file-pattern=: Template string specifying the filepath for the trace-events data
    --trace-exit: show stack trace when an environment exits
    --trace-promises: show stack traces on promise initialization and resolution
    --trace-require-module=: Print access to require(esm)
    --trace-sigint: enable printing JavaScript stacktrace on SIGINT
    --trace-sync-io: show stack trace when use of sync IO is detected after the first tick
    --trace-tls: prints TLS packet trace information to stderr
    --trace-uncaught: show stack traces for the `throw` behind uncaught exceptions
    --trace-warnings: show stack traces on process warnings
    --track-heap-objects: track heap object allocations for heap snapshots
    --unhandled-rejections=: define unhandled rejections behavior
    --use-bundled-ca: use bundled CA store (default)
    --use-env-proxy: parse proxy settings from HTTP_PROXY/HTTPS_PROXY/NO_PROXYenvironment variables
    --use-largepages=: Map the Node.js static code to large pages
    --use-openssl-ca: use OpenSSL's default CA store
    --use-system-ca: use system's CA store
    --v8-options: print V8 command line options
    --v8-pool-size=: set V8's thread pool size
    --watch: run in watch mode
    --watch-kill-signal=: kill signal to send to the process on watch mode restarts
    --watch-path=: path to watch
    --watch-preserve-output: preserve outputs on watch mode restart
    --zero-fill-buffers: automatically zero-fill all newly allocated Buffer and SlowBuffer instances
    -C, --conditions=: additional user conditions for conditional exports and imports
    -c, --check: syntax check script without executing
    -e, --eval=: evaluate script
    -h, --help: print node command line options
    -i, --interactive: always enter the REPL even if stdin does not appear to be a terminal
    -p, --print=: evaluate script and print result
    -r, --require=: CommonJS module to preload
    -v, --version: print Node.js version
