# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: jit-snapshot
description: Compile Dart to a JIT snapshot
flags:
    --verbosity=: Sets the verbosity level of the compilation.
    -h, --help: Print this usage information.
    -o, --output=: Write the output to <file name>.

documentation:
  command: >-
    Compile a Dart program to a JIT (just-in-time) snapshot that caches compilation results for faster subsequent runs.
