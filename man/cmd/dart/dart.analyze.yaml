# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: analyze
description: Analyze Dart code in a directory
flags:
    --fatal-infos: Treat info level issues as fatal.
    --fatal-warnings: Treat warning level issues as fatal.
    --no-fatal-warnings: Do not treat warning level issues as fatal.
    -h, --help: Print this usage information.

documentation:
  command: >-
    Analyze Dart source code for errors, warnings, and lints using the Dart analyzer. Without arguments, analyzes the current project.
