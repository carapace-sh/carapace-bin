# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: fix
description: Apply automated fixes to Dart source code
flags:
    --apply: Apply the proposed changes.
    -h, --help: Print this usage information.
    -n, --dry-run: Preview the proposed changes but make no changes.

documentation:
  command: >-
    Apply automated fixes to Dart source code. Repairs deprecated APIs, dead code, and style issues.
