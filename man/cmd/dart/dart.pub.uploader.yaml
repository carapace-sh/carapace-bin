# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: uploader
description: Manage uploaders for a package on pub.dartlang.org
flags:
    --package=: The package whose uploaders will be modified.
    -h, --help: Print this usage information.

documentation:
  command: >-
    Deprecated. Package uploaders are no longer managed from the command line. Manage uploaders from the Admin tab at `https://pub.dev/packages/<package>/admin`.
