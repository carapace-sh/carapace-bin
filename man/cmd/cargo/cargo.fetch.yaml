# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: fetch
description: Fetch dependencies of a package from the network
group: build
flags:
    --manifest-path=: Path to Cargo.toml
    --target=*: Fetch dependencies for the target triple
    -h, --help: Print help
documentation:
  command: |
    Fetch dependencies of a package from the network and place them into the
    local cache under `~/.cargo/registry/`. Does not build or compile anything.
    This is useful for pre-populating the local cache before offline builds
    with `--offline`, or for CI environments that need to cache dependencies.
