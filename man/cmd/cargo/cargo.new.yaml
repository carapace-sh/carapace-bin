# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: new
description: Create a new cargo package at <path>
group: package
flags:
    --bin: Use a binary (application) template [default]
    --edition=: Edition to set for the crate generated
    --lib: Use a library template
    --name=: Set the resulting package name, defaults to the directory name
    --registry=: Registry to use
    --vcs=: Initialize a new repository for the given version control system, overriding a global configuration.
    -h, --help: Print help
documentation:
  command: |
    Create a new cargo package at the specified path. Creates a directory with
    a basic `Cargo.toml` and source files. By default, creates a binary package
    (`--bin`), or use `--lib` for a library package. Use `--vcs` to initialize
    a version control repository (git, hg, pijul, vcs, or none). The `--edition`
    flag sets the Rust edition (e.g., 2015, 2018).
