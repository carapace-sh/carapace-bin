# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: info
description: Display information about a package
flags:
    --index=: Registry index URL to search packages in
    --registry=: Registry to search packages in
    -h, --help: Print help
documentation:
  command: |
    Display detailed information about a package from the registry. Shows
    the package description, keywords, categories, repository URL, and
    other metadata. Use `--registry` to query a different registry than
    the default (crates.io).
