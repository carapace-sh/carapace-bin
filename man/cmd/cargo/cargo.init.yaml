# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: init
description: Create a new cargo package in an existing directory
group: package
flags:
    --bin: Use a binary (application) template [default]
    --edition=: Edition to set for the crate generated
    --lib: Use a library template
    --name=: Set the resulting package name, defaults to the directory name
    --registry=: Registry to use
    --vcs=: Initialize a new repository for the given version control system, overriding a global configuration.
    -h, --help: Print help
documentation:
  command: |
    Create a new cargo package in an existing directory. Unlike `cargo new`,
    this does not create a new directory. Initializes a `Cargo.toml` and
    source files in the current directory. By default, creates a binary
    package (`--bin`), or use `--lib` for a library package.
