# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: copy
description: copy data from one CHD to another of the same type
flags:
    -c, --compression=: which compression codecs to use
    -f, --force: force overwriting an existing file
    -hs, --hunksize=: size of each hunk, in bytes
    -i, --input=: input file name
    -ib, --inputbytes=: effective length of input in bytes
    -ih, --inputhunks=: effective length of input in hunks
    -ip, --inputparent=: parent file name for input CHD
    -isb, --inputstartbyte=: starting byte offset within the input
    -ish, --inputstarthunk=: starting hunk offset within the input
    -np, --numprocessors=: limit the number of processors to use during compression
    -o, --output=: output file name
    -op, --outputparent=: parent file name for output CHD
