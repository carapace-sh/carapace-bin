# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: approve-scripts
description: Approve install scripts for specific dependencies
flags:
    --allow-scripts-pending: list packages with install scripts not yet covered by the allowScripts policy
    --allow-scripts-pin: write pinned entries when approving install scripts
    --json: output as json
    -a, --all: act on all packages with pending install scripts
