# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: xbps-reconfigure [OPTIONS] [PKGNAME...]
description: XBPS utility to configure installed packages
flags:
    --fulldeptree: Full dependency tree for -x/--deps
    --x, --deps: Also process dependencies for each package
    -C, --config=: Path to confdir (xbps.d)
    -V, --version: Show XBPS version
    -a, --all: Process all packages
    -d, --debug: Debug mode shown to stderr
    -f, --force: Force package re-installation. If specified twice, all files will be overwritten.
    -h, --help: Show usage
    -i, --ignore=: Ignore PKG with -a/--all
    -r, --rootdir=: Full path to rootdir
    -v, --verbose: Verbose messages
