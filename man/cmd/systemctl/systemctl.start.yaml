# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: start
description: Start (activate) one or more units
group: unit
documentation:
  command: |
    Start (activate) one or more units specified on the command line.
    Unit glob patterns expand to names of units currently in memory.
    Note that units which are not active and are not in a failed state
    are usually not in memory, and will not be matched by any pattern.
    Use `--all` to also operate on inactive units referenced by other
    loaded units.
