# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: service-log-target
description: Get/set logging target for service
group: unit
documentation:
  command: |
    If no argument is given, print the current log target as reported by
    the service. If an optional argument TARGET is provided, change the
    current log target to TARGET. Accepts values: console (stderr), kmsg
    (kernel log), journal (systemd-journald), syslog, null, or auto.
    The service must implement the generic org.freedesktop.LogControl1
    interface.
