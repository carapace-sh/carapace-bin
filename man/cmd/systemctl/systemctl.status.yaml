# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: status
description: Show runtime status of one or more units
group: unit
documentation:
  command: |
    Show runtime status information about one or more units followed by
    most recent log data from the journal. If no positional arguments are
    specified, shows the status of the whole system. Each positional argument
    is treated as either a unit name, a glob pattern, or a PID to show the
    unit containing that PID. This function is intended for human-readable
    output; use show instead for computer-parsable output.
