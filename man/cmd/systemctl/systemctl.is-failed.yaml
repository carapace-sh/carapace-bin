# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: is-failed
description: Check whether units are failed
group: unit
documentation:
  command: |
    Check whether any of the specified units is in the "failed" state.
    If no unit is specified, check whether there are any failed units or
    ordering cycles (which corresponds to the "degraded" state returned
    by is-system-running). Returns exit code 0 if at least one has failed.
    Unless `--quiet` is specified, also prints the current unit state.
