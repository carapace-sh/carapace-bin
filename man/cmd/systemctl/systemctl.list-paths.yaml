# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-paths
description: List path units currently in memory, ordered by path
group: unit
documentation:
  command: |
    List path units currently in memory, ordered by path. If one or more
    PATTERNs are specified, only path units matching one of them are shown.
    Also see --show-types, --all, and --state=.
