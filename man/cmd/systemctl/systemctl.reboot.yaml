# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: reboot
description: Shut down and reboot the system
group: system
documentation:
  command: |
    Shut down and reboot the system. This is mostly equivalent to
    `systemctl start reboot.target --job-mode=replace-irreversibly --no-block`.
    Use `--reboot-argument=` to pass an optional argument to the reboot(2)
    system call. Options `--boot-loader-entry=`, `--boot-loader-menu=`,
    and `--firmware-setup` can be used to select what to do after reboot.
    If a new kernel has been loaded via kexec --load, a kexec will be
    performed instead of a reboot.
