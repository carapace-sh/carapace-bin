# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add-requires
description: Add 'Requires' dependency for the target on specified one or more units
group: unit file
documentation:
  command: |
    Add "Requires=" dependencies for the specified TARGET to one or more units.
    This command honors --system, --user, --runtime and --global in the same
    way as enable.
