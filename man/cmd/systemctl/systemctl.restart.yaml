# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restart
description: Start or restart one or more units
group: unit
documentation:
  command: |
    Stop and then start one or more units specified on the command line.
    If the units are not running yet, they will be started. Note that
    restarting a unit does not necessarily flush out all of the unit's
    resources before it is started again. For example, the per-service
    file descriptor storage (FileDescriptorStoreMax=) will remain intact
    as long as the unit has a job pending.
