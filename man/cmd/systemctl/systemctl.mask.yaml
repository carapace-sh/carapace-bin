# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: mask
description: Mask one or more units
group: unit file
documentation:
  command: |
    Mask one or more units, linking them to /dev/null and making it
    impossible to start them. This is a stronger version of disable, as it
    prohibits all kinds of activation including enablement and manual
    activation. Use `--runtime` to mask temporarily until the next reboot.
    Use `--now` to ensure the units are also stopped. Note that this creates
    a symlink under the unit's name in /etc/systemd/system/ (or /run/systemd/system/
    if --runtime is specified). Using mask on units created locally typically
    does not work since those are placed precisely in those directories.
