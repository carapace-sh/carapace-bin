# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: hurl
description: Hurl, run and test HTTP requests with plain text
flags:
    --aws-sigv4=: Use AWS V4 signature authentication in the transfer
    --cacert=: CA certificate to verify peer against (PEM format)
    --color: Colorize output
    --compressed: Request compressed response (using deflate or gzip)
    --connect-timeout=: 'Maximum time allowed for connection [default: 300]'
    --connect-to=*: For a request to the given HOST1:PORT1 pair, connect to HOST2:PORT2 instead
    --continue-on-error: Continue executing requests even if an error occurs
    --curl=: Export each request to a list of curl commands
    --delay=: 'Sets delay before each request (aka sleep) [default: 0]'
    --digest: Tell Hurl to use HTTP Digest authentication
    --error-format=: 'Control the format of error messages [default: short]'
    --file-root=: 'Set root directory to import files [default: input file directory]'
    --from-entry=: Execute Hurl file from ENTRY_NUMBER (starting at 1)
    --glob=*: Specify input files that match the given GLOB. Multiple glob flags may be used
    --http1.1: Tell Hurl to use HTTP version 1.1
    --http2: Tell Hurl to use HTTP version 2
    --http3: Tell Hurl to use HTTP version 3
    --jobs=: Maximum number of parallel jobs, 1 to disable parallel execution
    --json: Output each Hurl file result to JSON
    --key=: Private key file name
    --limit-rate=: Specify the maximum transfer rate in bytes/second, for both downloads and uploads
    --location-trusted: Follow redirects but allows sending the name + password to all hosts that the site may redirect to
    --max-filesize=: Specify the maximum size in bytes of a file to download
    --max-redirs=: 'Maximum number of redirects allowed, -1 for unlimited redirects [default: 50]'
    --negotiate: Tell Hurl to use Negotiate (SPNEGO) authentication
    --netrc-file=: Specify FILE for .netrc
    --netrc-optional: Use either .netrc or the URL
    --no-assert: Ignore asserts defined in the Hurl file
    --no-color: Do not colorize output
    --no-cookie-store: Do not use cookie store between requests
    --no-output: Suppress output. By default, Hurl outputs the body of the last response
    --no-pretty: Do not prettify response output
    --no-proxy=: List of hosts which do not use proxy
    --noproxy=&: List of hosts which do not use proxy
    --ntlm: Tell Hurl to use NTLM authentication
    --parallel: Run files in parallel (default in test mode)
    --path-as-is: Tell Hurl to not handle sequences of /../ or /./ in the given URL path
    --pinnedpubkey=: Public key to verify peer against
    --pretty: Prettify JSON response output
    --progress-bar: Display a progress bar in test mode
    --repeat=: Repeat the input files sequence NUM times, -1 for infinite loop
    --report-html=: Generate HTML report to DIR
    --report-json=: Generate JSON report to DIR
    --report-junit=: Write a JUnit XML report to FILE
    --report-tap=: Write a TAP report to FILE
    --resolve=*: Provide a custom address for a specific HOST and PORT pair
    --retry-interval=: 'Interval in milliseconds before a retry [default: 1000]'
    --retry=: Maximum number of retries, 0 for no retries, -1 for unlimited retries
    --secret=*: Define a variable which value is secret
    --secrets-file=*: Define a secrets file in which you define your secrets
    --ssl-no-revoke: (Windows) Tell Hurl to disable certificate revocation checks
    --test: Activate test mode (use parallel execution)
    --to-entry=: Execute Hurl file to ENTRY_NUMBER (starting at 1)
    --unix-socket=: (HTTP) Connect through this Unix domain socket, instead of using the network
    --variable=*: Define a variable
    --variables-file=*: Define a properties file in which you define your variables
    --verbosity=: Set verbosity level for debug log
    --very-verbose: Turn on very verbose output, including HTTP response and libcurl logs (alias to --verbosity debug)
    -0, --http1.0: Tell Hurl to use HTTP version 1.0
    -4, --ipv4: Tell Hurl to use IPv4 addresses only when resolving host names, and not for example try IPv6
    -6, --ipv6: Tell Hurl to use IPv6 addresses only when resolving host names, and not for example try IPv4
    -A, --user-agent=: Specify the User-Agent string to send to the HTTP server
    -E, --cert=: Client certificate file and password
    -H, --header=*: Pass custom header(s) to server
    -L, --location: Follow redirects
    -V, --version: Print version
    -b, --cookie=: Read cookies from FILE
    -c, --cookie-jar=: Write cookies to FILE after running the session
    -h, --help: Print help
    -i, --include: Include the HTTP headers in the output
    -k, --insecure: Allow insecure SSL connections
    -m, --max-time=: 'Maximum time allowed for the transfer [default: 300]'
    -n, --netrc: Must read .netrc for username and password
    -o, --output=: Write to FILE instead of stdout
    -u, --user=: Add basic Authentication header to each request
    -v, --verbose: Turn on verbose (alias to --verbosity verbose)
    -x, --proxy=: Use proxy on given PROTOCOL/HOST/PORT
