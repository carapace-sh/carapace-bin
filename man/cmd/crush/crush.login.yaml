# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: login
aliases:
- auth
description: Login Crush to a platform
flags:
    -f, --force: Force re-authentication even if already logged in
documentation:
    command: |
        Authenticate Crush with a supported platform. Platforms include
        [catwalk](crush://crush/platforms), [github](crush://crush/platforms),
        [github-copilot](crush://crush/platforms), and
        [hyper](crush://crush/platforms).
        
        Use `crush login <platform>` to start the authentication flow for a
        specific platform. Some platforms may open a browser for OAuth.
    flag:
        force: |
            Force re-authentication even if already logged in. This will
            overwrite any existing credentials for the platform.
