# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
aliases:
    - a
description: Adds a platform(s) to the workspace file and updates the lock file
flags:
    --archspec=: Declare a `__archspec` virtual package with the given microarchitecture string, e.g. `x86-64-v3`. Valid on any subdir
    --auto-detect: Detect this machine's platform (subdir and virtual packages) instead of naming a subdir. Optionally pass a single `<name>` to name it; any virtual-package flags override the detected values. The detected platform is placed at the top of the list
    --auto-detected: Detect this machine's platform (subdir and virtual packages) instead of naming a subdir. Optionally pass a single `<name>` to name it; any virtual-package flags override the detected values. The detected platform is placed at the top of the list
    --cuda-arch=: Declare a `__cuda_arch` virtual package (GPU compute capability) at the given version, e.g. `8.6`. Requires `--cuda` (or an existing `__cuda`), matching the conda CEP coupling. Serialized as `cuda = { driver, arch }`
    --cuda=: Declare a `__cuda` virtual package at the given version, e.g. `12.0`. Valid on any subdir
    --current: Detect this machine's platform (subdir and virtual packages) instead of naming a subdir. Optionally pass a single `<name>` to name it; any virtual-package flags override the detected values. The detected platform is placed at the top of the list
    --glibc=: Declare a `__glibc` virtual package at the given version, e.g. `2.28`. Only valid on linux subdirs
    --linux=: Declare a `__linux` virtual package at the given kernel version, e.g. `5.10`. Only valid on linux subdirs
    --macos=: Declare a `__osx` virtual package at the given macOS version, e.g. `14.0`. Only valid on osx subdirs
    --no-install: Don't update the environment, only add changed packages to the lock file
    --osx=: Declare a `__osx` virtual package at the given macOS version, e.g. `14.0`. Only valid on osx subdirs
    --windows=: Declare a `__win` virtual package at the given Windows version, e.g. `10`. Only valid on win subdirs
    -f, --feature=: The name of the feature to add the platform to
