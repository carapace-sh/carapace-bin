# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: conda-environment
description: Export workspace environment to a conda environment.yaml file
flags:
    --config-file=: Load configuration from this file instead of searching system and user-level paths. Project-local `<project>/.pixi/config.toml` is still merged on top
    --from-lock-file: Render the environment with packages pinned to the versions resolved in the lock file instead of the manifest specs
    --no-config: Don't read system or user-level configuration files. Project-local `<project>/.pixi/config.toml` is still loaded
    --no-pypi: Exclude pypi dependencies from the exported environment file
    -e, --environment=: The environment to render the environment file for. Defaults to the default environment
    -n, --name=: The name to use for the rendered conda environment. Defaults to the environment name
    -p, --platform=: The platform to render the environment file for. Defaults to the current platform
