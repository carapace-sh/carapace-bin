# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upgrade
description: Checks if there are newer versions of the dependencies and upgrades them in the lock file and manifest file
flags:
    --auth-file=: Path to the file containing the authentication token
    --concurrent-downloads=: Max concurrent network requests, default is `50`
    --concurrent-solves=: Max concurrent solves, default is the number of CPUs
    --config-file=: Load configuration from this file instead of searching system and user-level paths. Project-local `<project>/.pixi/config.toml` is still merged on top
    --exclude*=: The packages which should be excluded
    --frozen: Install the environment as defined in the lock file, doesn't update lock file if it isn't up-to-date with the manifest file
    --json: Output the changes in JSON format
    --locked: Check if lock file is up-to-date before installing the environment, aborts when lock file isn't up-to-date with the manifest file
    --no-config: Don't read system or user-level configuration files. Project-local `<project>/.pixi/config.toml` is still loaded
    --no-hard-links: Disallow hard links during package installation
    --no-install: Don't modify the environment, only modify the lock file
    --no-ref-links: Disallow ref links (copy-on-write) during package installation
    --no-symbolic-links: Disallow symbolic links during package installation
    --pinning-strategy=: Set pinning strategy
    --pypi-keyring-provider=: Specifies whether to use the keyring to look up credentials for PyPI
    --run-post-link-scripts: Run post-link scripts (insecure)
    --tls-no-verify: Do not verify the TLS certificate of the server
    --tls-root-certs=: "Which TLS root certificates to use: 'webpki' (bundled Mozilla roots) or 'system' (system store)"
    --use-environment-activation-cache: Use environment activation cache (experimental)
    -f, --feature=: The feature to update
    -m, --manifest-path=: The path to `pixi.toml`, `pyproject.toml`, or the workspace directory
    -n, --dry-run: Only show the changes that would be made, without actually updating the manifest, lock file, or environment
    -w, --workspace=: Name of the workspace
