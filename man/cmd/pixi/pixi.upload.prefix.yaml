# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: prefix
description: Options for uploading to a prefix.dev server. Authentication is used from the keychain / auth-file
flags:
    --attestation=: "Upload an attestation file alongside the package. Note: if you add an attestation, you can _only_ upload a single package. Mutually exclusive with --generate-attestation"
    --force: Force overwrite existing packages
    --generate-attestation: Automatically generate attestation using cosign in CI. Mutually exclusive with --attestation
    --store-github-attestation: Also store the generated attestation to GitHub's attestation API. Requires `GITHUB_TOKEN` environment variable and only works in GitHub Actions. The attestation will be associated with the current repository
    -a, --api-key=: The prefix.dev API key, if none is provided, the token is read from the keychain / auth-file
    -c, --channel!=: The channel to upload the package to
    -s, --skip-existing: Skip upload if package already exists
    -u, --url=: The URL to the prefix.dev server (only necessary for self-hosted instances)
