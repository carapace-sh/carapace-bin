# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: register
description: Commands to manage the registry of workspaces. Default command will add a new workspace
flags:
    --config-file=: Load configuration from this file instead of searching system and user-level paths. Project-local `<project>/.pixi/config.toml` is still merged on top
    --no-config: Don't read system or user-level configuration files. Project-local `<project>/.pixi/config.toml` is still loaded
    -f, --force: Overwrite the workspace entry if the name of the workspace already exists in the registry
    -n, --name=: Name of the workspace to register. Defaults to the name of the current workspace
    -p, --path=: Path to register. Defaults to the path to the current workspace
