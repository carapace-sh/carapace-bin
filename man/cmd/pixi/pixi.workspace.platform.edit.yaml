# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: edit
aliases:
    - e
description: Edit an existing workspace platform's subdir and/or virtual packages
flags:
    --archspec=: Declare a `__archspec` virtual package with the given microarchitecture string, e.g. `x86-64-v3`. Valid on any subdir
    --clear-virtual-packages: Clear all virtual packages before applying any add/upsert operations
    --cuda-arch=: Declare a `__cuda_arch` virtual package (GPU compute capability) at the given version, e.g. `8.6`. Requires `--cuda` (or an existing `__cuda`), matching the conda CEP coupling. Serialized as `cuda = { driver, arch }`
    --cuda=: Declare a `__cuda` virtual package at the given version, e.g. `12.0`. Valid on any subdir
    --glibc=: Declare a `__glibc` virtual package at the given version, e.g. `2.28`. Only valid on linux subdirs
    --linux=: Declare a `__linux` virtual package at the given kernel version, e.g. `5.10`. Only valid on linux subdirs
    --macos=: Declare a `__osx` virtual package at the given macOS version, e.g. `14.0`. Only valid on osx subdirs
    --no-install: Don't update the environment, only refresh the lock-file
    --osx=: Declare a `__osx` virtual package at the given macOS version, e.g. `14.0`. Only valid on osx subdirs
    --remove-virtual-package*=: Remove the named virtual package from this platform. Can be repeated
    --subdir=: Set a new conda subdir for this platform
    --windows=: Declare a `__win` virtual package at the given Windows version, e.g. `10`. Only valid on win subdirs
