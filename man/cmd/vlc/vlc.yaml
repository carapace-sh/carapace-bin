documentation:
  command: >-
    VideoLAN media player for audio and video. vlc plays local files,
    network streams (HTTP, RTP, RTSP, MMS), DVDs, VCDs, and device streams.
    Command-line usage: vlc [options] [source]. Key options: -v (verbose),
    --play-and-pause, --fullscreen, --loop, --no-video. Stream with
    --sout (streaming output): vlc source --sout #duplicate{\
    transcode{vcodec=mp4v,vb=512}:std{access=file,mux=ts,dst=file.mp4}}.
    Start HTTP interface with --http-port. Record with --run-time.
    Video filters with --video-filter. Audio effects with --audio-filter.
    Works on Linux, macOS, Windows, and mobile platforms.
