# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: credential-store
description: Helper to store credentials on disk
group: low-level helper
flags:
  --file=: fetch and store credentials in <path>
documentation:
  command: |-
    NOTE: Using this helper will store your passwords unencrypted on disk,
    protected only by filesystem permissions. If this is not an acceptable
    security tradeoff, try [git-credential-cache](cmd://git/credential-cache), or find a helper
    that integrates with secure storage provided by your operating system.

    This command stores credentials indefinitely on disk for use by future
    Git programs.

    You probably don't want to invoke this command directly; it is meant to
    be used as a credential helper by other parts of git. See
    [gitcredentials](man://gitcredentials/7) or `EXAMPLES` below.
