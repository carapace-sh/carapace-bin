# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: mktag
description: Creates a tag object
group: low-level manipulator
flags:
  --strict: enable more strict checking
documentation:
  command: |-
    Reads a tag's contents on standard input and creates a tag object. The
    output is the new tag's <object> identifier.

    This command is mostly equivalent to [git-hash-object](cmd://git/hash-object)
    invoked with `-t tag -w --stdin`. I.e. both of these will create and
    write a tag found in `my-tag`:

        git mktag <my-tag
        git hash-object -t tag -w --stdin <my-tag

    The difference is that mktag will die before writing the tag if the
    tag doesn't pass a [git-fsck](cmd://git/fsck) check.

    The "fsck" check done by mktag is stricter than what [git-fsck](cmd://git/fsck)
    would run by default in that all `fsck.<msg-id>` messages are promoted
    from warnings to errors (so e.g. a missing "tagger" line is an error).

    Extra headers in the object are also an error under mktag, but ignored
    by [git-fsck](cmd://git/fsck). This extra check can be turned off by setting
    the appropriate `fsck.<msg-id>` variable:

        git -c fsck.extraHeaderEntry=ignore mktag <my-tag-with-headers
