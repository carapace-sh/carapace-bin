# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: whatchanged
description: Show logs with difference each commit introduces
group: interrogator
flags:
  --decorate-refs-exclude=: do not decorate refs that match <pattern>
  --decorate-refs=: only decorate refs that match <pattern>
  --decorate?: decorate options
  --mailmap: alias of --use-mailmap
  --source: show source
  --use-mailmap: use mail map file
  -L=: trace the evolution of line range
  -q, --quiet: suppress diff output
documentation:
  command: |-
    Shows commit logs and diff output each commit introduces.

    New users are encouraged to use [git-log](cmd://git/log) instead.  The
    `whatchanged` command is essentially the same as [git-log](cmd://git/log)
    but defaults to showing the raw format diff output and skipping merges:

    ```
    git log --raw --no-merges
    ```

    The command is primarily kept for historical reasons; fingers of
    many people who learned Git long before `git log` was invented by
    reading the Linux kernel mailing list are trained to type it.

    ### Examples

    **git whatchanged -p v2.6.12.. include/scsi drivers/scsi**

    Show as patches the commits since version `v2.6.12` that changed
    any file in the include/scsi or drivers/scsi subdirectories

    **git whatchanged --since="2 weeks ago" -- gitk**

    Show the changes during the last two weeks to the file `gitk`.
    The "--" is necessary to avoid confusion with the *branch* named
    'gitk'
