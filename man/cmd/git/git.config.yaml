# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: config
description: Get and set repository or global options
group: manipulator
flags:
  --add: 'add a new variable: name value'
  --blob=: read config from given blob object
  --bool: value is "true" or "false"
  --bool-or-int: value is --bool or --int
  --bool-or-str: value is --bool or string
  --default=: with --get, use default value when missing entry
  --expiry-date: value is an expiry date
  --fixed-value: use string equality when comparing values to 'value-pattern'
  --get: 'get value: name [value-pattern]'
  --get-all: 'get all values: key [value-pattern]'
  --get-color: 'find the color configured: slot [default]'
  --get-colorbool: 'find the color setting: slot [stdout-is-tty]'
  --get-regexp: 'get values for regexp: name-regex [value-pattern]'
  --get-urlmatch: 'get value specific for the URL: section[.var] URL'
  --global: use global config file
  --includes: respect include directives on lookup
  --int: value is decimal number
  --local: use repository config file
  --name-only: show variable names only
  --path: value is a path (file or directory name)
  --remove-section: 'remove a section: name'
  --rename-section: 'rename section: old-name new-name'
  --replace-all: 'replace all matching variables: name value [value-pattern]'
  --show-origin: show origin of config (file, standard input, blob, command line)
  --show-scope: show scope of config (worktree, local, global, system, command)
  --system: use system config file
  --unset: 'remove a variable: name [value-pattern]'
  --unset-all: 'remove all matches: name [value-pattern]'
  --worktree: use per-worktree config file
  -e, --edit: open an editor
  -f, --file=: use given config file
  -l, --list: list all
  -t, --type=: value is given this type
  -z, --null: terminate values with NUL byte
documentation:
  command: |-
    You can query/set/replace/unset options with this command. The name is
    actually the section and the key separated by a dot, and the value will be
    escaped.

    Multiple lines can be added to an option by using the `--append` option.
    If you want to update or unset an option which can occur on multiple
    lines, `--value=<pattern>` (which is an extended regular expression,
    unless the `--fixed-value` option is given) needs to be given.  Only the
    existing values that match the pattern are updated or unset.  If
    you want to handle the lines that do *not* match the pattern, just
    prepend a single exclamation mark in front (see also EXAMPLES),
    but note that this only works when the `--fixed-value` option is not
    in use.

    The `--type=<type>` option instructs `git config` to ensure that incoming and
    outgoing values are canonicalize-able under the given <type>.  If no
    `--type=<type>` is given, no canonicalization will be performed. Callers may
    unset an existing `--type` specifier with `--no-type`.

    When reading, the values are read from the system, global and
    repository local configuration files by default, and options
    `--system`, `--global`, `--local`, `--worktree` and
    `--file <filename>` can be used to tell the command to read from only
    that location (see FILES).

    When writing, the new value is written to the repository local
    configuration file by default, and options `--system`, `--global`,
    `--worktree`, `--file <filename>` can be used to tell the command to
    write to that location (you can say `--local` but that is the
    default).

    This command will fail with non-zero status upon error.  Some exit
    codes are:

    - The section or key is invalid (ret=1),
    - no section or name was provided (ret=2),
    - the config file is invalid (ret=3),
    - the config file cannot be written (ret=4),
    - you try to unset an option which does not exist (ret=5),
    - you try to unset/set an option for which multiple lines match (ret=5), or
    - you try to use an invalid regexp (ret=6).

    On success, the command returns the exit code 0.

    A list of all available configuration variables can be obtained using the
    `git help --config` command.
