# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: status
description: Show the status of the submodule
flags:
  --cached: print the SHA-1 recorded in the superproject for each submodule
  --recursive: recurse into nested submodules
documentation:
  command: |-
    Show the status of the submodules. This will print the SHA-1 of the
    currently checked out commit for each submodule, along with the
    submodule path and the output of [git-describe](cmd://git/describe) for the
    SHA-1. Each SHA-1 will possibly be prefixed with `-` if the submodule is
    not initialized, `+` if the currently checked out submodule commit
    does not match the SHA-1 found in the index of the containing
    repository and `U` if the submodule has merge conflicts.

    If `--cached` is specified, this command will instead print the SHA-1
    recorded in the superproject for each submodule.

    If `--recursive` is specified, this command will recurse into nested
    submodules, and show their status as well.

    If you are only interested in changes of the currently initialized
    submodules with respect to the commit recorded in the index or the `HEAD`,
    [git-status](cmd://git/status) and [git-diff](cmd://git/diff) will provide that information
    too (and can also report changes to a submodule's work tree).
  flag:
    cached: |-
      Use the index to determine the commit instead of the `HEAD`.
      This option is only valid for `status` and `summary` commands.
    recursive: |-
      Traverse submodules recursively. This option is only valid for `foreach`,
      `update`, `status` and `sync` commands. The operation is performed not
      only in the submodules of the current repo, but also
      in any nested submodules inside those submodules (and so on).
