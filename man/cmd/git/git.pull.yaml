# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: pull
description: Fetch from and integrate with another repository or a local branch
group: main
flags:
  --all: fetch from all remotes
  --allow-unrelated-histories: allow merging unrelated histories
  --autostash: automatically stash/stash pop before and after
  --cleanup=: 'how to strip spaces and #comments from message'
  --commit: perform a commit if the merge succeeds (default)
  --deepen=: deepen history of shallow clone
  --depth=: deepen history of shallow clone
  --dry-run: dry run
  --edit: edit message before committing
  --ff: allow fast-forward
  --ff-only: abort if fast-forward is not possible
  --log=: add (at most <n>) entries from shortlog to merge commit message
  --negotiation-tip=: report that we have only objects reachable from this object
  --progress: force progress reporting
  --recurse-submodules=: control for recursive fetching of submodules
  --refmap=: specify fetch refmap
  --set-upstream: set upstream for git pull/fetch
  --shallow-exclude=: deepen history of shallow clone, excluding rev
  --shallow-since=: deepen history of shallow repository based on time
  --show-forced-updates: check for forced-updates on all updated branches
  --signoff=: 'add Signed-off-by:'
  --squash: create a single commit instead of doing a merge
  --stat: show a diffstat at the end of the merge
  --unshallow: convert to a complete repository
  --update-shallow: accept refs that update .git/shallow
  --upload-pack=: path to upload pack on remote end
  --verify-signatures: verify that the named commit has a valid GPG signature
  -4, --ipv4: use IPv4 addresses only
  -6, --ipv6: use IPv6 addresses only
  -S, --gpg-sign=: GPG sign commit
  -X, --strategy-option=: option for selected merge strategy
  -a, --append: append to .git/FETCH_HEAD instead of overwriting
  -f, --force: force overwrite of local branch
  -j, --jobs=: number of submodules pulled in parallel
  -k, --keep: keep downloaded pack
  -n: do not show a diffstat at the end of the merge
  -o, --server-option=: option to transmit
  -p, --prune: prune remote-tracking branches no longer on remote
  -q, --quiet: be more quiet
  -r, --rebase=: incorporate changes by rebasing rather than merging
  -s, --strategy=: merge strategy to use
  -t, --tags: fetch all tags and associated objects
  -v, --verbose: be more verbose
documentation:
  command: |-
    Integrate changes from a remote repository into the current branch.

    First, `git pull` runs `git fetch` with the same arguments
    (excluding merge options) to fetch remote branch(es).
    Then it decides which remote branch to integrate: if you run `git pull`
    with no arguments this defaults to the upstream
    for the current branch.
    Then it integrates that branch into the current branch.

    There are 4 main options for integrating the remote branch:

    1. `git pull --ff-only` will only do "fast-forward" updates: it
       fails if your local branch has diverged from the remote branch.
       This is the default.
    2. `git pull --rebase` runs `git rebase`
    3. `git pull --no-rebase` runs `git merge. 4. `git pull --squash` runs `git merge --squash

    You can also set the configuration options `pull.rebase`, `pull.squash`,
    or `pull.ff` with your preferred behaviour.

    If there's a merge conflict during the merge or rebase that you don't
    want to handle, you can safely abort it with `git merge --abort` or
    `git rebase --abort`.
  flag:
    allow-unrelated-histories: |-
      By default, `git merge` command refuses to merge histories
      that do not share a common ancestor.  This option can be
      used to override this safety when merging histories of two
      projects that started their lives independently. As that is
      a very rare occasion, no configuration variable to enable
      this by default exists or will be added.

      Only useful when merging.
    append: |-
      Append ref names and object names of fetched refs to the
      existing contents of `.git/FETCH_HEAD`.  Without this
      option old data in `.git/FETCH_HEAD` will be overwritten.
    cleanup: |-
      This option determines how the merge message will be cleaned up before
      committing. See [git-commit](cmd://git/commit) for more details. In addition, if
      the _<mode>_ is given a value of `scissors`, scissors will be appended
      to `MERGE_MSG` before being passed on to the commit machinery in the
      case of a merge conflict.
    deepen: |-
      Similar to `--depth`, except it specifies the number of commits
      from the current shallow boundary instead of from the tip of
      each remote branch history.
    depth: |-
      Limit fetching to the specified number of commits from the tip of
      each remote branch history. If fetching to a `shallow` repository
      created by `git clone` with `--depth=<depth>` option (see
      [git-clone](cmd://git/clone)), deepen or shorten the history to the specified
      number of commits. Tags for the deepened commits are not fetched.
    dry-run: Show what would be done, without making any changes.
    ff-only: |-
      Specifies how a merge is handled when the merged-in history is
      already a descendant of the current history.  `--ff` is the
      default unless merging an annotated (and possibly signed) tag
      that is not stored in its natural place in the `refs/tags/`
      hierarchy, in which case `--no-ff` is assumed.
    force: |-
      When `git fetch` is used with `<src>:<dst>` refspec, it may
      refuse to update the local branch as discussed
      in the _<refspec>_ part of the [git-fetch](cmd://git/fetch)
      documentation.

      When `git fetch` is used with `<src>:<dst>` refspec, it may
      refuse to update the local branch as discussed in the _<refspec>_ part below.

      This option overrides that check.
    ipv4: Use IPv4 addresses only, ignoring IPv6 addresses.
    ipv6: Use IPv6 addresses only, ignoring IPv4 addresses.
    jobs: |-
      Parallelize all forms of fetching up to _<n>_ jobs at a time.

      A value of 0 will use some reasonable default.

      If the `--multiple` option was specified, the different remotes will be fetched
      in parallel. If multiple submodules are fetched, they will be fetched in
      parallel. To control them independently, use the config settings
      `fetch.parallel` and `submodule.fetchJobs` (see [git-config](cmd://git/config)).

      Typically, parallel recursive and multi-remote fetches will be faster. By
      default fetches are performed sequentially, not in parallel.
    keep: Keep downloaded pack.
    negotiation-tip: |-
      By default, Git will report, to the server, commits reachable
      from all local refs to find common commits in an attempt to
      reduce the size of the to-be-received packfile. If specified,
      Git will only report commits reachable from the given tips.
      This is useful to speed up fetches when the user knows which
      local ref is likely to have commits in common with the
      upstream ref being fetched.

      `--negotiation-restrict` is the preferred name for this option;
      `--negotiation-tip` is accepted as a synonym.

      This option may be specified more than once; if so, Git will report
      commits reachable from any of the given commits.

      The argument to this option may be a glob on ref names, a ref, or the (possibly
      abbreviated) SHA-1 of a commit. Specifying a glob is equivalent to specifying
      this option multiple times, one for each matching ref name.

      See also the `fetch.negotiationAlgorithm` and `push.negotiate`
      configuration variables documented in [git-config](cmd://git/config), and the
      `--negotiate-only` option below.
    progress: |-
      Progress status is reported on the standard error stream
      by default when it is attached to a terminal, unless `-q`
      is specified. This flag forces progress status even if the
      standard error stream is not directed to a terminal.
    prune: |-
      Before fetching, remove any remote-tracking references that no
      longer exist on the remote.  Tags are not subject to pruning
      if they are fetched only because of the default tag
      auto-following or due to a `--tags` option.  However, if tags
      are fetched due to an explicit refspec (either on the command
      line or in the remote configuration, for example if the remote
      was cloned with the `--mirror` option), then they are also
      subject to pruning. Supplying `--prune-tags` is a shorthand for
      providing the tag refspec.

      See the PRUNING section below for more details.
    quiet: |-
      This is passed to both underlying [git-fetch](cmd://git/fetch) to squelch reporting of
      during transfer, and underlying [git-merge](cmd://git/merge) to squelch output during
      merging.
    refmap: |-
      When fetching refs listed on the command line, use the
      specified refspec (can be given more than once) to map the
      refs to remote-tracking branches, instead of the values of
      `remote.<name>.fetch` configuration variables for the remote
      repository.  Providing an empty _<refspec>_ to the
      `--refmap` option causes Git to ignore the configured
      refspecs and rely entirely on the refspecs supplied as
      command-line arguments. See section on "Configured Remote-tracking
      Branches" for details.
    server-option: |-
      Transmit the given string to the server when communicating using
      protocol version 2.  The given string must not contain a _NUL_ or _LF_
      character.  The server's handling of server options, including
      unknown ones, is server-specific.
      When multiple `--server-option=<option>` are given, they are all
      sent to the other side in the order listed on the command line.
      When no `--server-option=<option> is given from the command line, the values of configuration variable `remote.<name>.serverOption
      are used instead.
    set-upstream: |-
      If the remote is fetched successfully, add upstream
      (tracking) reference, used by argument-less
      [git-pull](cmd://git/pull) and other commands. For more information,
      see `branch.<name>.merge` and `branch.<name>.remote` in
      [git-config](cmd://git/config).
    shallow-exclude: |-
      Deepen or shorten the history of a shallow repository to
      exclude commits reachable from a specified remote branch or tag.
      This option can be specified multiple times.
    shallow-since: |-
      Deepen or shorten the history of a shallow repository to
      include all reachable commits after _<date>_.
    show-forced-updates: |-
      By default, git checks if a branch is force-updated during
      fetch. This can be disabled through `fetch.showForcedUpdates`, but
      the `--show-forced-updates` option guarantees this check occurs.
      See [git-config](cmd://git/config).
    strategy: |-
      Use the given merge strategy; can be supplied more than
      once to specify them in the order they should be tried.
      If there is no `-s` option, a built-in list of strategies
      is used instead (`ort` when merging a single head,
      `octopus` otherwise).
    strategy-option: |-
      Pass merge strategy specific option through to the merge
      strategy.
    tags: |-
      Fetch all tags from the remote (i.e., fetch remote tags
      `refs/tags/*` into local tags with the same name), in addition
      to whatever else would otherwise be fetched.  Using this
      option alone does not subject tags to pruning, even if `--prune`
      is used (though tags may be pruned anyway if they are also the
      destination of an explicit refspec; see `--prune`).
    unshallow: |-
      If the source repository is complete, convert a shallow
      repository to a complete one, removing all the limitations
      imposed by shallow repositories.

      If the source repository is shallow, fetch as much as possible so that
      the current repository has the same history as the source repository.
    update-shallow: |-
      By default when fetching from a shallow repository,
      `git fetch` refuses refs that require updating
      `.git/shallow`. This option updates `.git/shallow` and accepts such
      refs.
    verbose: Pass `--verbose` to [git-fetch](cmd://git/fetch) and [git-merge](cmd://git/merge).
    all: |-
      Fetch all remotes, except for the ones that have the
      `remote.<name>.skipFetchAll` configuration variable set.
      This overrides the configuration variable `fetch.all`.
    autostash: |-
      Automatically create a temporary stash entry before the operation
      begins, record it in the ref `MERGE_AUTOSTASH`
      and apply it after the operation ends.  This means
      that you can run the operation on a dirty worktree.  However, use
      with care: the final stash application after a successful
      merge might result in non-trivial conflicts.
    commit: |-
      Perform the merge and commit the result. This option can
      be used to override `--no-commit`.

      Only useful when merging.

      With `--no-commit` perform the merge and stop just before creating
      a merge commit, to give the user a chance to inspect and further
      tweak the merge result before committing.

      Note that fast-forward updates do not create a merge commit and
      therefore there is no way to stop those merges with `--no-commit`.
      Thus, if you want to ensure your branch is not changed or updated
      by the merge command, use `--no-ff` with `--no-commit`.
    edit: |-
      Invoke an editor before committing successful mechanical merge to
      further edit the auto-generated merge message, so that the user
      can explain and justify the merge. The `--no-edit` option can be
      used to accept the auto-generated message (this is generally
      discouraged).

      The `--edit` (or `-e`) option is still useful if you are
      giving a draft message with the `-m` option from the command line
      and want to edit it in the editor.

      Older scripts may depend on the historical behaviour of not allowing the
      user to edit the merge log message. They will see an editor opened when
      they run `git merge`. To make it easier to adjust such scripts to the
      updated behaviour, the environment variable `GIT_MERGE_AUTOEDIT` can be
      set to `no` at the beginning of them.
    ff: |-
      When merging rather than rebasing, specifies how a merge is
      handled when the merged-in history is already a descendant of
      the current history.  If merging is requested, `--ff` is the
      default unless merging an annotated (and possibly signed) tag
      that is not stored in its natural place in the `refs/tags/`
      hierarchy, in which case `--no-ff` is assumed.

      With `--ff`, when possible resolve the merge as a fast-forward (only
      update the branch pointer to match the merged branch; do not create a
      merge commit).  When not possible (when the merged-in history is not a
      descendant of the current history), create a merge commit.

      With `--no-ff`, create a merge commit in all cases, even when the merge
      could instead be resolved as a fast-forward.

      With `--ff-only`, resolve the merge as a fast-forward when possible.
      When not possible, refuse to merge and exit with a non-zero status.
    log: |-
      In addition to branch names, populate the log message with
      one-line descriptions from at most _<n>_ actual commits that are being
      merged. See also [git-fmt-merge-msg](cmd://git/fmt-merge-msg).

      Only useful when merging.

      With `--no-log` do not list one-line descriptions from the
      actual commits being merged.
    recurse-submodules: |-
      This option controls if new commits of populated submodules should
      be fetched, and if the working trees of active submodules should be
      updated, too (see [git-fetch](cmd://git/fetch), [git-config](cmd://git/config) and
      [gitmodules](man://gitmodules/5)).

      If the checkout is done via rebase, local submodule commits are rebased as well.

      If the update is done via merge, the submodule conflicts are resolved and checked out.

      Options related to merging
    signoff: |-
      Add a `Signed-off-by` trailer by the committer at the end of the commit
      log message.  The meaning of a signoff depends on the project
      to which you're committing.  For example, it may certify that
      the committer has the rights to submit the work under the
      project's license or agrees to some contributor representation,
      such as a Developer Certificate of Origin.
      (See https://developercertificate.org for the one used by the
      Linux kernel and Git projects.)  Consult the documentation or
      leadership of the project to which you're contributing to
      understand how the signoffs are used in that project.

      The `--no-signoff` option can be used to countermand an earlier `--signoff`
      option on the command line.

      Git does not (and will not) have a configuration variable to enable
      the `--signoff` command line option by default; see the
      `commit.signoff` entry in [gitfaq](man://gitfaq/7) for more details.
    squash: |-
      Produce the working tree and index state as if a real merge
      happened (except for the merge information), but do not actually
      make a commit, move the `HEAD`, or record `$GIT_DIR/MERGE_HEAD`
      (to cause the next `git commit` command to create a merge
      commit).  This allows you to create a single commit on top of
      the current branch whose effect is the same as merging another
      branch (or more in case of an octopus).

      With `--no-squash` perform the merge and commit the result. This
      option can be used to override `--squash`.

      With `--squash`, `--commit` is not allowed, and will fail.

      Only useful when merging.
    stat: |-
      Show a diffstat at the end of the merge. The diffstat is also
      controlled by the configuration option merge.stat.

      With `-n` or `--no-stat` do not show a diffstat at the end of the
      merge.
    verify-signatures: |-
      Verify that the tip commit of the side branch being merged is
      signed with a valid key, i.e. a key that has a valid uid: in the
      default trust model, this means the signing key has been signed by
      a trusted key.  If the tip commit of the side branch is not signed
      with a valid key, the merge is aborted.

      Only useful when merging.
    gpg-sign: |-
      GPG-sign the resulting merge commit. The _<key-id>_ argument is
      optional and defaults to the committer identity; if specified,
      it must be stuck to the option without a space. `--no-gpg-sign`
      is useful to countermand both `commit.gpgSign` configuration variable,
      and earlier `--gpg-sign`.
    rebase: |-
      This is shorthand for `--rebase=false`.

      Options related to fetching
