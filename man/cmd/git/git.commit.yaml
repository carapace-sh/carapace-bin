# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: commit
description: Record changes to the repository
group: main
flags:
  --ahead-behind: compute full ahead/behind values
  --allow-empty: allow recording an empty commit
  --allow-empty-message: allow recording a commit with an empty message
  --amend: amend previous commit
  --author=: override author for commit
  --branch: show branch information
  --cleanup=: 'how to strip spaces and #comments from message'
  --date=: override date for commit
  --dry-run: show what would be committed
  --fixup=: use autosquash formatted message to fixup specified commit
  --interactive: interactively add files
  --long: show status in long format (default)
  --no-ahead-behind: do not compute full ahead/behind values
  --no-edit: use the selected commit message without launching an editor
  --no-gpg-sign: don't GPG-sign the commit
  --no-post-rewrite: bypass post-rewrite hook
  --no-signoff: countermand an earlier --signoff
  --no-status: do not include the output of git-status in the commit message
  --pathspec-file-nul: pathspec elements are separated with NUL character
  --pathspec-from-file=: read pathspec from file
  --porcelain: machine-readable output
  --reset-author: the commit is authored by me now (used with -C/-c/--amend)
  --short: show status concisely
  --squash=: use autosquash formatted message to squash specified commit
  --status: include status in commit message template
  --trailer*=: add custom trailer(s)
  -C, --reuse-message=: reuse message from specified commit
  -F, --file=: read message from file
  -S, --gpg-sign?: GPG sign commit
  -a, --all: commit all changed files
  -c, --reedit-message=: reuse and edit message from specified commit
  -e, --edit: force edit of commit
  -i, --include: add specified files to index for commit
  -m, --message=: commit message
  -n, --no-verify: bypass pre-commit and commit-msg hooks
  -o, --only: commit only specified files
  -p, --patch: interactively add changes
  -q, --quiet: suppress summary after successful commit
  -s, --signoff: 'add Signed-off-by:'
  -t, --template=: use specified template file
  -u, --untracked-files?: show untracked files
  -v, --verbose: show diff in commit message template
  -z, --null: terminate entries with NUL
documentation:
  command: |-
    Create a new commit containing the current contents of the index and
    the given log message describing the changes. The new commit is a
    direct child of HEAD, usually the tip of the current branch, and the
    branch is updated to point to it (unless no branch is associated with
    the working tree, in which case `HEAD` is "detached" as described in
    [git-checkout](cmd://git/checkout)).

    The content to be committed can be specified in several ways:

    1. by using [git-add](cmd://git/add) to incrementally "add" changes to the
       index before using the `commit` command (Note: even modified files
       must be "added");

    2. by using [git-rm](cmd://git/rm) to remove files from the working tree
       and the index, again before using the `commit` command;

    3. by listing files as arguments to the `commit` command
       (without `--interactive` or `--patch` switch), in which
       case the commit will ignore changes staged in the index, and instead
       record the current content of the listed files (which must already
       be known to Git);

    4. by using the `-a` switch with the `commit` command to automatically
       "add" changes from all known files (i.e. all files that are already
       listed in the index) and to automatically "rm" files in the index
       that have been removed from the working tree, and then perform the
       actual commit;

    5. by using the `--interactive` or `--patch` switches with the `commit` command
       to decide one by one which files or hunks should be part of the commit
       in addition to contents in the index,
       before finalizing the operation. See the *Interactive Mode* section of
       [git-add](cmd://git/add) to learn how to operate these modes.

    The `--dry-run` option can be used to obtain a
    summary of what is included by any of the above for the next
    commit by giving the same set of parameters (options and paths).

    If you make a commit and then find a mistake immediately after
    that, you can recover from it with `git reset`.

    :git-commit: 1
  flag:
    all: |-
      Automatically stage files that have
      been modified and deleted, but new files you have not
      told Git about are not affected.
    allow-empty: |-
      Usually recording a commit that has the exact same tree as its
      sole parent commit is a mistake, and the command prevents you
      from making such a commit.  This option bypasses the safety, and
      is primarily for use by foreign SCM interface scripts.
    allow-empty-message: |-
      Create a commit with an empty commit message without using plumbing
      commands like [git-commit-tree](cmd://git/commit-tree). Like `--allow-empty`, this
      command is primarily for use by foreign SCM interface scripts.
    amend: |
      Replace the tip of the current branch by creating a new commit. The
      recorded tree is prepared as usual (including the effect of the `-i` and
      `-o` options and explicit pathspec), and the message from the original
      commit is used as the starting point, instead of an empty message, when
      no other message is specified from the command line via options such as
      `-m`, `-F`, `-c`, etc. The new commit has the same parents and author as
      the current one (the `--reset-author` option can countermand this).

      It is a rough equivalent for:

      ```sh
      $ git reset --soft HEAD^
      $ ... do something else to come up with the right tree ...
      $ git commit -c ORIG_HEAD
      ```

      but can be used to amend a merge commit.

      You should understand the implications of rewriting history if you amend
      a commit that has already been published. (See the "RECOVERING FROM
      UPSTREAM REBASE" section in [git-rebase](cmd://git/rebase).)
    author: |-
      Override the commit author. Specify an explicit author using the
      standard `A U Thor <author@example.com>` format. Otherwise _<author>_
      is assumed to be a pattern and is used to search for an existing
      commit by that author (i.e. `git rev-list --all -i --author=<author>`);
      the commit author is then copied from the first such commit found.
    branch: |-
      Show the branch and tracking info even in short-format. See
      [git-status](cmd://git/status) for details.
    cleanup: |-
      Determine how the supplied commit message should be
      cleaned up before committing.  The `<mode>` can be `strip`,
      `whitespace`, `verbatim`, `scissors` or `default`.
    date: Override the author date used in the commit.
    dry-run: |-
      Do not create a commit, but show a list of paths that are
      to be committed, paths with local changes that will be left
      uncommitted and paths that are untracked.
    edit: |-
      Let the user further edit the message taken from _<file>_
      with `-F <file>`, command line with `-m <message>`, and
      from _<commit>_ with `-C <commit>`.
    file: |-
      Take the commit message from _<file>_.  Use `-` to
      read the message from the standard input.
    fixup: |-
      Create a new commit which "fixes up" _<commit>_ when applied with
      `git rebase --autosquash`. Plain `--fixup=<commit>` creates a
      "fixup!" commit which changes the content of _<commit>_ but leaves
      its log message untouched. `--fixup=amend:<commit>` is similar but
      creates an "amend!" commit which also replaces the log message of
      _<commit>_ with the log message of the "amend!" commit.
      `--fixup=reword:<commit>` creates an "amend!" commit which
      replaces the log message of _<commit>_ with its own log message
      but makes no changes to the content of _<commit>_.

      The commit created by plain `--fixup=<commit>` has a title
      composed of "fixup!" followed by the title of _<commit>_,
      and is recognized specially by `git rebase --autosquash`. The `-m`
      option may be used to supplement the log message of the created
      commit, but the additional commentary will be thrown away once the
      "fixup!" commit is squashed into _<commit>_ by
      `git rebase --autosquash`.

      The commit created by `--fixup=amend:<commit>` is similar but its
      title is instead prefixed with "amend!". The log message of
      _<commit>_ is copied into the log message of the "amend!" commit and
      opened in an editor so it can be refined. When `git rebase --autosquash` squashes the "amend!" commit into _<commit>_, the
      log message of _<commit>_ is replaced by the refined log message
      from the "amend!" commit. It is an error for the "amend!" commit's
      log message to be empty unless `--allow-empty-message` is
      specified.

      `--fixup=reword:<commit>` is shorthand for `--fixup=amend:<commit> --only`. It creates an "amend!" commit with only a log message
      (ignoring any changes staged in the index). When squashed by `git rebase --autosquash`, it replaces the log message of _<commit>_
      without making any other changes.

      Neither "fixup!" nor "amend!" commits change authorship of
      _<commit>_ when applied by `git rebase --autosquash`.
      See [git-rebase](cmd://git/rebase) for details.
    gpg-sign: |-
      GPG-sign commits. The _<key-id>_ is optional and
      defaults to the committer identity; if specified, it must be
      stuck to the option without a space. `--no-gpg-sign` is useful to
      countermand both `commit.gpgSign` configuration variable, and
      earlier `--gpg-sign`.
    include: |-
      Before making a commit out of staged contents so far,
      stage the contents of paths given on the command line
      as well.  This is usually not what you want unless you
      are concluding a conflicted merge.
    long: |-
      When doing a dry-run, give the output in the long-format. This
      is the default output of [git-status](cmd://git/status). Implies
      `--dry-run`.
    message: |-
      Use _<msg>_ as the commit message.
      If multiple `-m` options are given, their values are
      concatenated as separate paragraphs.

      The `-m` option is mutually exclusive with `-c`, `-C`, and `-F`.
    no-edit: |-
      Use the selected commit message without launching an editor.
      For example, `git commit --amend --no-edit` amends a commit
      without changing its commit message.
    no-gpg-sign: |-
      GPG-sign commits. The _<key-id>_ is optional and
      defaults to the committer identity; if specified, it must be
      stuck to the option without a space. `--no-gpg-sign` is useful to
      countermand both `commit.gpgSign` configuration variable, and
      earlier `--gpg-sign`.
    no-post-rewrite: Bypass the `post-rewrite` hook.
    no-signoff: |-
      Add a `Signed-off-by` trailer by the committer at the end of the commit
      log message.  The meaning of a signoff depends on the project
      to which you're committing.  For example, it may certify that
      the committer has the rights to submit the work under the
      project's license or agrees to some contributor representation,
      such as a Developer Certificate of Origin.
      (See https://developercertificate.org for the one used by the
      Linux kernel and Git projects.)  Consult the documentation or
      leadership of the project to which you're contributing to
      understand how the signoffs are used in that project.

      The `--no-signoff` option can be used to countermand an earlier `--signoff`
      option on the command line.

      Git does not (and will not) have a configuration variable to enable
      the `--signoff` command line option by default; see the
      `commit.signoff` entry in [gitfaq](man://gitfaq/7) for more details.
    no-status: |-
      Do not include the output of [git-status](cmd://git/status) in the
      commit message template when using an editor to prepare the
      default commit message.
    no-verify: |
      By default, the pre-commit and commit-msg hooks are run. When any of
      `--no-verify` or `-n` is given, these are bypassed. See also
      [githooks](man://githooks/5).
    'null': |-
      When showing `short` or `porcelain` [git-status](cmd://git/status) output, print the
      filename verbatim and terminate the entries with _NUL_, instead of _LF_.
      If no format is given, implies the `--porcelain` output format.
      Without the `-z` option, filenames with "unusual" characters are quoted as explained for the configuration variable `core.quotePath`
      (see [git-config](cmd://git/config)).
    only: |-
      Make a commit by taking the updated working tree contents
      of the paths specified on the
      command line, disregarding any contents that have been
      staged for other paths. This is the default mode of operation of
      `git commit` if any paths are given on the command line,
      in which case this option can be omitted.
      If this option is specified together with `--amend`, then
      no paths need to be specified, which can be used to amend
      the last commit without committing changes that have
      already been staged. If used together with `--allow-empty`
      paths are also not required, and an empty commit will be created.
    patch: |-
      Use the interactive patch selection interface to choose
      which changes to commit. See [git-add](cmd://git/add) for
      details.
    pathspec-file-nul: |-
      Only meaningful with `--pathspec-from-file`. Pathspec elements are
      separated with _NUL_ character and all other characters are taken
      literally (including newlines and quotes).
    pathspec-from-file: |-
      Pass pathspec in _<file>_ instead of commandline args. If
      _<file>_ is exactly `-` then standard input is used. Pathspec
      elements are separated by _LF_ or _CR_/_LF_. Pathspec elements can be
      quoted as explained for the configuration variable `core.quotePath`
      (see [git-config](cmd://git/config)). See also `--pathspec-file-nul` and
      global `--literal-pathspecs`.
    porcelain: |-
      When doing a dry-run, give the output in a porcelain-ready
      format. See [git-status](cmd://git/status) for details. Implies
      `--dry-run`.
    quiet: Suppress commit summary message.
    reedit-message: |-
      Like `-C`, but with `-c` the editor is invoked, so that
      the user can further edit the commit message.
    reset-author: |-
      When used with `-C`/`-c`/`--amend` options, or when committing after a
      conflicting cherry-pick, declare that the authorship of the
      resulting commit now belongs to the committer. This also renews
      the author timestamp.
    reuse-message: |-
      Take an existing _<commit>_ object, and reuse the log message
      and the authorship information (including the timestamp)
      when creating the commit.
    short: |-
      When doing a dry-run, give the output in the short-format. See
      [git-status](cmd://git/status) for details. Implies `--dry-run`.
    signoff: |-
      Add a `Signed-off-by` trailer by the committer at the end of the commit
      log message.  The meaning of a signoff depends on the project
      to which you're committing.  For example, it may certify that
      the committer has the rights to submit the work under the
      project's license or agrees to some contributor representation,
      such as a Developer Certificate of Origin.
      (See https://developercertificate.org for the one used by the
      Linux kernel and Git projects.)  Consult the documentation or
      leadership of the project to which you're contributing to
      understand how the signoffs are used in that project.

      The `--no-signoff` option can be used to countermand an earlier `--signoff`
      option on the command line.

      Git does not (and will not) have a configuration variable to enable
      the `--signoff` command line option by default; see the
      `commit.signoff` entry in [gitfaq](man://gitfaq/7) for more details.
    squash: |-
      Construct a commit message for use with `git rebase --autosquash`.
      The commit message title is taken from the specified
      commit with a prefix of "squash! ".  Can be used with additional
      commit message options (`-m`/`-c`/`-C`/`-F`). See
      [git-rebase](cmd://git/rebase) for details.
    status: |-
      Include the output of [git-status](cmd://git/status) in the commit
      message template when using an editor to prepare the commit
      message.  Defaults to on, but can be used to override
      configuration variable `commit.status`.
    template: |-
      When editing the commit message, start the editor with the
      contents in _<file>_.  The `commit.template` configuration
      variable is often used to give this option implicitly to the
      command.  This mechanism can be used by projects that want to
      guide participants with some hints on what to write in the message
      in what order.  If the user exits the editor without editing the
      message, the commit is aborted.  This has no effect when a message
      is given by other means, e.g. with the `-m` or `-F` options.
    trailer: |
      Specify a (&lt;token&gt;, &lt;value&gt;) pair that should be applied as
      a trailer. (e.g.
      `git commit --trailer "Signed-off-by:C O Mitter \ <committer@example.com>" --trailer "Helped-by:C O Mitter \ <committer@example.com>"`
      will add the "Signed-off-by" trailer and the "Helped-by" trailer to the
      commit message.) The `trailer.*` configuration variables
      ([git-interpret-trailers](cmd://git/interpret-trailers)) can be
      used to define if a duplicated trailer is omitted, where in the run of
      trailers each trailer would appear, and other details.
    untracked-files: |
      Show untracked files.

      The mode parameter is optional (defaults to *all*), and is used to
      specify the handling of untracked files; when -u is not used, the
      default is *normal*, i.e. show untracked files and directories.

      The possible options are:

      -   *no* - Show no untracked files

      -   *normal* - Shows untracked files and directories

      -   *all* - Also shows individual files in untracked directories.

      All usual spellings for Boolean value `true` are taken as `normal` and
      `false` as `no`. The default can be changed using the
      status.showUntrackedFiles configuration variable documented in
      [git-config](cmd://git/config).
    verbose: |-
      Show unified diff between the `HEAD` commit and what
      would be committed at the bottom of the commit message
      template to help the user describe the commit by reminding
      what changes the commit has.
      Note that this diff output doesn't have its
      lines prefixed with `#`. This diff will not be a part
      of the commit message. See the `commit.verbose` configuration
      variable in [git-config](cmd://git/config).

      If specified twice, show in addition the unified diff between
      what would be committed and the worktree files, i.e. the unstaged
      changes to tracked files.
