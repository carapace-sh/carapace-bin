# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: show branches and their commits
group: main
flags:
  --decorate-refs-exclude=: do not decorate refs that match <pattern>
  --decorate-refs=: only decorate refs that match <pattern>
  --decorate?: decorate options
  --mailmap: alias of --use-mailmap
  --source: show source
  --use-mailmap: Use mail map file
  -L=: Process line range n,m in file, counting from 1
  -q, --quiet: suppress diff output
documentation:
  command: |-
    Shows one or more objects (blobs, trees, tags and commits).

    For commits it shows the log message and textual diff. It also
    presents the merge commit in a special format as produced by
    `git diff-tree --cc`.

    For tags, it shows the tag message and the referenced objects.

    For trees, it shows the names (equivalent to `git ls-tree`
    with `--name-only`).

    For plain blobs, it shows the plain contents.

    Some options that `git log` command understands can be used to
    control how the changes the commit introduces are shown.

    This manual page describes only the most frequently used options.
  flag:
    quiet: |-
      Suppress diff output. Only the commit metadata (author, date,
      message) is shown.
