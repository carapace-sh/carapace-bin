# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a stash entry without reflog entry

documentation:
  command: >-
    Create a stash entry (which is a regular commit object) and return its object name, without storing it anywhere in the ref namespace. This is intended to be useful for scripts. It is probably not the command you want to use; see `git stash push` instead.
