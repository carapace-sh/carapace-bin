# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: rebase
description: Reapply commits on top of another base tip
group: main
flags:
  --abort: abort and check out the original branch
  --apply: use apply strategies to rebase
  --autosquash: move commits that begin with squash!/fixup! under -i
  --autostash: automatically stash/stash pop before and after
  --committer-date-is-author-date: passed to 'git am'
  --continue: continue
  --edit-todo: edit the todo list during an interactive rebase
  --empty=: how to handle commits that become empty
  --fork-point: use 'merge-base --fork-point' to refine upstream
  --ignore-date: passed to 'git am'
  --ignore-whitespace: passed to 'git am'
  --keep-base: use the merge-base of upstream and branch as the current base
  --no-ff: cherry-pick all commits, even if unchanged
  --no-verify: allow pre-rebase hook to run
  --onto=: rebase onto given branch instead of upstream
  --quit: abort but keep HEAD where it is
  --reapply-cherry-picks: apply all changes, even those already present upstream
  --rerere-autoupdate: update the index with reused conflict resolution if possible
  --reschedule-failed-exec: automatically re-schedule any `exec` that fails
  --root: rebase all reachable commits up to the root(s)
  --show-current-patch: show the patch file being applied or merged
  --signoff: 'add a Signed-off-by: line to each commit'
  --skip: skip current patch and continue
  --whitespace=: passed to 'git apply'
  -C=: passed to 'git apply'
  -S, --gpg-sign?: GPG-sign commits
  -X, --strategy-option=: pass the argument through to the merge strategy
  -f, --force-rebase: cherry-pick all commits, even if unchanged
  -i, --interactive: let the user edit the list of commits to rebase
  -m, --merge: use merging strategies to rebase
  -n, --no-stat: do not show diffstat of what changed upstream
  -q, --quiet: be quiet. implies --no-stat
  -r, --rebase-merges?: try to rebase merges instead of skipping them
  -s, --strategy=: use the given merge strategy
  -v, --verbose: display a diffstat of what changed upstream
  -x, --exec=: add exec lines after each commit of the editable list
documentation:
  command: |-
    Transplant a series of commits onto a different starting point.
    You can also use `git rebase` to reorder or combine commits: see INTERACTIVE
    MODE below for how to do that.

    For example, imagine that you have been working on the `topic` branch in this
    history, and you want to "catch up" to the work done on the `master` branch.

    ```
              A---B---C topic
             /
        D---E---F---G master
    ```

    You want to transplant the commits you made on `topic` since it diverged from
    `master` (i.e. A, B, and C), on top of the current `master`.  You can do this
    by running `git rebase master` while the `topic` branch is checked out.  If you
    want to rebase `topic` while on another branch, `git rebase master topic` is a
    shortcut for `git checkout topic && git rebase master`.

    ```
                      A`--B'--C` topic
                     /
        D---E---F---G master
    ```

    If there is a merge conflict during this process, `git rebase` will stop at the
    first problematic commit and leave conflict markers. If this happens, you can do
    one of these things:

    1. Resolve the conflict. You can use `git diff` to find the markers (<<<<<<)
       and make edits to resolve the conflict. For each file you edit, you need to
       tell Git that the conflict has been resolved. You can mark the conflict as
       resolved with  `git add <filename>`. After resolving all of the conflicts,
       you can continue the rebasing process with

       git rebase --continue

    2. Stop the `git rebase` and return your branch to its original state with

       git rebase --abort

    3. Skip the commit that caused the merge conflict with

       git rebase --skip

    If you don't specify an `<upstream>` to rebase onto, the upstream configured in
    `branch.<name>.remote` and `branch.<name>.merge` options will be used (see
    [git-config](cmd://git/config) for details) and the `--fork-point` option is
    assumed.  If you are currently not on any branch or if the current
    branch does not have a configured upstream, the rebase will abort.

    Here is a simplified description of what `git rebase <upstream>` does:

    1. Make a list of all commits on your current branch since it branched
       off from `<upstream>` that do not have an equivalent commit in
       `<upstream>`.
    2. Check out `<upstream>` with the equivalent of
       `git checkout --detach <upstream>`.
    3. Replay the commits, one by one, in order. This is similar to running
       `git cherry-pick <commit>` for each commit. See REBASING MERGES for how merges
       are handled.
    4. Update your branch to point to the final commit with the equivalent
       of `git checkout -B <branch>`.

    When starting the rebase, `ORIG_HEAD` is set to point to the commit at the tip
    of the to-be-rebased branch. However, `ORIG_HEAD` is not guaranteed to still
    point to that commit at the end of the rebase if other commands that change
    `ORIG_HEAD` (like `git reset`) are used during the rebase. The previous branch
    tip, however, is accessible using the reflog of the current branch (i.e. `@{1}`,
    see [gitrevisions](man://gitrevisions/7)).

    ### TRANSPLANTING A TOPIC BRANCH WITH --ONTO

    Here is how you would transplant a topic branch based on one
    branch to another, to pretend that you forked the topic branch
    from the latter branch, using `rebase --onto`.

    First let's assume your 'topic' is based on branch 'next'.
    For example, a feature developed in 'topic' depends on some
    functionality which is found in 'next'.

    ```
        o---o---o---o---o  master
             \
              o---o---o---o---o  next
                               \
                                o---o---o  topic
    ```

    We want to make 'topic' forked from branch 'master'; for example,
    because the functionality on which 'topic' depends was merged into the
    more stable 'master' branch. We want our tree to look like this:

    ```
        o---o---o---o---o  master
            |            \
            |             o'--o'--o'  topic
             \
              o---o---o---o---o  next
    ```

    We can get this using the following command:

        git rebase --onto master next topic

    Another example of --onto option is to rebase part of a
    branch.  If we have the following situation:

    ```
                                H---I---J topicB
                               /
                      E---F---G  topicA
                     /
        A---B---C---D  master
    ```

    then the command

        git rebase --onto master topicA topicB

    would result in:

    ```
                     H'--I'--J'  topicB
                    /
                    | E---F---G  topicA
                    |/
        A---B---C---D  master
    ```

    This is useful when topicB does not depend on topicA.

    A range of commits could also be removed with rebase.  If we have
    the following situation:

    ```
        E---F---G---H---I---J  topicA
    ```

    then the command

        git rebase --onto topicA~5 topicA~3 topicA

    would result in the removal of commits F and G:

    ```
        E---H'---I'---J'  topicA
    ```

    This is useful if F and G were flawed in some way, or should not be
    part of topicA.  Note that the argument to `--onto` and the `<upstream>`
    parameter can be any valid commit-ish.
  flag:
    C: |-
      Ensure at least `<n>` lines of surrounding context match before
      and after each change.  When fewer lines of surrounding
      context exist they all must match.  By default no context is
      ever ignored.  Implies `--apply`.
    rerere-autoupdate: |-
      After the rerere mechanism reuses a recorded resolution on
      the current conflict to update the files in the working
      tree, allow it to also update the index with the result of
      resolution.  `--no-rerere-autoupdate` is a good way to
      double-check what [git-rerere](cmd://git/rerere) did and catch potential
      mismerges, before committing the result to the index with a
      separate [git-add](cmd://git/add).
    autosquash: |-
      Automatically squash commits with specially formatted messages into
      previous commits being rebased.  If a commit message starts with
      "squash! ", "fixup! " or "amend! ", the remainder of the title
      is taken as a commit specifier, which matches a previous commit if it
      matches the title or the hash of that commit.  If no commit
      matches fully, matches of the specifier with the start of commit
      titles are considered.

      In the rebase todo list, the actions of squash, fixup and amend commits are
      changed from `pick` to `squash`, `fixup` or `fixup -C`, respectively, and they
      are moved right after the commit they modify.  The `--interactive` option can
      be used to review and edit the todo list before proceeding.

      The recommended way to create commits with squash markers is by using the
      `--squash`, `--fixup`, `--fixup=amend:` or `--fixup=reword:` options of
      [git-commit](cmd://git/commit), which take the target commit as an argument and
      automatically fill in the title of the new commit from that.

      Setting configuration variable `rebase.autoSquash` to true enables auto-squashing by default for interactive rebase.  The `--no-autosquash`
      option can be used to override that setting.
    autostash: |-
      Automatically create a temporary stash entry before the operation
      begins, and apply it after the operation ends.  This means
      that you can run rebase on a dirty worktree.  However, use
      with care: the final stash application after a successful
      rebase might result in non-trivial conflicts.
    committer-date-is-author-date: |-
      Instead of using the current time as the committer date, use
      the author date of the commit being rebased as the committer
      date. This option implies `--force-rebase`.

      WARNING: The history walking machinery assumes that commits have
      non-decreasing commit timestamps. You should consider if you really need
      to use this option. Then you should only use this option to override the
      committer date when rebasing commits on top of a base which commit is
      older (in terms of the commit date) than the oldest commit you are
      applying (in terms of the author date).
    empty: How to handle commits that become empty after rebasing (because they contain a subset of already upstream changes). With `drop` (default), empty commits are removed. With `keep`, empty commits are retained. With `stop`, the rebase halts to let you choose. Note that commits which start empty are kept by default, and clean cherry-picks are detected and dropped as a preliminary step.
    exec: Append "exec <cmd>" after each line creating a commit in the final history. `<cmd>` will be interpreted as one or more shell commands. Any command that fails will interrupt the rebase, with exit code 1. You may execute several commands by either using one instance of `--exec` with several commands or by giving more than one `--exec`.
    fork-point: |-
      Use reflog to find a better common ancestor between `<upstream>`
      and `<branch>` when calculating which commits have been
      introduced by `<branch>`.

      When `--fork-point` is active, `fork_point` will be used instead of
      `<upstream>` to calculate the set of commits to rebase, where
      `fork_point` is the result of `git merge-base --fork-point <upstream> <branch>` command (see [git-merge-base](cmd://git/merge-base)).  If `fork_point`
      ends up being empty, the `<upstream>` will be used as a fallback.

      If `<upstream>` or `--keep-base` is given on the command line, then
      the default is `--no-fork-point`, otherwise the default is
      `--fork-point`. See also `rebase.forkpoint` in [git-config](cmd://git/config).

      If your branch was based on `<upstream>` but `<upstream>` was rewound and
      your branch contains commits which were dropped, this option can be used
      with `--keep-base` in order to drop those commits from your branch.
    gpg-sign: |-
      GPG-sign commits. The `keyid` argument is optional and
      defaults to the committer identity; if specified, it must be
      stuck to the option without a space. `--no-gpg-sign` is useful to
      countermand both `commit.gpgSign` configuration variable, and
      earlier `--gpg-sign`.
    ignore-date: "Instead of using the author date of the original commit, use\nthe current time as the\tauthor date of the rebased commit.  This\noption implies `--force-rebase`."
    ignore-whitespace: |-
      Ignore whitespace differences when trying to reconcile
      differences. Currently, each backend implements an approximation of
      this behavior:

      apply backend;;
      When applying a patch, ignore changes in whitespace in context
      lines. Unfortunately, this means that if the "old" lines being
      replaced by the patch differ only in whitespace from the existing
      file, you will get a merge conflict instead of a successful patch
      application.

      merge backend;;
      Treat lines with only whitespace changes as unchanged when merging.
      Unfortunately, this means that any patch hunks that were intended
      to modify whitespace and nothing else will be dropped, even if the
      other side had no changes that conflicted.
    interactive: |-
      Make a list of the commits which are about to be rebased.  Let the
      user edit that list before rebasing.  This mode can also be used to
      split commits (see SPLITTING COMMITS below).

      The commit list format can be changed by setting the configuration option
      rebase.instructionFormat.  A customized instruction format will automatically
      have the commit hash prepended to the format.
    keep-base: Set the starting point to the merge base of `<upstream>` and `<branch>`. Equivalent to `git rebase --reapply-cherry-picks --no-fork-point --onto <upstream>...<branch> <upstream> <branch>`. Useful when developing a feature on top of an upstream branch and you want to keep the base commit unchanged. Implies `--reapply-cherry-picks`.
    no-ff: |-
      Individually replay all rebased commits instead of fast-forwarding
      over the unchanged ones.  This ensures that the entire history of
      the rebased branch is composed of new commits.

      You may find this helpful after reverting a topic branch merge, as this option
      recreates the topic branch with fresh commits so it can be remerged
      successfully without needing to "revert the reversion" (see the
      revert-a-faulty-merge How-To for
      details).
    no-stat: Do not show a diffstat as part of the rebase process.
    no-verify: This option bypasses the pre-rebase hook.  See also [githooks](man://githooks/5).
    onto: Starting point at which to create the new commits. If `--onto` is not specified, the starting point is `<upstream>`. May be any valid commit, and not just an existing branch name. As a special case, you may use "A...B" as a shortcut for the merge base of A and B if there is exactly one merge base.
    quiet: Be quiet. Implies `--no-stat`.
    reapply-cherry-picks: Reapply all clean cherry-picks of any upstream commit instead of preemptively dropping them. If these commits become empty after rebasing, the behavior is controlled by `--empty`. In the absence of `--keep-base`, these commits are automatically dropped by default.
    rebase-merges: |-
      By default, a rebase will simply drop merge commits from the todo
      list, and put the rebased commits into a single, linear branch.
      With `--rebase-merges`, the rebase will instead try to preserve
      the branching structure within the commits that are to be rebased,
      by recreating the merge commits. Any resolved merge conflicts or
      manual amendments in these merge commits will have to be
      resolved/re-applied manually. `--no-rebase-merges` can be used to
      countermand both the `rebase.rebaseMerges` config option and a previous
      `--rebase-merges`.

      When rebasing merges, there are two modes: `rebase-cousins` and
      `no-rebase-cousins`. If the mode is not specified, it defaults to
      `no-rebase-cousins`. In `no-rebase-cousins` mode, commits which do not have
      `<upstream>` as direct ancestor will keep their original branch point, i.e.
      commits that would be excluded by [git-log](cmd://git/log)'s `--ancestry-path`
      option will keep their original ancestry by default. In `rebase-cousins` mode,
      such commits are instead rebased onto `<upstream>` (or `<onto>`, if
      specified).

      It is currently only possible to recreate the merge commits using the
      `ort` merge strategy; different merge strategies can be used only via
      explicit `exec git merge -s <strategy> [...]` commands.

      See also REBASING MERGES and INCOMPATIBLE OPTIONS below.
    reschedule-failed-exec: |-
      Automatically reschedule `exec` commands that failed. This only makes
      sense in interactive mode (or when an `--exec` option was provided).

      This option applies once a rebase is started. It is preserved for the whole
      rebase based on, in order, the command line option provided to the initial `git rebase`, the `rebase.rescheduleFailedExec` configuration (see
      [git-config](cmd://git/config) or "CONFIGURATION" below), or it defaults to false.

      Recording this option for the whole rebase is a convenience feature. Otherwise
      an explicit `--no-reschedule-failed-exec` at the start would be overridden by
      the presence of a `rebase.rescheduleFailedExec=true` configuration when `git rebase --continue` is invoked. Currently, you cannot pass
      `--[no-]reschedule-failed-exec` to `git rebase --continue`.
    root: |-
      Rebase all commits reachable from `<branch>`, instead of
      limiting them with an `<upstream>`.  This allows you to rebase
      the root commit(s) on a branch.
    signoff: |-
      Add a `Signed-off-by` trailer to all the rebased commits. Note
      that if `--interactive` is given then only commits marked to be
      picked, edited or reworded will have the trailer added.
    strategy: Use the given merge strategy instead of the default `ort`. This implies `--merge`. Because `git rebase` replays each commit from the working branch on top of the `<upstream>` branch using the given strategy, using the `ours` strategy simply empties all patches from the `<branch>`, which makes little sense.
    strategy-option: Pass the <strategy-option> through to the merge strategy. This implies `--merge` and, if no strategy has been specified, `-s ort`. Note the reversal of 'ours' and 'theirs' as noted for the `-m` option.
    verbose: Be verbose. Implies `--stat`.
    whitespace: |-
      This flag is passed to the `git apply` program
      (see [git-apply](cmd://git/apply)) that applies the patch.
      Implies `--apply`.
