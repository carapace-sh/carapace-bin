# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: branch
description: List, create, or delete branches
group: main
flags:
  --abbrev=: Alter the sha1s minimum display length in the output listing.
  --color=: Color branches to highlight current, local, and remote-tracking branches.
  --column: Display branch listing in columns
  --contains=: Only list branches which contain the specified commit (HEAD if not specified).
  --create-reflog: Create the branchs reflog.
  --edit-description: Open an editor and edit the text to explain what the branch is for.
  --format=: A string that interpolates %(fieldname) from a branch ref being shown and the object it points at.
  --merged=: Only list branches whose tips are reachable from the specified commit (HEAD if not specified).
  --no-abbrev: Display the full sha1s in the output listing rather than abbreviating them.
  --no-color: Turn off branch colors, even when the configuration file gives the default to color output.
  --no-column: Do not display branch listing in columns
  --no-contains=: Only list branches which dont contain the specified commit (HEAD if not specified).
  --no-merged=: Only list branches whose tips are not reachable from the specified commit (HEAD if not specified).
  --no-track: Do not set up upstream configuration, even if the branch.autoSetupMerge configuration variable is true.
  --omit-empty: Do not print a newline after formatted refs
  --points-at=: Only list branches of the given object.
  --recurse-submodules: Causes the current command to recurse into submodules
  --set-upstream-to=: Set up <branchname>s tracking information so <upstream> is considered <branchname>s upstream branch.
  --show-current: Print the name of the current branch.
  --sort=: Sort based on the key given.
  --unset-upstream: Remove the upstream information for <branchname>.
  -C: Shortcut for --copy --force.
  -D: Shortcut for --delete --force.
  -M: Shortcut for --move --force.
  -a, --all: List both remote-tracking branches and local branches.
  -c, --copy: Copy a branch and the corresponding reflog.
  -d, --delete: Delete a branch.
  -f, --force: Reset <branchname> to <startpoint>, even if <branchname> exists already.
  -i, --ignore-case: Sorting and filtering branches are case insensitive.
  -l, --list: List branches.
  -m, --move: Move/rename a branch and the corresponding reflog.
  -q, --quiet: Be more quiet when creating or deleting a branch, suppressing non-error messages.
  -r, --remotes: List or delete (if used with -d) the remote-tracking branches.
  -t, --track?: When creating a new branch, set up branch.<name>.remote and branch.<name>.merge configuration entries to mark the start-point branch as upstream from the new branch.
  -v, --verbose*: Verbose output
documentation:
  command: |-
    If `--list` is given, or if there are no non-option arguments, existing
    branches are listed; the current branch will be highlighted in green and
    marked with an asterisk.  Any branches checked out in linked worktrees will
    be highlighted in cyan and marked with a plus sign. Option `-r` causes the
    remote-tracking branches to be listed,
    and option `-a` shows both local and remote branches.

    If a `<pattern>`
    is given, it is used as a shell wildcard to restrict the output to
    matching branches. If multiple patterns are given, a branch is shown if
    it matches any of the patterns.

    Note that when providing a
    `<pattern>`, you must use `--list`; otherwise the command may be interpreted
    as branch creation.

    With `--contains`, shows only the branches that contain the named commit
    (in other words, the branches whose tip commits are descendants of the
    named commit), `--no-contains` inverts it. With `--merged`, only branches
    merged into the named commit (i.e. the branches whose tip commits are
    reachable from the named commit) will be listed.  With `--no-merged` only
    branches not merged into the named commit will be listed.  If the _<commit>_
    argument is missing it defaults to `HEAD` (i.e. the tip of the current
    branch).

    The command's second form creates a new branch head named _<branch-name>_
    which points to the current `HEAD`, or _<start-point>_ if given. As a
    special case, for _<start-point>_, you may use `<rev-A>...<rev-B>` as a
    shortcut for the merge base of _<rev-A>_ and _<rev-B>_ if there is exactly
    one merge base. You can leave out at most one of _<rev-A>_ and _<rev-B>_,
    in which case it defaults to `HEAD`.

    Note that this will create the new branch, but it will not switch the
    working tree to it; use `git switch <new-branch>` to switch to the
    new branch.

    When a local branch is started off a remote-tracking branch, Git sets up the
    branch (specifically the `branch.<name>.remote` and `branch.<name>.merge`
    configuration entries) so that `git pull` will appropriately merge from
    the remote-tracking branch. This behavior may be changed via the global
    `branch.autoSetupMerge` configuration flag. That setting can be
    overridden by using the `--track` and `--no-track` options, and
    changed later using `git branch --set-upstream-to`.

    With a `-m` or `-M` option, _<old-branch>_ will be renamed to _<new-branch>_.
    If _<old-branch>_ had a corresponding reflog, it is renamed to match
    _<new-branch>_, and a reflog entry is created to remember the branch
    renaming. If _<new-branch>_ exists, `-M` must be used to force the rename
    to happen.

    The `-c` and `-C` options have the exact same semantics as `-m` and
    `-M`, except instead of the branch being renamed, it will be copied to a
    new name, along with its config and reflog.

    With a `-d` or `-D` option, _<branch-name>_ will be deleted.  You may
    specify more than one branch for deletion.  If the branch currently
    has a reflog then the reflog will also be deleted.

    Use `-r` together with `-d` to delete remote-tracking branches. Note, that it
    only makes sense to delete remote-tracking branches if they no longer exist
    in the remote repository or if `git fetch` was configured not to fetch
    them again. See also the `prune` subcommand of [git-remote](cmd://git/remote) for a
    way to clean up all obsolete remote-tracking branches.
  flag:
    C: Shortcut for `--copy --force`.
    D: Shortcut for `--delete --force`.
    M: Shortcut for `--move --force`.
    abbrev: |-
      In the verbose listing that show the commit object name,
      show the shortest prefix that is at least _<n>_ hexdigits
      long that uniquely refers the object.
      The default value is 7 and can be overridden by the `core.abbrev`
      config option.
    all: |-
      List both remote-tracking branches and local branches.
      Combine with `--list` to match optional pattern(s).
    copy: Copy a branch, together with its config and reflog.
    create-reflog: |-
      Create the branch's reflog.  This activates recording of
      all changes made to the branch ref, enabling use of date
      based sha1 expressions such as `<branch-name>@{yesterday}`.
      Note that in non-bare repositories, reflogs are usually
      enabled by default by the `core.logAllRefUpdates` config option.
      The negated form `--no-create-reflog` only overrides an earlier
      `--create-reflog`, but currently does not negate the setting of
      `core.logAllRefUpdates`.
    delete: |-
      Delete a branch. The branch must be fully merged in its
      upstream branch, or in `HEAD` if no upstream was set with
      `--track` or `--set-upstream-to`.
    edit-description: |-
      Open an editor and edit the text to explain what the branch is
      for, to be used by various other commands (e.g. `format-patch`,
      `request-pull`, and `merge` (if enabled)). Multi-line explanations
      may be used.
    force: |-
      Reset _<branch-name>_ to _<start-point>_, even if _<branch-name>_ exists
      already. Without `-f`, `git branch` refuses to change an existing branch.
      In combination with `-d` (or `--delete`), allow deleting the
      branch irrespective of its merged status, or whether it even
      points to a valid commit. In combination with
      `-m` (or `--move`), allow renaming the branch even if the new
      branch name already exists, the same applies for `-c` (or `--copy`).

      Note that `git branch -f <branch-name> [<start-point>]`, even with `-f`,
      refuses to change an existing branch _<branch-name>_ that is checked out
      in another worktree linked to the same repository.
    ignore-case: Sorting and filtering branches are case insensitive.
    list: |-
      List branches.  With optional `<pattern>...`, e.g. `git`
      branch --list `maint-*'`, list only the branches that match
      the pattern(s).
    move: Move/rename a branch, together with its config and reflog.
    no-abbrev: Display the full sha1s in the output listing rather than abbreviating them.
    no-color: |-
      Turn off branch colors, even when the configuration file gives the
      default to color output.
      Same as `--color=never`.
    no-column: |-
      Display branch listing in columns. See configuration variable
      `column.branch` for option syntax. `--column` and `--no-column`
      without options are equivalent to `always` and `never` respectively.

      This option is only applicable in non-verbose mode.
    no-track: |-
      Do not set up "upstream" configuration, even if the
      `branch.autoSetupMerge` configuration variable is set.
    omit-empty: |-
      Do not print a newline after formatted refs where the format expands
      to the empty string.
    quiet: |-
      Be more quiet when creating or deleting a branch, suppressing
      non-error messages.
    recurse-submodules: |-
      THIS OPTION IS EXPERIMENTAL! Cause the current command to
      recurse into submodules if `submodule.propagateBranches` is
      enabled. See `submodule.propagateBranches` in
      [git-config](cmd://git/config). Currently, only branch creation is
      supported.

      When used in branch creation, a new branch _<branch-name>_ will be created
      in the superproject and all of the submodules in the superproject's
      _<start-point>_. In submodules, the branch will point to the submodule
      commit in the superproject's _<start-point>_ but the branch's tracking
      information will be set up based on the submodule's branches and remotes
      e.g. `git branch --recurse-submodules topic origin/main` will create the
      submodule branch "topic" that points to the submodule commit in the
      superproject's "origin/main", but tracks the submodule's "origin/main".
    remotes: |-
      List or delete (if used with `-d`) the remote-tracking branches.
      Combine with `--list` to match the optional pattern(s).
    set-upstream-to: |-
      Set up _<branch-name>_'s tracking information so _<upstream>_ is
      considered _<branch-name>_'s upstream branch. If no _<branch-name>_
      is specified, then it defaults to the current branch.
    show-current: |-
      Print the name of the current branch. In detached `HEAD` state,
      nothing is printed.
    sort: |-
      Sort based on _<key>_. Prefix `-` to sort in descending
      order of the value. You may use the `--sort=<key>` option
      multiple times, in which case the last key becomes the primary
      key. The keys supported are the same as those in [git-for-each-ref](cmd://git/for-each-ref).
      Sort order defaults to the value configured for the
      `branch.sort` variable if it exists, or to sorting based on the
      full refname (including `refs/...` prefix). This lists
      detached `HEAD` (if present) first, then local branches and
      finally remote-tracking branches. See [git-config](cmd://git/config).
    unset-upstream: |-
      Remove the upstream information for _<branch-name>_. If no branch
      is specified it defaults to the current branch.
    verbose: |-
      When in list mode,
      show sha1 and commit subject line for each head, along with
      relationship to upstream branch (if any). If given twice, print
      the path of the linked worktree (if any) and the name of the upstream
      branch, as well (see also `git remote show <remote>`).  Note that the
      current worktree's `HEAD` will not have its path printed (it will always
      be your current directory).
    color: |-
      Turn off branch colors, even when the configuration file gives the
      default to color output.
      Same as `--color=never`.
    column: |-
      Display branch listing in columns. See configuration variable
      `column.branch` for option syntax. `--column` and `--no-column`
      without options are equivalent to `always` and `never` respectively.

      This option is only applicable in non-verbose mode.
    track: |-
      Do not set up "upstream" configuration, even if the
      `branch.autoSetupMerge` configuration variable is set.
