# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore working tree files
group: main
flags:
  --conflict=: conflict style (merge or diff3)
  --ignore-skip-worktree-bits: do not limit pathspecs to sparse entries only
  --ignore-unmerged: ignore unmerged entries
  --overlay: use overlay mode
  --pathspec-file-nul: pathspec elements are separated with NUL character
  --pathspec-from-file=: read pathspec from file
  --progress: force progress reporting
  --recurse-submodules=: control recursive updating of submodules
  -2, --ours: checkout our version for unmerged files
  -3, --theirs: checkout their version for unmerged files
  -S, --staged: restore the index
  -W, --worktree: restore the working tree (default)
  -m, --merge: perform a 3-way merge with the new branch
  -p, --patch: select hunks interactively
  -q, --quiet: suppress progress reporting
  -s, --source=: which tree-ish to checkout from
documentation:
  command: |-
    Restore specified paths in the working tree with some contents from a
    restore source. If a path is tracked but does not exist in the restore
    source, it will be removed to match the source.

    The command can also be used to restore the content in the index with
    `--staged`, or restore both the working tree and the index with
    `--staged --worktree`.

    By default, if `--staged` is given, the contents are restored from `HEAD`,
    otherwise from the index. Use `--source` to restore from a different commit.

    See "Reset, restore and revert" in [git](man://git/1) for the differences
    between the three commands.
  flag:
    conflict: |-
      The same as `--merge` option above, but changes the way the
      conflicting hunks are presented, overriding the
      `merge.conflictStyle` configuration variable.  Possible values
      are `merge` (default), `diff3`, and `zdiff3`.
    ignore-skip-worktree-bits: |-
      In sparse checkout mode, the default is to only update entries
      matched by _<pathspec>_ and sparse patterns in
      `$GIT_DIR/info/sparse-checkout`. This option ignores the sparse
      patterns and unconditionally restores any files in
      _<pathspec>_.
    ignore-unmerged: |-
      When restoring files on the working tree from the index, do
      not abort the operation if there are unmerged entries and
      neither `--ours`, `--theirs`, `--merge` or `--conflict` is
      specified. Unmerged paths on the working tree are left alone.
    merge: |-
      When restoring files on the working tree from the index,
      recreate the conflicted merge in the unmerged paths.
      This option cannot be used when checking out paths from a
      tree-ish (i.e. with the `--source` option).
    patch: |-
      Interactively select hunks in the difference between the
      restore source and the restore location. See the "Interactive
      Mode" section of [git-add](cmd://git/add) to learn how to operate
      the `--patch` mode.
    pathspec-file-nul: |-
      Only meaningful with `--pathspec-from-file`. Pathspec elements are
      separated with _NUL_ character and all other characters are taken
      literally (including newlines and quotes).
    pathspec-from-file: |-
      Pathspec is passed in _<file>_ instead of commandline args. If
      _<file>_ is exactly `-` then standard input is used. Pathspec
      elements are separated by _LF_ or _CR_/_LF_. Pathspec elements can be
      quoted as explained for the configuration variable `core.quotePath`
      (see [git-config](cmd://git/config)). See also `--pathspec-file-nul` and
      global `--literal-pathspecs`.
    quiet: Quiet, suppress feedback messages. Implies `--no-progress`.
    source: |-
      Restore the working tree files with the content from the given
      tree. It is common to specify the source tree by naming a
      commit, branch or tag associated with it.

      If not specified, the contents are restored from `HEAD` if `--staged` is
      given, otherwise from the index.

      As a special case, you may use `"<rev-A>...<rev-B>"` as a shortcut for the
      merge base of _<rev-A>_ and _<rev-B>_ if there is exactly one merge base. You can
      leave out at most one of _<rev-A>_ and _<rev-B>_, in which case it defaults to `HEAD`.
    staged: |-
      Specify the restore location. If neither option is specified,
      by default the working tree is restored. Specifying `--staged`
      will only restore the index. Specifying both restores both.
    theirs: |-
      When restoring files in the working tree from the index, use
      stage #2 (`ours`) or #3 (`theirs`) for unmerged paths.
      This option cannot be used when checking out paths from a
      tree-ish (i.e. with the `--source` option).

      Note that during `git rebase` and `git pull --rebase`, `ours` and
      `theirs` may appear swapped. See the explanation of the same options
      in [git-checkout](cmd://git/checkout) for details.
    overlay: |-
      In overlay mode, never remove files when restoring. In no-overlay mode,
      remove tracked files that do not appear in the _<tree>_ of
      `--source=<tree>`, to make them match _<tree>_ exactly. The default
      is no-overlay mode.
    progress: |-
      Progress status is reported on the standard error stream
      by default when it is attached to a terminal, unless `--quiet`
      is specified. This flag enables progress reporting even if not
      attached to a terminal, regardless of `--quiet`.
    recurse-submodules: |-
      If _<pathspec>_ names an active submodule and the restore location
      includes the working tree, the submodule will only be updated if
      this option is given, in which case its working tree will be
      restored to the commit recorded in the superproject, and any local
      modifications overwritten. If nothing (or
      `--no-recurse-submodules`) is used, submodules working trees will
      not be updated. Just like [git-checkout](cmd://git/checkout), this will detach
      `HEAD` of the submodule.
