# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: git
description: the stupid content tracker
flags:
    --bare: use $PWD as repository
    --exec-path=: path containing core git-programs
    --git-dir=: path to repository
    --help: display help message
    --html-path: display path to HTML documentation and exit
    --info-path: print the path where the info files are installed and exit
    --list-cmds?: list commands
    --literal-pathspecs: treat pathspecs literally, rather than as glob patterns
    --man-path: print the manpath for the man pages for this version of Git and exit
    --namespace=: set the Git namespace
    --no-replace-objects: do not use replacement refs to replace git objects
    --version: display version information
    --work-tree=: path to working tree
    -C=: run as if git was started in given path
    -P, --no-pager: don't pipe git output into a pager
    -c=: pass configuration parameter to command
    -p, --paginate: pipe output into a pager
documentation:
    command: |
        Git is a fast, scalable, distributed revision control system with an
        unusually rich command set that provides both high-level operations and
        full access to internals.

        See [gittutorial](man://gittutorial/7) to get started, then see
        [giteveryday](man://giteveryday/7) for a useful minimum set of
        commands. The [Git User’s Manual](https://git-scm.com/docs/user-manual) has a more in-depth
        introduction.

        After you mastered the basic concepts, you can come back to this page to
        learn what commands Git offers. You can learn more about individual Git
        commands with "git help command". [gitcli](man://gitcli/7) manual
        page gives you an overview of the command-line command syntax.

        A formatted and hyperlinked copy of the latest Git documentation can be
        viewed at [https://git.github.io/htmldocs/git.html](https://git.github.io/htmldocs/git.html) or
        [https://git-scm.com/docs](https://git-scm.com/docs)
    flag:
        C: |
            Run as if git was started in *&lt;path&gt;* instead of the current
            working directory. When multiple `-C` options are given, each subsequent
            non-absolute `-C <path>` is interpreted relative to the preceding
            `-C <path>`. If *&lt;path&gt;* is present but empty, e.g. `-C ""`, then
            the current working directory is left unchanged.

            This option affects options that expect path name like `--git-dir` and
            `--work-tree` in that their interpretations of the path names would be
            made relative to the working directory caused by the `-C` option. For
            example the following invocations are equivalent:

            ```sh
            git --git-dir=a.git --work-tree=b -C c status
            git --git-dir=c/a.git --work-tree=c/b status
            ```
        bare: |
            Treat the repository as a bare repository. If GIT\_DIR environment is
            not set, it is set to the current working directory.
        c: |
            Pass a configuration parameter to the command. The value given will
            override values from configuration files. The &lt;name&gt; is expected
            in the same format as listed by *git config* (subkeys separated by
            dots).

            Note that omitting the `=` in `git -c foo.bar ...` is allowed and sets
            `foo.bar` to the boolean true value (just like `[foo]bar` would in a
            config file). Including the equals but with an empty value (like
            `git -c foo.bar= ...`) sets `foo.bar` to the empty string which
            `git config --type=bool` will convert to `false`.
        exec-path: |
            Path to wherever your core Git programs are installed. This can also be
            controlled by setting the GIT\_EXEC\_PATH environment variable. If no
            path is given, *git* will print the current setting and then exit.
        git-dir: |
            Set the path to the repository (".git" directory). This can also be
            controlled by setting the `GIT_DIR` environment variable. It can be an
            absolute path or relative path to current working directory.

            Specifying the location of the ".git" directory using this option (or
            `GIT_DIR` environment variable) turns off the repository discovery that
            tries to find a directory with ".git" subdirectory (which is how the
            repository and the top-level of the working tree are discovered), and
            tells Git that you are at the top level of the working tree. If you are
            not at the top-level directory of the working tree, you should tell Git
            where the top-level of the working tree is, with the
            `--work-tree=<path>` option (or `GIT_WORK_TREE` environment variable)

            If you just want to run git as if it was started in `<path>` then use
            `git -C <path>`.
        help: |
            Prints the synopsis and a list of the most commonly used commands. If
            the option `--all` or `-a` is given then all available commands are
            printed. If a Git command is named this option will bring up the manual
            page for that command.

            Other options are available to control how the manual page is displayed.
            See [git-help](cmd://git/help) for more information, because
            `git --help ...` is converted internally into `git help ...`.
        html-path: |
            Print the path, without trailing slash, where Git’s HTML documentation
            is installed and exit.
        info-path: |
            Print the path where the Info files documenting this version of Git are
            installed and exit.
        list-cmds: |
            List commands by group. This is an internal/experimental option and may
            change or be removed in the future. Supported groups are: builtins,
            parseopt (builtin commands that use parse-options), main (all commands
            in libexec directory), others (all other commands in `$PATH` that have
            git- prefix), list-&lt;category&gt; (see categories in
            command-list.txt), nohelpers (exclude helper commands), alias and config
            (retrieve command list from config variable completion.commands)
        literal-pathspecs: |
            Treat pathspecs literally (i.e. no globbing, no pathspec magic). This is
            equivalent to setting the `GIT_LITERAL_PATHSPECS` environment variable
            to `1`.
        man-path: |
            Print the manpath (see `man(1)`) for the man pages for this version of
            Git and exit.
        namespace: |
            Set the Git namespace. See [gitnamespaces](man://gitnamespaces/7) for
            more details. Equivalent to setting the `GIT_NAMESPACE` environment
            variable.
        no-pager: |
            Do not pipe Git output into a pager.
        no-replace-objects: |-
            Do not use replacement refs to replace Git objects. This is equivalent
            to exporting the `GIT_NO_REPLACE_OBJECTS` environment variable with any
            value. See [git-replace](cmd://git/replace) for more information.
        paginate: |
            Pipe all output into *less* (or if set, $PAGER) if standard output is a
            terminal. This overrides the `pager.<cmd>` configuration options (see
            the "Configuration Mechanism" section below).
        version: |
            Prints the Git suite version that the *git* program came from.

            This option is internally converted to `git version ...` and accepts the
            same options as the [git-version](cmd://git/version) command. If
            `--help` is also given, it takes precedence over `--version`.
        work-tree: |
            Set the path to the working tree. It can be an absolute path or a path
            relative to the current working directory. This can also be controlled
            by setting the GIT\_WORK\_TREE environment variable and the
            core.worktree configuration variable (see core.worktree in
            [git-config](man://git-config) for a more detailed discussion).
