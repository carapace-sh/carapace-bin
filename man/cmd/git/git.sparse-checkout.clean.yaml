# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: clean
description: Remove files outside the sparse-checkout definition
flags:
    --dry-run: list directories that would be removed without deleting them
    --verbose: list every file within the directories considered for removal
    -f, --force: allow deletion of files outside the sparse-checkout definition

documentation:
  command: >-
    Opportunistically remove files outside of the sparse-checkout definition. This command requires cone mode to use recursive directory matches to determine which files should be removed. A file is considered for removal if it is contained within a tracked directory that is outside of the sparse-checkout definition. Special cases such as merge conflicts or modified files outside of the sparse-checkout definition could lead to keeping files that would otherwise be removed.
