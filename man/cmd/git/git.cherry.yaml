# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: cherry
description: Find commits yet to be applied to upstream
group: low-level interrogator
flags:
  --abbrev?: use <n> digits to display object names
  -v, --verbose: be verbose
documentation:
  command: |-
    Determine whether there are commits in `<head>..<upstream>` that are
    equivalent to those in the range `<limit>..<head>`.

    The equivalence test is based on the diff, after removing whitespace
    and line numbers.  git-cherry therefore detects when commits have been
    "copied" by means of [git-cherry-pick](cmd://git/cherry-pick), [git-am](cmd://git/am) or
    [git-rebase](cmd://git/rebase).

    Outputs the SHA1 of every commit in `<limit>..<head>`, prefixed with
    `-` for commits that have an equivalent in <upstream>, and `+` for
    commits that do not.
