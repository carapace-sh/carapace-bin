# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: exists
description: Check if a reference exists

documentation:
  command: >-
    Check whether the given reference exists. Returns exit code 0 if it does, 2 if it is missing, and 1 if looking up the reference failed with an error other than the reference being missing. This does not verify whether the reference resolves to an actual object.
