# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: format-patch
description: Prepare patches for e-mail submission
group: main
flags:
  --add-header=: add email header
  --attach?: attach the patch
  --base=: add prerequisite tree info to the patch series
  --cc=: 'add Cc: header'
  --cover-from-description=: generate parts of a cover letter based on a branch's description
  --cover-letter: generate a cover letter
  --creation-factor=: 'percentage by which creation is weighted '
  --filename-max-length=: max length of output filename
  --from?: set From address to <ident> (or committer ident if absent)
  --ignore-if-in-upstream: don't include a patch matching a commit upstream
  --in-reply-to=: make first mail a reply to <message-id>
  --inline?: inline the patch
  --interdiff=: show changes against <rev> in cover letter or single patch
  --no-binary: don't output binary diffs
  --numbered-files: use simple number sequence for output file names
  --progress: show progress while generating patches
  --range-diff=: show changes against <refspec> in cover letter or single patch
  --rfc: use [RFC PATCH] instead of [PATCH]
  --signature-file=: add a signature from a file
  --signature=: add a signature
  --start-number=: start numbering patches at <n> instead of 1
  --stdout: print patches to standard out
  --subject-prefix=: use [<prefix>] instead of [PATCH]
  --suffix=: use <sfx> instead of '.patch'
  --thread?: 'enable message threading, styles: shallow, deep'
  --to=: 'add To: header'
  --zero-commit: output all-zero hash in From header
  -N, --no-numbered: use [PATCH] even with multiple patches
  -k, --keep-subject: don't strip/add [PATCH]
  -n, --numbered: use [PATCH n/m] even with a single patch
  -o, --output-directory=: store resulting files in <dir>
  -p, --no-stat: show patch format instead of default (patch + stat)
  -q, --quiet: don't print the patch filenames
  -s, --signoff: add a Signed-off-by trailer
  -v, --reroll-count=: mark the series as Nth re-roll
documentation:
  command: |-
    Prepare each non-merge commit with its "patch" in
    one "message" per commit, formatted to resemble a UNIX mailbox.
    The output of this command is convenient for e-mail submission or
    for use with 'git am'.

    A "message" generated by the command consists of three parts:

    * A brief metadata header that begins with `From <commit>`
      with a fixed `Mon Sep 17 00:00:00 2001` datestamp to help programs
      like "file(1)" to recognize that the file is an output from this
      command, fields that record the author identity, the author date,
      and the title of the change (taken from the first paragraph of the
      commit log message).

    * The second and subsequent paragraphs of the commit log message.

    * The "patch", which is the "diff -p --stat" output (see
      [git-diff](cmd://git/diff)) between the commit and its parent.

    The log message and the patch are separated by a line with a
    three-dash line.

    There are two ways to specify which commits to operate on.

    1. A single commit, <since>, specifies that the commits leading
       to the tip of the current branch that are not in the history
       that leads to the <since> to be output.

    2. Generic <revision-range> expression (see "SPECIFYING
       REVISIONS" section in [gitrevisions](man://gitrevisions/7)) means the
       commits in the specified range.

    The first rule takes precedence in the case of a single <commit>.  To
    apply the second rule, i.e., format everything since the beginning of
    history up until <commit>, use the `--root` option: `git format-patch --root <commit>`.  If you want to format only <commit> itself, you
    can do this with `git format-patch -1 <commit>`.

    By default, each output file is numbered sequentially from 1, and uses the
    first line of the commit message (massaged for pathname safety) as
    the filename. With the `--numbered-files` option, the output file names
    will only be numbers, without the first line of the commit appended.
    The names of the output files are printed to standard
    output, unless the `--stdout` option is specified.

    If `-o` is specified, output files are created in <dir>.  Otherwise
    they are created in the current working directory. The default path
    can be set with the `format.outputDirectory` configuration option.
    The `-o` option takes precedence over `format.outputDirectory`.
    To store patches in the current working directory even when
    `format.outputDirectory` points elsewhere, use `-o .`. All directory
    components will be created.

    By default, the subject of a single patch is "[PATCH] " followed by
    the concatenation of lines from the commit message up to the first blank
    line (see the DISCUSSION section of [git-commit](cmd://git/commit)).

    When multiple patches are output, the subject prefix will instead be
    "[PATCH n/m] ".  To force 1/1 to be added for a single patch, use `-n`.
    To omit patch numbers from the subject, use `-N`.

    If given `--thread`, `git-format-patch` will generate `In-Reply-To` and
    `References` headers to make the second and subsequent patch mails appear
    as replies to the first mail; this also generates a `Message-ID` header to
    reference.
  flag:
    base: |-
      Add prerequisite tree info to the patch series. The argument can be
      `auto` (use the current branch as the base), a commit object name,
      or a reference in `refs/notes/`. This option is useful when the
      patches need to be applied on top of a specific commit.
    cover-letter: |-
      Generate a cover letter template. The template includes branch
      description, shortlog, and overall diffstat. You will be prompted
      to edit the cover letter before sending. The subject prefix defaults
      to `[PATCH]` but can be changed with `--subject-prefix`.
    cover-from-description: |-
      Generate parts of a cover letter based on a branch's description.
      The mode controls which parts: `message` (default) uses the
      branch description as the cover letter body, `subject` uses the
      first line as the subject, `auto` uses both if the description
      has multiple paragraphs, and `none` disables this feature.
    in-reply-to: |-
      Make the first mail a reply to the specified Message-Id, so that
      the patch series appears as a thread in mail clients. Subsequent
      patches are replies to the previous one.
    interdiff: |-
      Show changes between this version and a previous version in the
      cover letter or single patch. The argument is a revision range
      that compares the previous version to this one.
    no-binary: |-
      Do not output contents of binary diffs. The diff will only contain
      the header information that a binary file changed.
    range-diff: |-
      Show a range diff between this version and a previous version in
      the cover letter or single patch. The argument is a revision range
      that compares the previous version to this one.
    rfc: |-
      Use `[RFC PATCH]` instead of `[PATCH]` in the subject prefix,
      indicating that the patches are a Request For Comments rather than
      a final submission.
    subject-prefix: |-
      Use `[<prefix>]` instead of the default `[PATCH]` in the subject
      prefix. Useful for differentiating patch series, e.g.
      `--subject-prefix=PATCH v2`.
    thread: |-
      Enable message threading. With `shallow` (default), all patches
      are replies to the first mail or cover letter. With `deep`, each
      patch is a reply to the previous one, creating a deep thread.
