# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: conda
description: conda is a tool for managing and deploying applications, environments and packages
flags:
    -V, --version: Show the conda version number and exit.
    -h, --help: Show this help message and exit.

documentation:
  command: >-
    Package, dependency, and environment manager for Python (and R).
    conda creates isolated environments with their own Python version
    and packages. Key commands: create (mamba create -n env), install,
    update, remove. Activate an environment with conda activate env.
    List environments with conda env list; remove with conda env remove.
    Search packages with conda search; install from channels with -c.
    Export environment to YAML with conda env export; recreate with
    conda env create -f environment.yml. Manage channels and priorities.
    Works with pip inside environments for non-conda packages. Lock
    files with conda-lock for reproducible environments. Use conda info
    to see configuration and environment details.
