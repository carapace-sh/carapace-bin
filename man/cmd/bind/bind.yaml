# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
documentation:
  command: >-
    Set Readline key bindings and variables. Lists current bindings
    and function names, or defines new key bindings for the current
    shell session. Operates on the specified keymap.
description: Set Readline key bindings and variables
flags:
    -P: list function names and bindings
    -S: list key sequences that invoke macros and their values
    -V: list variable names and values
    -X: list key sequences bound with -x and associated commands in a form that can be reused as input
    -f=: read key bindings from filename
    -l: list names of functions
    -m=: use keymap as the keymap for the duration of this command
    -p: list functions and bindings in a form that can be reused as input
    -q=: query about which keys invoke the named function
    -r=: remove the binding for keyseq
    -s: list key sequences that invoke macros and their values in a form that can be reused as input
    -u=: unbind all keys which are bound to the named function
    -v: list variable names and values in a form that can be reused as input
    -x=: cause shell-command to be executed when keyseq is entered
