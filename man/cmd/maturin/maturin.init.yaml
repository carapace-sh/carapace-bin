# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: init
description: Create a new cargo project in an existing directory
flags:
    --mixed: Use mixed Rust/Python project layout
    --name=: Set the resulting package name, defaults to the directory name
    --src: Use Python first src layout for mixed Rust/Python project
    -b, --bindings=: Which kind of bindings to use
    -v, --verbose*: Use verbose output
