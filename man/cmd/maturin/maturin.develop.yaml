# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: develop
description: Install the crate as module in the current virtualenv
flags:
    --all-features: Activate all available features
    --color=: 'Coloring: auto, always, never'
    --compression-enable-large-file-support: Whether to use large file support for ZIP files
    --compression-level=: Zip compression level. Defaults to method default
    --compression-method=: Zip compression method
    --config=: Override a configuration value (unstable)
    --frozen: Require Cargo.lock and cache are up to date
    --future-incompat-report: Outputs a future incompatibility report at the end of the build (unstable)
    --generate-stubs: Auto generate Python type stubs by introspecting the binary
    --ignore-rust-version: Ignore `rust-version` specification in packages
    --locked: Require Cargo.lock is up to date
    --no-default-features: Do not activate the `default` feature
    --offline: Run without accessing the network
    --pip-path=: Use a specific pip installation instead of the default one
    --profile=: Build artifacts with the specified Cargo profile
    --skip-install: Skip installation, only build the extension module inplace
    --strip: Strip the library for minimum file size
    --target-dir=: Directory for all generated artifacts
    --target=: Build for the target triple
    --timings=: 'Timing output formats (unstable) (comma separated): html, json'
    --uv: Use `uv` to install packages instead of `pip`
    -E, --extras=: Install extra requires aka. optional dependencies
    -F, --features=*: Space or comma separated list of features to activate
    -G, --group=: Install dependency groups defined in pyproject.toml (PEP 735)
    -Z=: Unstable (nightly-only) flags to Cargo
    -b, --bindings=: Which kind of bindings to use
    -j, --jobs=: 'Number of parallel jobs, defaults to # of CPUs'
    -m, --manifest-path=: Path to Cargo.toml
    -q, --quiet: Do not print cargo log messages
    -r, --release: Pass --release to cargo
    -v, --verbose*: Use verbose output (-vv very verbose/build.rs output)
