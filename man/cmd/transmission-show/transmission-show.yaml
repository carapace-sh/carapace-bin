# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: transmission-show [flags] torrentfile
description: A command-line utility to show .torrent file metadata
flags:
    -V, --version: Show version number and exit
    -h, --help: Show a short help page and exit
    -m, --magnet: Show a magnet link for the specified .torrent file
    -s, --scrape: Ask the torrent's trackers how many peers are in the torrent's swarm
