# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: stage
description: Stages a file or hunk to a specific branch
documentation:
    command: |-
        Stages a file or hunk to a specific branch.

        Without arguments, opens an interactive TUI for selecting files and hunks to stage. With arguments, stages the specified file or hunk to the given branch.

        Usage:

          but stage                         # interactive TUI selector
          but stage --branch <branch>       # interactive, specific branch
          but stage <file-or-hunk> <branch> # direct staging

        For the interactive hunk picker workflow, see https://docs.gitbutler.com/gitbutler-tui#stage-hunks-interactively
    flag:
        format: |-
            Explicitly control how output should be formatted.

            If unset and from a terminal, it defaults to human output, when redirected it's for shells.
        help: Print help (see a summary with '-h')
        status-after: |-
            After a mutation command completes, also output workspace status.

            In human mode, prints status after the command output. In JSON mode, wraps both in {"result": ..., "status": ...} on success, or {"result": ..., "status_error": ...} if the status query fails (in which case "status" is absent).
flags:
    -b, --branch=: Branch to stage to (for interactive mode)
    -h, --help: Print help (see more with '--help')
completion:
    flag:
        format:
            - "human\tThe output to write is supposed to be for human consumption, and can be more verbose"
            - "agent\tThe output is for an AI coding agent, rendered as human-readable text"
            - "shell\tThe output should be suitable for shells, and assigning the major result to variables so that it can be reused in subsequent CLI invocations"
            - "json\tOutput detailed information as JSON for tool consumption"
            - "none\tDo not output anything, like redirecting to /dev/null"
