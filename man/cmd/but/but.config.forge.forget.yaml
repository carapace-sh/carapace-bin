name: forget
description: Forget a previously authenticated forge account
flags:
    -h, --help: Print help (see more with '--help')
documentation:
    command: |
        Forget a previously authenticated forge account.

        Examples

        Forget a specific account:

        If there are multiple accounts with the same username, you'll be interactively prompted to select which one(s) to forget.

          but config forge forget username

        Interactively select which account(s) to forget:

          but config forge forget
    flag:
        help: Print help (see a summary with '-h')
        status-after: |-
            After a mutation command completes, also output workspace status.

            In human mode, prints status after the command output. In JSON mode, wraps both in {"result": ..., "status": ...} on success, or {"result": ..., "status_error": ...} if the status query fails (in which case "status" is absent).
