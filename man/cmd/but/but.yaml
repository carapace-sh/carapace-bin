# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: but
description: A GitButler CLI tool
documentation:
    command: |-
        A GitButler CLI tool.

        Running `but` with no arguments executes the `default` alias, which is set to `status` by default. Override it with `but alias add default <command>`.

        The CLI provides tooling for managing stacked and parallel branches, inspecting and diffing workspace state, operations log with restoration, commit editing (squashing, splitting, amending, moving), upstream management, conflict resolution, forge integration, and an interactive TUI.
    flag:
        format: |-
            Explicitly control how output should be formatted.

            If unset and from a terminal, it defaults to human output, when redirected it's for shells.
        help: Print help (see a summary with '-h')
        log-file: |-
            Log to this file instead of stderr.

            If the file does not exist it will be created. If it does exist it will be truncated.
        status-after: |-
            After a mutation command completes, also output workspace status.

            In human mode, prints status after the command output. In JSON mode, wraps both in {"result": ..., "status": ...} on success, or {"result": ..., "status_error": ...} if the status query fails (in which case "status" is absent).
        trace: |-
            Enable tracing for debug and performance information printed to stderr.

            Repeat up to 4 times for increasingly verbose output.
flags:
    -C, --current-dir=: Run as if but was started in PATH instead of the current working directory
    -V, --version: Print version
    -h, --help: Print help (see more with '--help')
persistentflags:
    --format=: Explicitly control how output should be formatted
completion:
    flag:
        current-dir:
            - $files
        format:
            - "human\tThe output to write is supposed to be for human consumption, and can be more verbose"
            - "agent\tThe output is for an AI coding agent, rendered as human-readable text"
            - "shell\tThe output should be suitable for shells, and assigning the major result to variables so that it can be reused in subsequent CLI invocations"
            - "json\tOutput detailed information as JSON for tool consumption"
            - "none\tDo not output anything, like redirecting to /dev/null"
