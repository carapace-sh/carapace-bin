name: metrics
description: View or set metrics collection
flags:
    -h, --help: Print help (see more with '--help')
documentation:
    command: |
        View or set metrics collection.

        GitButler uses metrics to help us know what is useful and improve it. Privacy policy: https://gitbutler.com/privacy

        Without arguments, displays the current setting.

        Examples

        View metrics configuration:

          but config metrics

        Enable metrics:

          but config metrics enable

        Disable metrics:

          but config metrics disable
    flag:
        help: Print help (see a summary with '-h')
        status-after: |-
            After a mutation command completes, also output workspace status.

            In human mode, prints status after the command output. In JSON mode, wraps both in {"result": ..., "status": ...} on success, or {"result": ..., "status_error": ...} if the status query fails (in which case "status" is absent).
