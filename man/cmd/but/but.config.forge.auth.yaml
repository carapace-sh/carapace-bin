name: auth
description: Authenticate with your forge provider (currently only GitHub is supported)
flags:
    -h, --help: Print help (see more with '--help')
documentation:
    command: |-
        Authenticate with your forge provider (currently only GitHub is supported).

        This will guide you through the authentication process using either: GitHub

        - Device flow (OAuth)
        - Personal Access Token (PAT)
        - GitHub Enterprise

        GitLab

        - Personal Access Token (PAT)
        - Self-Hosted
    flag:
        help: Print help (see a summary with '-h')
        status-after: |-
            After a mutation command completes, also output workspace status.

            In human mode, prints status after the command output. In JSON mode, wraps both in {"result": ..., "status": ...} on success, or {"result": ..., "status_error": ...} if the status query fails (in which case "status" is absent).
