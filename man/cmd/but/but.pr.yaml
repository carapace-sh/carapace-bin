name: pr
aliases:
    - review
    - mr
description: Commands for creating and managing reviews on a forge, e.g. GitHub PRs or GitLab MRs
flags:
    -d, --draft: Whether to create reviews as a draft
    -h, --help: Print help (see more with '--help')
documentation:
    command: |-
        Commands for creating and managing reviews on a forge, e.g. GitHub PRs or GitLab MRs.

        If you are authenticated with a forge using but config forge auth, you can use the but pr or but mr commands to create pull requests (or merge requests) on the remote repository for your branches.

        Running but pr without a subcommand defaults to but pr new, which will prompt you to select a branch to create a PR for.
    flag:
        help: Print help (see a summary with '-h')
        status-after: |-
            After a mutation command completes, also output workspace status.

            In human mode, prints status after the command output. In JSON mode, wraps both in {"result": ..., "status": ...} on success, or {"result": ..., "status_error": ...} if the status query fails (in which case "status" is absent).
