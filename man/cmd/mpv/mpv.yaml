    --background-blur-radius?: The blur radius (in pixels) to use for --border-background=blur
    --background-color?: Color used to draw parts of the mpv window not covered by video
    --background-tile-color-0?: Colors used to draw parts of the mpv window not covered by video in --background=tiles mode
    --background-tile-color-1?: Colors used to draw parts of the mpv window not covered by video in --background=tiles mode
    --background-tile-size?: Tile size used to draw parts of the mpv window not covered by video in --background=tiles mode
    --background?: If the frame has an alpha component, decide what kind of background, if any, to blend it with
    --blend-subtitles?: Blend subtitles directly onto upscaled video frames, before interpolation and/or color management
