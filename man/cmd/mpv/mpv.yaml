    --vulkan-display-display?: The index of the display, on the selected Vulkan device, to present on when using the displayvk GPU context
    --vulkan-display-mode?: The index of the display mode, of the selected Vulkan display, to use when using the displayvk GPU contex
    --vulkan-display-plane?: The index of the plane, on the selected Vulkan device, to present on when using the displayvk GPU context
    --vulkan-queue-count?: Controls the number of VkQueues used for rendering
    --vulkan-swap-mode?: Controls the presentation mode of the vulkan swapchain
    --wasapi-exclusive-buffer?: Set buffer duration in exclusive mode
    --watch-history-path?: The path in which to store the watch history
    --watch-later-dir?: The directory in which to store the "watch later" temporary files
    --watch-later-directory?: alias for --watch-later-dir
    --watch-later-options-add?: ""
    --watch-later-options-append?: ""
    --watch-later-options-clr?: ""
    --watch-later-options-del?: ""
    --watch-later-options-pre?: ""
    --watch-later-options-remove?: ""
    --watch-later-options-set?: ""
    --watch-later-options-toggle?: ""
    --watch-later-options?: The options that are saved in "watch later" files if they have been changed since when mpv started
    --wayland-app-id?: Set the client app id for Wayland-based video output methods
    --wayland-configure-bounds?: Controls whether or not mpv opts into the configure bounds event if sent by the compositor
    --wayland-content-type?: If supported by the compositor, mpv will send a hint using the content-type protocol telling the compositor what type of content is being displayed
    --wayland-edge-pixels-pointer?: 'Defines the size of an edge border (default: 16) to initiate client side resize events in the wayland contexts with the mouse'
    --wayland-edge-pixels-touch?: 'Defines the size of an edge border (default: 32) to initiate client side resizes events in the wayland contexts with touch events'
    --wayland-internal-vsync?: Controls whether to use mpv's internal vsync for Wayland-base video outputs
    --wayland-present?: Enable the use of wayland's presentation time protocol for more accurate frame presentation if it is supported by the compositor
    --wid?: This tells mpv to attach to an existing window
    --window-affinity?: Controls the window affinity behavior of mpv
    --window-corners?: Set the preference for window corner rounding
    --window-dragging?: Move the window when clicking on it and moving the mouse pointer
    --window-maximized?: Whether the video window is maximized or not
    --window-minimized?: Whether the video window is minimized or not
    --window-scale?: Resize the video window to a multiple (or fraction) of the video size
    --write-filename-in-watch-later-config?: Prepend the watch later config files with the name of the file they refer to
    --x11-bypass-compositor?: If set to yes, then ask the compositor to unredirect the mpv window
    --x11-name?: Set the window instance name for X11-based video output methods
    --x11-netwm?: (X11 only) Control the use of NetWM protocol features
    --x11-present?: Whether or not to use presentation statistics from X11's presentation extension
    --x11-wid-title?: Whether or not to set the window title when mpv is embedded on X11
    --xv-adaptor?: Select a specific XVideo adapter
    --xv-buffers?: Number of image buffers to use for the internal ringbuffer
    --xv-ck-method?: Sets the color key drawing method
    --xv-ck?: Select the source from which the color key is taken
    --xv-colorkey?: Changes the color key to an RGB value of your choice
    --xv-port?: Select a specific XVideo port
    --ytdl-format?: Video format/quality that is directly passed to youtube-dl
    --ytdl-raw-options-add?: ""
    --ytdl-raw-options-append?: ""
    --ytdl-raw-options-clr?: ""
    --ytdl-raw-options-del?: ""
    --ytdl-raw-options-remove?: ""
    --ytdl-raw-options-set?: ""
    --ytdl-raw-options?: Pass arbitrary options to youtube-dl
    --ytdl?: Enable the youtube-dl hook-script
    --zimg-dither?: Dithering
    --zimg-fast?: Allow optimizations that help with performance, but reduce quality
    --zimg-scaler-chroma-param-a?: Same as --zimg-scaler-param-a, for chroma
    --zimg-scaler-chroma-param-b?: Same as --zimg-scaler-param-b, for chroma
    --zimg-scaler-chroma?: Same as --zimg-scaler, for for chroma interpolation
    --zimg-scaler-param-a?: Set scaler parameters
    --zimg-scaler-param-b?: Set scaler parameters
    --zimg-scaler?: Zimg luma scaler to use
    --zimg-threads?: Set the maximum number of threads to use for scaling
    -V, --version?: Print version string and exit
    -v, --v*: Increment verbosity level, one level for each -v found on the command line

documentation:
  command: >-
    Video and audio player based on MPlayer/mplayer2. mpv plays local
    files, URLs, and streams (HTTP, HTTPS, RTMP, etc.). Keyboard controls:
    Space (pause/play), Left/Right (seek 5s), Up/Down (seek 1min), q (quit),
    f (fullscreen), m (mute), 9/0 (volume). Scripting with Lua and JavaScript
    scripts in ~/.config/mpv/scripts/. Input conf: ~/.config/mpv/input.conf.
    Hardware decoding with --hwdec=auto. Subtitle options with --sub.
    Stream quality with --ytdl-format. Loop with --loop. Scale with
    --vf scale. Crop with --vf=crop. Extract audio with --audio-only.
    Widevine CDM support for Netflix/YouTube with --ytdl.
