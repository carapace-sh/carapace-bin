# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: cmp
description: Certificate Management Protocol (CMP, RFCs 9810 and 9811) application
group: standard
flags:
    -accept_raverified: Accept RAVERIFIED as proof-of-possession (POPO)
    -accept_unprot_err: Accept unprotected error messages from client
    -accept_unprotected: Accept missing or invalid protection of requests
    -allow_proxy_certs: allow the use of proxy certificates
    -attime=: verification epoch time
    -auth_level=: chain authentication security level
    -batch: Do not interactively prompt for input when a password is required etc.
    -cacertsout=: File to save CA certs received in caPubs field or genp with id-it-caCerts
    -centralkeygen: Request central (server-side) key generation. Default is local generation
    -cert=: Client's CMP signer certificate; its public key must match the -key argument This also used as default reference for subject DN and SANs. Any further certs included are appended to the untrusted certs
    -certform=: Format (PEM or DER) to use when saving a certificate to a file. Default PEM
    -certout=: File to save newly enrolled certificate
    -chainout=: File to save the chain of newly enrolled certificate
    -check_after=: The check_after value (time to wait) to include in poll response
    -check_ss_sig: check root CA self-signatures
    -cmd=: 'CMP request to send: ir/cr/kur/p10cr/rr/genm'
    -config=: Configuration file to use. "" = none. Default from env variable OPENSSL_CONF
    -crl_check: check leaf certificate revocation
    -crl_check_all: check full chain revocation
    -crlcert=: certificate to request a CRL for in genm of type crlStatusList
    -crlform=: Format (PEM or DER) to use when saving a CRL to a file. Default DER
    -crlout=: File to save new CRL received in genp of type 'crls'
    -csr=: PKCS#10 CSR file in PEM or DER format to convert or to use in p10cr
    -days=: Requested validity time of the new certificate in number of days
    -digest=: Digest to use in message protection and POPO signatures. Default "sha256"
    -disable_confirm: 'Do not confirm newly enrolled certificate w/o requesting implicit confirmation. WARNING: This leads to behavior violating RFC 9810'
    -expect_sender=: DN of expected sender of responses. Defaults to subject of -srvcert, if any
    -explicit_policy: set policy variable require-explicit-policy
    -extended_crl: enable extended CRL features
    -extracerts=: Certificates to append in extraCerts field of outgoing messages. This can be used as the default CMP signer cert chain to include
    -extracertsout=: File to save extra certificates received in the extraCerts field
    -failure=: A single failure info bit number to include in server response, 0..26
    -failurebits=: Number representing failure bits to include in server response, 0..2^27 - 1
    -geninfo=: Comma-separated list of OID and value to place in generalInfo PKIHeader of form <OID>:int:<n> or <OID>:str:<s>, e.g. '1.2.3.4:int:56789, id-kp:str:name'
    -grant_implicitconf: Grant implicit confirmation of newly enrolled certificate
    -ignore_critical: permit unhandled critical extensions
    -ignore_keyusage: Ignore CMP signer cert key usage, else 'digitalSignature' must be allowed
    -implicit_confirm: Request implicit confirmation of newly enrolled certificates
    -infotype=: InfoType name for requesting specific info in genm, with specific support for 'caCerts' and 'rootCaCert'
    -inhibit_any: set policy variable inhibit-any-policy
    -inhibit_map: set policy variable inhibit-policy-mapping
    -issuer=: DN of the issuer to place in the certificate template of ir/cr/kur/rr; also used as recipient if neither -recipient nor -srvcert are given
    -issuer_checks: (deprecated)
    -keep_alive=: 'Persistent HTTP connections. 0: no, 1 (the default): request, 2: require'
    -key=: CMP signer private key, not used when -secret given
    -keyform=: Format of the key input (DER/PEM/P12)
    -keypass=: Client private key (and cert and old cert) pass phrase source
    -keyspec=: Optional file to save Key specification received in genp of type certReqTemplate
    -mac=: MAC algorithm to use in PBM-based message protection. Default "hmac-sha1"
    -max_msgs=: 'max number of messages handled by HTTP mock server. Default: 0 = unlimited'
    -msg_timeout=: Number of seconds allowed per CMP message round trip, or 0 for infinite
    -newkey=: 'Private or public key for the requested cert. Default: CSR key or client key'
    -newkeyout=: File to save centrally generated key, in PEM format
    -newkeypass=: New private key pass phrase source
    -newwithnew=: File to save NewWithNew cert received in genp of type rootCaKeyUpdate
    -newwithold=: File to save NewWithOld cert received in genp of type rootCaKeyUpdate
    -no_alt_chains: (deprecated)
    -no_cache_extracerts: Do not keep certificates received in the extraCerts CMP message field
    -no_check_time: ignore certificate validity time
    -no_proxy=: List of addresses of servers not to use HTTP(S) proxy for Default from environment variable 'no_proxy', else 'NO_PROXY', else none
    -oldcert=: Certificate to be updated (defaulting to -cert) or to be revoked in rr; also used as reference (defaulting to -cert) for subject DN and SANs. Issuer is used as recipient unless -recipient, -srvcert, or -issuer given
    -oldcrl=: CRL to request update for in genm of type crlStatusList
    -oldwithnew=: File to save OldWithNew cert received in genp of type rootCaKeyUpdate
    -oldwithold=: Root CA certificate to request update for in genm of type rootCaCert
    -otherpass=: Pass phrase source potentially needed for loading certificates of others
    -out_trusted=: Certificates to trust when verifying newly enrolled certificates
    -own_trusted=: Optional certs to verify chain building for own CMP signer cert
    -partial_chain: accept chains anchored by intermediate trust-store CAs
    -path=: HTTP path (aka CMP alias) at the CMP server. Default from -server, else "/"
    -pkistatus=: 'PKIStatus to be included in server response. Possible values: 0..6'
    -policies=: Name of config file section defining policies certificate request extension
    -policy=: adds policy to the acceptable policy set
    -policy_check: perform rfc5280 policy checks
    -policy_oids=: Policy OID(s) to add as policies certificate request extension
    -policy_oids_critical: Flag the policy OID(s) given with -policy_oids as critical
    -policy_print: print policy processing diagnostics
    -poll_count=: Number of times the client must poll before receiving a certificate
    -popo=: Proof-of-Possession (POPO) method to use for ir/cr/kur where -1 = NONE, 0 = RAVERIFIED, 1 = SIGNATURE (default), 2 = KEYENC
    -port=: Act as HTTP-based mock server listening on given port
    -profile=: Certificate profile name to place in generalInfo field of request PKIHeader
    -propquery=: Property query used when fetching algorithms
    -provider-path=: Provider load path (must be before 'provider' argument if required)
    -provider=*: Provider to load (can be specified multiple times)
    -provparam=: Set a provider key-value parameter
    -proxy=: '[http[s]://]address[:port][/path] of HTTP(S) proxy to use; path is ignored'
    -purpose=: certificate chain purpose
    -rand=: Load the given file(s) into the random number generator
    -recipient=: 'DN of CA. Default: subject of -srvcert, -issuer, issuer of -oldcert or -cert'
    -ref=: Reference value to use as senderKID in case no -cert is given
    -ref_cert=: Certificate to be expected for rr and any oldCertID in kur messages
    -repeat=: Invoke the transaction the given positive number of times. Default 1
    -reqexts=: Name of config file section defining certificate request extensions. Augments or replaces any extensions contained CSR given with -csr
    -reqin=: Take sequence of CMP requests to send to server from file(s)
    -reqin_new_tid: Use fresh transactionID for CMP requests read from -reqin
    -reqout=: Save sequence of CMP requests created by the client to file(s)
    -reqout_only=: Save first CMP request created by the client to file and exit
    -revreason=: 'Reason code to include in revocation request (rr); possible values: 0..6, 8..10 (see RFC5280, 5.3.1) or -1. Default -1 = none included'
    -rsp_capubs=: CA certificates to be included in mock ip response
    -rsp_cert=: Certificate to be returned as mock enrollment result
    -rsp_crl=: CRL to be returned in genp of type crls
    -rsp_extracerts=: Extra certificates to be included in mock certification responses
    -rsp_key=: Private key for the certificate to be returned as mock enrollment result Key to be returned for central key pair generation
    -rsp_keypass=: Response private key (and cert) pass phrase source
    -rsp_newwithnew=: New root CA certificate to include in genp of type rootCaKeyUpdate
    -rsp_newwithold=: NewWithOld transition cert to include in genp of type rootCaKeyUpdate
    -rsp_oldwithnew=: OldWithNew transition cert to include in genp of type rootCaKeyUpdate
    -rspin=: Process sequence of CMP responses provided in file(s), skipping server
    -rspout=: Save sequence of actually used CMP responses to file(s)
    -san_nodefault: Do not take default SANs from reference certificate (see -oldcert)
    -sans=: Subject Alt Names (IPADDR/DNS/URI) to add as (critical) cert req extension
    -secret=: Prefer PBM (over signatures) for protecting msgs with given password source
    -section=: Section(s) in config file to get options from. "" = 'default'. Default 'cmp'
    -send_error: Force server to reply with error message
    -send_unprot_err: 'In case of negative responses, server shall send unprotected error messages, certificate responses (ip/cp/kup), and revocation responses (rp). WARNING: This setting leads to behavior violating RFC 9810'
    -send_unprotected: Send response messages without CMP-level protection
    -serial=: Serial number of certificate to be revoked in revocation request (rr)
    -server=: '[http[s]://]address[:port][/path] of CMP server. Default port 80 or 443. address may be a DNS name or an IP address; path can be overridden by -path'
    -srv_cert=: Certificate of the server
    -srv_key=: Private key used by the server for signing messages
    -srv_keypass=: Server private key (and cert) pass phrase source
    -srv_ref=: Reference value to use as senderKID of server in case no -srv_cert is given
    -srv_secret=: Password source for server authentication with a pre-shared key (secret)
    -srv_trusted=: Trusted certificates for client authentication
    -srv_untrusted=: Intermediate certs that may be useful for verifying CMP protection
    -srvcert=: Server cert to pin and trust directly when verifying signed CMP responses
    -srvcertout=: File to save the server cert used and validated for CMP response protection
    -statusstring=: Status string to be included in server response
    -subject=: Distinguished Name (DN) of subject to use in the requested cert template For kur, default is subject of -csr arg or reference cert (see -oldcert) this default is used for ir and cr only if no Subject Alt Names are set
    -suiteB_128: Suite B 128-bit mode allowing 192-bit algorithms
    -suiteB_128_only: Suite B 128-bit-only mode
    -suiteB_192: Suite B 192-bit-only mode
    -ta_in_ip_extracerts: 'Permit using self-issued certificates from the extraCerts in an IP message as trust anchors under conditions defined by 3GPP TS 33.310 WARNING: This setting leads to behavior allowing violation of RFC 9810'
    -template=: File to save certTemplate received in genp of type certReqTemplate
    -tls_cert=: Client's TLS certificate. May include chain to be provided to TLS server
    -tls_extra=: Extra certificates to provide to TLS server during TLS handshake
    -tls_host=: Address to be checked (rather than -server) during TLS hostname validation
    -tls_key=: Private key for the client's TLS certificate
    -tls_keypass=: Pass phrase source for the client's private TLS key (and TLS cert)
    -tls_trusted=: Trusted certificates to use for verifying the TLS server certificate; this implies hostname validation
    -tls_used: Enable using TLS (also when other TLS options are not set)
    -total_timeout=: Overall time an enrollment incl. polling may take. Default 0 = infinite
    -trusted=: Certificates to use as trust anchors when verifying signed CMP responses unless -srvcert is given
    -trusted_first: search trust store first (default)
    -unprotected_errors: 'Accept missing or invalid protection of regular error messages and negative certificate responses (ip/cp/kup), revocation responses (rp), and PKIConf WARNING: This setting leads to behavior allowing violation of RFC 9810'
    -unprotected_requests: Send request messages without CMP-level protection
    -untrusted=: Intermediate CA certs for chain construction for CMP/TLS/enrolled certs
    -use_deltas: use delta CRLs
    -use_mock_srv: Use internal mock server at API level, bypassing socket-based HTTP
    -verbosity=: Log level; 3=ERR, 4=WARN, 6=INFO, 7=DEBUG, 8=TRACE. Default 6 = INFO
    -verify_depth=: chain depth limit
    -verify_email=: expected peer email
    -verify_hostname=: expected peer hostname
    -verify_ip=: expected peer IP address
    -verify_name=: verification policy name
    -writerand=: Write random data to the specified file
    -x509_strict: disable certificate compatibility work-arounds
