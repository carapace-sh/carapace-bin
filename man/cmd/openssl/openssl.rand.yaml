# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: rand
description: Generate pseudo-random bytes
group: standard
flags:
    -base64: Base64 encode output
    -hex: Hex encode output
    -out=: Output file
    -propquery=: Property query used when fetching algorithms
    -provider-path=: Provider load path (must be before 'provider' argument if required)
    -provider=*: Provider to load (can be specified multiple times)
    -provparam=: Set a provider key-value parameter
    -rand=: Load the given file(s) into the random number generator
    -writerand=: Write random data to the specified file
