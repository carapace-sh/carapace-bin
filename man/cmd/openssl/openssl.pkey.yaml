# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: pkey
description: Public and private key management
group: standard
flags:
    -check: Check key consistency
    -ec_conv_form=: Specifies the EC point conversion form in the encoding
    -ec_param_enc=: Specifies the way the EC parameters are encoded
    -encopt=*: Private key encoder parameter
    -in=: Input key
    -inform=: Key input format (DER/PEM)
    -noout: Do not output the key in encoded form
    -out=: Output file for encoded and/or text output
    -outform=: Output encoding format (DER or PEM)
    -passin=: Key input pass phrase source
    -passout=: Output PEM file pass phrase source
    -propquery=: Property query used when fetching algorithms
    -provider-path=: Provider load path (must be before 'provider' argument if required)
    -provider=*: Provider to load (can be specified multiple times)
    -provparam=: Set a provider key-value parameter
    -pubcheck: Check public key consistency
    -pubin: Read only public components from key input
    -pubout: Restrict encoded output to public components
    -text: Output key components in plaintext
    -text_pub: Output only public key components in text form
    -traditional: Use traditional format for private key PEM output
