# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: prime
description: Compute prime numbers
group: standard
flags:
    -bits=: Size of number in bits
    -checks=: Number of checks
    -generate: Generate a prime
    -hex: Enables hex format for output from prime generation or input to primality checking
    -in: Provide file names containing numbers for primality checking
    -propquery=: Property query used when fetching algorithms
    -provider-path=: Provider load path (must be before 'provider' argument if required)
    -provider=*: Provider to load (can be specified multiple times)
    -provparam=: Set a provider key-value parameter
    -safe: When used with -generate, generate a safe prime
