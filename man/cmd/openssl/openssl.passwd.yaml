# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: passwd
description: Generation of hashed passwords
group: standard
flags:
    "-1": MD5-based password algorithm
    "-5": SHA256-based password algorithm
    "-6": SHA512-based password algorithm
    -aixmd5: AIX MD5-based password algorithm
    -apr1: MD5-based password algorithm, Apache variant
    -in=: Read passwords from file
    -noverify: Never verify when reading password from terminal
    -propquery=: Property query used when fetching algorithms
    -provider-path=: Provider load path (must be before 'provider' argument if required)
    -provider=*: Provider to load (can be specified multiple times)
    -provparam=: Set a provider key-value parameter
    -quiet: No warnings
    -rand=: Load the given file(s) into the random number generator
    -reverse: Switch table columns
    -salt=: Use provided salt
    -stdin: Read passwords from stdin
    -table: Format output as table
    -writerand=: Write random data to the specified file
