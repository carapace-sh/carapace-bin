# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: dhparam
description: Generation and Management of Diffie-Hellman Parameters
group: standard
flags:
    "-2": Generate parameters using 2 as the generator value
    "-3": Generate parameters using 3 as the generator value
    "-5": Generate parameters using 5 as the generator value
    -check: Check the DH parameters
    -dsaparam: Read or generate DSA parameters, convert to DH
    -in=: Input file
    -inform=: Input format, DER or PEM
    -noout: Don't output any DH parameters
    -out=: Output file
    -outform=: Output format, DER or PEM
    -propquery=: Property query used when fetching algorithms
    -provider-path=: Provider load path (must be before 'provider' argument if required)
    -provider=*: Provider to load (can be specified multiple times)
    -provparam=: Set a provider key-value parameter
    -quiet: Terse output
    -rand=: Load the given file(s) into the random number generator
    -text: Print a text form of the DH parameters
    -verbose: Verbose output
    -writerand=: Write random data to the specified file
