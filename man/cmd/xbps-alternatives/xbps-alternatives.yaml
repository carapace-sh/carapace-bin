# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: xbps-alternatives [OPTIONS] [MODE]
description: XBPS utility to handle alternatives
flags:
    --repository=*: Enable repository mode and add repository to the top of the list. This option can be specified multiple times
    -C, --config=: Path to confdir (xbps.d)
    -R, --R: Enable repository mode. This mode explicitly looks for packages in repositories
    -V, --version: Show XBPS version
    -d, --debug: Debug mode shown to stderr
    -g, --group=: Group of alternatives to match
    -h, --help: Show usage
    -i, --ignore-conf-repos: Ignore repositories defined in xbps.d
    -l, --list=: List all alternatives or from PKG
    -r, --rootdir=: Full path to rootdir
    -s, --set=: Set alternatives for PKG
    -v, --verbose: Verbose messages
