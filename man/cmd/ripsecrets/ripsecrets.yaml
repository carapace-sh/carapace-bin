# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: ripsecrets
description: Prevent committing secret keys into your source code
flags:
    --additional-pattern=*: Additional regex pattern used to find secrets
    --install-pre-commit: Install ripsecrets as a pre-commit hook
    --only-matching: Print only the matched (non-empty) parts of a matching line
    --strict-ignore: Respect .secretsignore file even for files passed as arguments
    -V, --version: Print version
    -h, --help: Print help
