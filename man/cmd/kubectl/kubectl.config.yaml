# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: config SUBCOMMAND
description: Modify kubeconfig files
persistentflags:
    --kubeconfig=: use a particular kubeconfig file

documentation:
  command: |
    Modify kubeconfig files using subcommands like "kubectl config set current-context my-context".
    The loading order follows these rules: 1. If the --kubeconfig flag is set, then only that file is loaded. 2. If $KUBECONFIG environment variable is set, then it is used as a list of paths which are merged. 3. Otherwise, ${HOME}/.kube/config is used and no merging takes place.
