# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: explain TYPE [--recursive=FALSE|TRUE] [--api-version=api-version-group] [-o|--output=plaintext|plaintext-openapiv2]
description: Get documentation for a resource
group: basic intermediate
flags:
    --api-version=: Get different explanations for particular API version (API group/version)
    --recursive: Print the fields of fields (Currently only 1 level deep)
    -o, --output=: Format in which to render the schema (plaintext, plaintext-openapiv2)
