# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: explain TYPE [--recursive=FALSE|TRUE] [--api-version=api-version-group] [-o|--output=plaintext|plaintext-openapiv2]
description: Get documentation for a resource
flags:
    --api-version=: Get different explanations for particular API version (API group/version)
    -R, --recursive: Print the fields of fields (Currently only 1 level deep)
    -o, --output=: Format in which to render the schema (plaintext, plaintext-openapiv2)

documentation:
  command: |
    List the fields for supported resources.
    This command describes the fields associated with each supported API resource. Fields are identified via a simple JSONPath identifier: <type>.<fieldName>[.<fieldName>]. Add the --recursive flag to display all of the fields at once without descriptions.
    Information about each field is retrieved from the server in OpenAPI format.
