# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: status (TYPE NAME | TYPE/NAME) [flags]
description: Show the status of the rollout
flags:
    --revision=: Pin to a specific revision for showing its status. Defaults to 0 (last revision).
    --timeout=: The length of time to wait before ending watch, zero means never. Any other values should contain a corresponding time unit (e.g. 1s, 2m, 3h).
    -R, --recursive: Process the directory used in -f, --filename recursively. Useful when you want to manage related manifests organized within the same directory.
    -f, --filename=*: Filename, directory, or URL to files identifying the resource to get from a server.
    -k, --kustomize=: Process the kustomization directory. This flag can't be used together with -f or -R.
    -l, --selector=: Selector (label query) to filter on, supports '=', '==', '!=', 'in', 'notin'.(e.g. -l key1=value1,key2=value2,key3 in (value3)). Matching objects must satisfy all of the specified label constraints.
    -w, --watch: Watch the status of the rollout until it's done.

documentation:
  command: |
    Show the status of the rollout.
    By default 'rollout status' will watch the status of the latest rollout until it's done. If you don't want to wait for the rollout to finish then you can use --watch=false. Note that if a new rollout starts in-between, then 'rollout status' will continue watching the latest revision.
