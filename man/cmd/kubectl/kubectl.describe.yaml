# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: describe (-f FILENAME | TYPE [NAME_PREFIX | -l label] | TYPE/NAME)
description: Show details of a specific resource or group of resources
flags:
    --chunk-size=: Return large lists in chunks rather than all at once. Pass 0 to disable.
    --show-events: If true, display events related to the described object. Defaults to true for a single object, false for multiple objects and prefix matching.
    -A, --all-namespaces: If present, list the requested object(s) across all namespaces. Namespace in current context is ignored even if specified with --namespace.
    -R, --recursive: Process the directory used in -f, --filename recursively. Useful when you want to manage related manifests organized within the same directory.
    -f, --filename=*: Filename, directory, or URL to files containing the resource to describe
    -k, --kustomize=: Process the kustomization directory. This flag can't be used together with -f or -R.
    -l, --selector=: Selector (label query) to filter on, supports '=', '==', '!=', 'in', 'notin'.(e.g. -l key1=value1,key2=value2,key3 in (value3)). Matching objects must satisfy all of the specified label constraints.

documentation:
  command: |
    Show details of a specific resource or group of resources.
    Print a detailed description of the selected resources, including related resources such as events or controllers. You may select a single object by name, all objects of that type, provide a name prefix, or label selector.
