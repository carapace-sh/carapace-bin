# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set PROPERTY_NAME PROPERTY_VALUE
description: Set an individual value in a kubeconfig file
flags:
    --set-raw-bytes?: When writing a []byte PROPERTY_VALUE, write the given string directly without base64 decoding.

documentation:
  command: |
    Set an individual value in a kubeconfig file.
    PROPERTY_NAME is a dot delimited name where each token represents either an attribute name or a map key. Map keys may not contain dots. PROPERTY_VALUE is the new value you want to set. Binary fields such as 'certificate-authority-data' expect a base64 encoded string unless the --set-raw-bytes flag is used.
    Specifying an attribute name that already exists will merge new fields on top of existing values.
