# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: convert
description: Convert a recording into another format
flags:
    --overwrite: Overwrite target file if it already exists
    --server-url=: asciinema server URL
    -f, --format=: Output file format
    -h, --help: Print help
    -q, --quiet: Quiet mode, i.e. suppress diagnostic messages
