# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: query
description: Processes an input file to extract provided metadata
flags:
    --creation-timestamp=: The document's creation date formatted as a UNIX timestamp.
    --diagnostic-format=: The format to emit diagnostics in
    --features=: Enables in-development features that may be changed or removed at any time
    --field=: Extracts just one field from all retrieved elements
    --font-path=: Adds additional directories that are recursively searched for fonts.
    --ignore-embedded-fonts: Ensures fonts embedded into Typst won't be considered
    --ignore-system-fonts: Ensures system fonts won't be searched, unless explicitly included via `--font-path`
    --input=: Add a string key-value pair visible through `sys.inputs`
    --one: Expects and retrieves exactly one element
    --package-cache-path=: Custom path to package cache, defaults to system-dependent location
    --package-path=: Custom path to local packages, defaults to system-dependent location
    --pretty: Whether to pretty-print the serialized output
    --root=: Configures the project root (for absolute paths)
    --target=: The target to compile for
    -f, --format=: The format of the output file, inferred from the extension by default
    -h, --help: Print help (see a summary with '-h')
    -j, --jobs=: Number of parallel jobs spawned during compilation. Defaults to number of CPUs. Setting it to 1 disables parallelism
