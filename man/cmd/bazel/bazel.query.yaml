    --noorder_results=: Output the results in dependency-ordered (default) or unordered fashion. The unordered output is faster but only supported when --output is not minrank, maxrank, or graph.
    --noshow_loading_progress: If enabled, causes Bazel to print "Loading package:" messages.
    --nostamp: Stamp binaries with the date, username, hostname, workspace information, etc.
    --nostrict_filesets: If this option is enabled, filesets crossing package boundaries are reported as errors.
    --nostrict_test_suite: If true, the tests() expression gives an error if it encounters a test_suite containing non-test targets.
    --nouse_target_platform_for_tests: If true, use the target platform for running tests rather than the test exec group.
    --noverbose_visibility_errors: If enabled, visibility errors include additional diagnostic information.
    --noxml:default_values: If true, rule attributes whose value is not explicitly specified in the BUILD file are printed; otherwise they are omitted.
    --noxml:line_numbers: If true, XML output contains line numbers. Disabling this option may make diffs easier to read.  This option is only applicable to --output=xml.
    --null=: Whether each format is terminated with \\0 instead of newline.
    --order_output=: Output the results unordered (no), dependency-ordered (deps), or fully ordered (full). The default is 'auto', meaning that results are output either dependency-ordered or fully ordered, depending on the output formatter (dependency-ordered for proto, minrank, maxrank, and graph, fully ordered for all others). When output is fully ordered, nodes are printed in a fully deterministic (total) order. First, all nodes are sorted alphabetically. Then, each node in the list is used as the start of a post-order depth-first search in which outgoing edges to unvisited nodes are traversed in alphabetical order of the successor nodes. Finally, nodes are printed in the reverse of the order in which they were visited.
    --order_results=: Output the results in dependency-ordered (default) or unordered fashion. The unordered output is faster but only supported when --output is not minrank, maxrank, or graph.
    --output=: 'The format in which the query results should be printed. Allowed values for query are: build, graph, streamed_jsonproto, label, label_kind, location, maxrank, minrank, package, proto, streamed_proto, xml.'
