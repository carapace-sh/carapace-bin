# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: mod
description: Queries the Bzlmod external dependency graph
documentation:
    command: Query the Bzlmod external dependency graph. Inspects resolved modules, their versions, and dependency relationships managed by Bzlmod (the modern external dependency system in Bazel). Supports graph, path, explain, and all queries.
