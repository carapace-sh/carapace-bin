    --base_module=: Specify a module relative to which the specified target repos will be interpreted.
    --build_runfile_links: If true, build runfiles symlink forests for all targets.  If false, write them only when required by a local action, test or run command.
    --build_runfile_manifests: If true, write runfiles manifests for all targets. If false, omit them. Local tests will fail to run when false.
