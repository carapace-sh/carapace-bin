    --experimental_allow_map_directory: If enabled, Bazel allows the use of ctx.actions.map_directory(). This allows for the creation of actions based on the files in a directory through a user defined Starlark function and a <code>template_ctx</code> that supports basic action generation APIs.
    --experimental_check_external_other_files: Check for modifications made to the non-output, non-repo external files, e.g. host files.
    --experimental_check_output_files: Check for modifications made to the output files of a build. Consider setting this flag to false if you don't expect these files to change outside of bazel since it will speed up subsequent runs as they won't have to check a previous run's cache.
    --experimental_collect_code_coverage_for_generated_files: If specified, Bazel will also generate collect coverage information for generated files.
