# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: bazel
aliases:
    - bazelisk
description: build system
flags:
    --autodetect_server_javabase: When --noautodetect_server_javabase is passed, Bazel does not fall back to the local JDK for running the bazel server and instead exits.
    --batch: If set, Bazel will be run as just a client process without a server, instead of in the standard client/server mode. This is deprecated and will be removed, please prefer shutting down the server explicitly if you wish to avoid lingering servers.
    --batch_cpu_scheduling: Only on Linux; use 'batch' CPU scheduling for Blaze. This policy is useful for workloads that are non-interactive, but do not want to lower their nice value. See 'man 2 sched_setscheduler'. If false, then Bazel does not perform a system call.
    --bazelrc=*: <path>The location of the user .bazelrc file containing default values of Bazel options.
    --block_for_lock: When --noblock_for_lock is passed, Bazel does not wait for a running command to complete, but instead exits immediately.
    --client_debug: If true, log debug information from the client to stderr. Changing this option will not cause the server to restart.
    --command_port=: Port to start up the gRPC command server on. If 0, let the kernel choose.
    --connect_timeout_secs=: The amount of time the client waits for each attempt to connect to the server
    --default_system_javabase=: The root of the user's local JDK install, to be used as the default target javabase and as a fall-back host_javabase. This is not the embedded JDK.
    --digest_function=: The hash function to use when computing file digests.
    --experimental_cgroup_parent=: <path>The cgroup where to start the bazel server as an absolute path. The server process will be started in the specified cgroup for each supported controller. For example, if the value of this flag is /build/bazel and the cpu and memory controllers are mounted respectively on /sys/fs/cgroup/cpu and /sys/fs/cgroup/memory, the server will be started in the cgroups /sys/fs/cgroup/cpu/build/bazel and /sys/fs/cgroup/memory/build/bazel.It is not an error if the specified cgroup is not writable for one or more of the controllers. This options does not have any effect on platforms that do not support cgroups.
    --experimental_run_in_user_cgroup: If true, the Bazel server will be run with systemd-run, and the user will own the cgroup. This flag only takes effect on Linux.
    --extra_classpath=: A colon-separated list of classpath entries to be added to the classpath of the Bazel server.
    --failure_detail_out=: <path>If set, specifies a location to write a failure_detail protobuf message if the server experiences a failure and cannot report it via gRPC, as normal. Otherwise, the location will be ${OUTPUT_BASE}/failure_detail.rawproto.
    --fatal_event_bus_exceptions: Whether or not to exit if an exception is thrown by an internal EventBus handler. No-op if --fatal_async_exceptions_exclusions is available; that flag's behavior is preferentially used.
    --home_rc: Whether or not to look for the home bazelrc file at `$HOME/.bazelrc`
    --host_jvm_args=*: <jvm_arg>Flags to pass to the JVM executing Blaze.
    --host_jvm_debug=: Convenience option to add some additional JVM startup flags, which cause the JVM to wait during startup until you connect from a JDWP-compliant debugger (like Eclipse) to port 5005.
    --idle_server_tasks: Run System.gc() when the server is idle
    --ignore_all_rc_files: Disables all rc files, regardless of the values of other rc-modifying flags, even if these flags come later in the list of startup options.
    --install_base=: This launcher option is intended for use only by tests.
    --install_md5=: This launcher option is intended for use only by tests.
    --invocation_policy=: A base64-encoded-binary-serialized or text-formated invocation_policy.InvocationPolicy proto. Unlike other options, it is an error to specify --invocation_policy multiple times.
    --io_nice_level=: '{-1,0,1,2,3,4,5,6,7}Only on Linux; set a level from 0-7 for best-effort IO scheduling using the sys_ioprio_set system call. 0 is highest priority, 7 is lowest. The anticipatory scheduler may only honor up to priority 4. If set to a negative value, then Bazel does not perform a system call.'
    --local_startup_timeout_secs=: The maximum amount of time the client waits to connect to the server
    --lock_install_base: Whether the server should hold a lock on the install base while running, to prevent another server from attempting to garbage collect it.
    --macos_qos_class=: 'Sets the QoS service class of the %{product} server when running on macOS. This flag has no effect on all other platforms but is supported to ensure rc files can be shared among them without changes. Possible values are: user-interactive, user-initiated, default, utility, and background.'
    --max_idle_secs=: <integer>The number of seconds the build server will wait idling before shutting down. Zero means that the server will never shutdown. This is only read on server-startup, changing this option will not cause the server to restart.
    --noautodetect_server_javabase: When --noautodetect_server_javabase is passed, Bazel does not fall back to the local JDK for running the bazel server and instead exits.
    --nobatch: If set, Bazel will be run as just a client process without a server, instead of in the standard client/server mode. This is deprecated and will be removed, please prefer shutting down the server explicitly if you wish to avoid lingering servers.
    --nobatch_cpu_scheduling: Only on Linux; use 'batch' CPU scheduling for Blaze. This policy is useful for workloads that are non-interactive, but do not want to lower their nice value. See 'man 2 sched_setscheduler'. If false, then Bazel does not perform a system call.
    --noblock_for_lock: When --noblock_for_lock is passed, Bazel does not wait for a running command to complete, but instead exits immediately.
    --noclient_debug: If true, log debug information from the client to stderr. Changing this option will not cause the server to restart.
    --noexperimental_run_in_user_cgroup: If true, the Bazel server will be run with systemd-run, and the user will own the cgroup. This flag only takes effect on Linux.
    --nofatal_event_bus_exceptions: Whether or not to exit if an exception is thrown by an internal EventBus handler. No-op if --fatal_async_exceptions_exclusions is available; that flag's behavior is preferentially used.
    --nohome_rc: Whether or not to look for the home bazelrc file at `$HOME/.bazelrc`
    --noidle_server_tasks: Run System.gc() when the server is idle
    --noignore_all_rc_files: Disables all rc files, regardless of the values of other rc-modifying flags, even if these flags come later in the list of startup options.
    --nolock_install_base: Whether the server should hold a lock on the install base while running, to prevent another server from attempting to garbage collect it.
    --nopreemptible: If true, the command can be preempted if another command is started.
    --noquiet: If true, no informational messages are emitted on the console, only errors. Changing this option will not cause the server to restart.
    --noshutdown_on_low_sys_mem: If max_idle_secs is set and the build server has been idle for a while, shut down the server when the system is low on free RAM. Linux and MacOS only.
    --nosystem_rc: Whether or not to look for the system-wide bazelrc.
    --nounlimit_coredumps: Raises the soft coredump limit to the hard limit to make coredumps of the server (including the JVM) and the client possible under common conditions. Stick this flag in your bazelrc once and forget about it so that you get coredumps when you actually encounter a condition that triggers them.
    --nowindows_enable_symlinks: If true, real symbolic links will be created on Windows instead of file copying. Requires Windows developer mode to be enabled and Windows 10 version 1703 or greater.
    --noworkspace_rc: Whether or not to look for the workspace bazelrc file at `$workspace/.bazelrc`
    --nowrite_command_log: 'WARNING: This option is deprecated and will be removed soon. Please use the command option instead.'
    --option_sources=: ""
    --output_base=: '<path>If set, specifies the output location to which all build output will be written. Otherwise, the location will be ${OUTPUT_ROOT}/_blaze_${USER}/${MD5_OF_WORKSPACE_ROOT}. Note: If you specify a different option from one to the next Bazel invocation for this value, you''ll likely start up a new, additional Bazel server. Bazel starts exactly one server per specified output base. Typically there is one output base per workspace - however, with this option you may have multiple output bases per workspace and thereby run multiple builds for the same client on the same machine concurrently. See ''bazel help shutdown'' on how to shutdown a Bazel server.'
    --output_user_root=: <path>The user-specific directory beneath which all build outputs are written; by default, this is a function of $USER, but by specifying a constant, build outputs can be shared between collaborating users.
    --preemptible: If true, the command can be preempted if another command is started.
    --product_name=: The name of the build system. It is used as part of the name of the generated directories (e.g. productName-bin for binaries) as well as for printing error messages and logging
    --quiet: If true, no informational messages are emitted on the console, only errors. Changing this option will not cause the server to restart.
    --server_javabase=: <jvm path>Path to the JVM used to execute Bazel itself.
    --server_jvm_out=: <path>The location to write the server's JVM's output. If unset then defaults to a location in output_base.
    --shutdown_on_low_sys_mem: If max_idle_secs is set and the build server has been idle for a while, shut down the server when the system is low on free RAM. Linux and MacOS only.
    --system_rc: Whether or not to look for the system-wide bazelrc.
    --unix_digest_hash_attribute_name=: The name of an extended attribute that can be placed on files to store a precomputed copy of the file's hash, corresponding with --digest_function. This option can be used to reduce disk I/O and CPU load caused by hash computation. This extended attribute is checked on all source files and output files, meaning that it causes a significant number of invocations of the getxattr() system call.
    --unlimit_coredumps: Raises the soft coredump limit to the hard limit to make coredumps of the server (including the JVM) and the client possible under common conditions. Stick this flag in your bazelrc once and forget about it so that you get coredumps when you actually encounter a condition that triggers them.
    --windows_enable_symlinks: If true, real symbolic links will be created on Windows instead of file copying. Requires Windows developer mode to be enabled and Windows 10 version 1703 or greater.
    --workspace_directory=: The root of the workspace, that is, the directory that Bazel uses as the root of the build. This flag is only to be set by the bazel client.
    --workspace_rc: Whether or not to look for the workspace bazelrc file at `$workspace/.bazelrc`
    --write_command_log: 'WARNING: This option is deprecated and will be removed soon. Please use the command option instead.'
