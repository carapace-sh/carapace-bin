# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: help
description: Prints help for commands, or the index.
flags:
    --help_verbosity=: Select the verbosity of the help command.
    --short=: Show only the names of the options, not their types or meanings.
    -l, --long=: Show full description of each option, instead of just its name.
