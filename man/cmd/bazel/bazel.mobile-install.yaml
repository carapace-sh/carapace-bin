# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: mobile-install
description: Installs targets to mobile devices.
flags:
    --adb=: adb binary to use for the 'mobile-install' command. If unspecified, the one in the Android SDK specified by the --android_sdk_channel command line option (or  the default SDK if --android_sdk_channel is not specified) is used.
    --adb_arg=*: Extra arguments to pass to adb. Usually used to designate a device to install to.
    --allow_analysis_cache_discard: If discarding the analysis cache due to a change in the build system, setting this
    --allow_one_action_on_resource_unavailable: If set, allow at least one action to run even if the resource is not enough or unavailable.
    --allowed_local_actions_regex=: A regex whitelist for action types which may be run locally. If unset, all actions are allowed to execute locally
    --allowed_strategies_by_exec_platform=*: Filters spawn strategies by the execution platform without affecting order.
    --analyze: Execute the loading/analysis phase; this is the usual behaviour. Specifying `--noanalyze`
    --aspects=*: Comma-separated list of aspects to be applied to top-level targets. In the list, if
    --aspects_parameters=*: Specifies the values of the command-line aspects parameters. Each parameter value is
    --build: Execute the build; this is the usual behaviour.
    --build_event_upload_max_retries=: The maximum number of times Bazel should retry uploading a build event.
    --build_manual_tests: Forces test targets tagged 'manual' to be built. 'manual' tests are excluded from processing. This option forces them to be built (but not executed).
    --build_tag_filters=: Specifies a comma-separated list of tags. Each tag can be optionally preceded with '-' to specify excluded tags. Only those targets will be built that contain at least one included tag and do not contain any excluded tags. This option does not affect the set of tests executed with the 'test' command; those are be governed by the test filtering options, for example '--test_tag_filters'
    --build_tests_only: If specified, only *_test and test_suite rules will be built and other targets specified on the command line will be ignored. By default everything that was requested will be built.
    --cache_computed_file_digests=: If greater than 0, configures Bazel to cache file digests in memory based on their metadata instead of recomputing the digests from disk every time they are needed. Setting this to 0 ensures correctness because not all file changes can be noted from file metadata. When not 0, the number indicates the size of the cache as the number of file digests to be cached.
    --check_tests_up_to_date: Don't run tests, just check if they are up-to-date.  If all tests results are up-to-date, the testing completes successfully.  If any test needs to be built or executed, an error is reported and the testing fails.  This option implies --check_up_to_date behavior.
    --check_up_to_date: Don't perform the build, just check if it is up-to-date.  If all targets are up-to-date, the build completes successfully.  If any step needs to be executed an error is reported and the build fails.
    --compile_one_dependency: Compile a single dependency of the argument files. This is useful for syntax checking source files in IDEs, for example, by rebuilding a single target that depends on the source file to detect errors as early as possible in the edit/build/test cycle. This argument affects the way all non-flag arguments are interpreted; instead of being targets to build they are source filenames.  For each source filename an arbitrary target that depends on it will be built.
    --debug_app=: Whether to wait for the debugger before starting the app.
    --default_visibility=: Default visibility for packages that don't set it explicitly ('public' or 'private').
    --deleted_packages=*: A comma-separated list of names of packages which the build system will consider non-existent, even if they are visible somewhere on the package path.
    --device=: The adb device serial number. If not specified, the first device will be used.
    --directory_creation_cache=: Describes the cache used to store known regular directories as they're created. Parent directories of output files are created on-demand during action execution.
    --discard_analysis_cache: Discard the analysis cache immediately after the analysis phase completes. Reduces memory usage by ~10%, but makes further incremental builds slower.
    --enforce_project_configs: If true, interactive builds may only pass the --scl_config build flag; they may not use any other build flags. --scl_config must be set to an officially suported project configuration. Supported configurations are defined in the target's PROJECT.scl, which can be found by walking up the target's packagge path. See b/324126745.
    --execution_log_binary_file=: 'Log the executed spawns into this file as length-delimited SpawnExec protos, according to src/main/protobuf/spawn.proto. Prefer --execution_log_compact_file, which is significantly smaller and cheaper to produce. Related flags: --execution_log_compact_file (compact format; mutually exclusive), --execution_log_json_file (text JSON format; mutually exclusive), --execution_log_sort (whether to sort the execution log), --subcommands (for displaying subcommands in terminal output).'
    --execution_log_compact_file=: 'Log the executed spawns into this file as length-delimited ExecLogEntry protos, according to src/main/protobuf/spawn.proto. The entire file is zstd compressed. Related flags: --execution_log_binary_file (binary protobuf format; mutually exclusive), --execution_log_json_file (text JSON format; mutually exclusive), --subcommands (for displaying subcommands in terminal output).'
    --execution_log_json_file=: 'Log the executed spawns into this file as newline-delimited JSON representations of SpawnExec protos, according to src/main/protobuf/spawn.proto. Prefer --execution_log_compact_file, which is significantly smaller and cheaper to produce. Related flags: --execution_log_compact_file (compact format; mutually exclusive), --execution_log_binary_file (binary protobuf format; mutually exclusive), --execution_log_sort (whether to sort the execution log), --subcommands (for displaying subcommands in terminal output).'
    --execution_log_sort: Whether to sort the execution log, making it easier to compare logs across invocations. Set to false to avoid potentially significant CPU and memory usage at the end of the invocation, at the cost of producing the log in nondeterministic execution order. Only applies to the binary and JSON formats; the compact format is never sorted.
    --expand_test_suites: 'Expand test_suite targets into their constituent tests before analysis. When this flag is turned on (the default), negative target patterns will apply to the tests belonging to the test suite, otherwise they will not. Turning off this flag is useful when top-level aspects are applied at command line: then they can analyze test_suite targets.'
    --experimental_active_directories=: Active directories for Skyfocus and remote analysis caching. Specify as comma-separated workspace root-relative paths. This is a stateful flag. Defining one persists it for subsequent invocations, until it is redefined with a new set.
    --experimental_analysis_cache_enable_metadata_queries: A flag to switch on/off inserting and querying the metadata db (b/425247333).
    --experimental_analysis_cache_key_distinguisher_for_testing=: An opaque string used as part of the cache key. Should only be used for testing.
    --experimental_analysis_cache_server_checksum_override=: 'If set, Blaze will use this checksum to look up entries in the remote analysis cache and not its own. WARNING: this might result in incorrect behavior. Only for debugging. It''s best if the difference between the writer and the reader is only additional logging. In particular, the data structures that are being serialized  and the observable behavior of the serialization machinery must not change.'
    --experimental_analysis_cache_service=: Locator for the AnalysisCacheService instance.
    --experimental_aquery_dump_after_build_format=: Writes the state of Skyframe (which includes previous invocations on this blaze instance
    --experimental_aquery_dump_after_build_output_file=: Specify the output file for the aquery dump after a build. Use in conjunction with
    --experimental_async_execution: If set to true, Bazel is allowed to run action in a virtual thread. The number of
    --experimental_async_execution_max_concurrent_actions=: The number of maximum concurrent actions to run with async execution. If the value is
    --experimental_bep_target_summary: Whether to publish `TargetSummary` events.
    --experimental_build_event_expand_filesets: If true, expand Filesets in the BEP when presenting output files.
    --experimental_build_event_output_group_mode=*: Specify how an output group's files will be represented in `TargetComplete`/`AspectComplete`
    --experimental_build_event_upload_retry_minimum_delay=: 'Initial, minimum delay for exponential backoff retries when BEP upload fails. (exponent: 1.6)'
    --experimental_build_event_upload_strategy=: Selects how to upload artifacts referenced in the build event protocol. In Bazel
    --experimental_check_external_other_files: Check for modifications made to the non-output, non-repo external files, e.g. host files.
    --experimental_check_output_files: Check for modifications made to the output files of a build. Consider setting this flag to false if you don't expect these files to change outside of bazel since it will speed up subsequent runs as they won't have to check a previous run's cache.
    --experimental_convenience_symlinks=: This flag controls how the convenience symlinks (the symlinks that appear in the
    --experimental_convenience_symlinks_bep_event: This flag controls whether or not we will post the build event
    --experimental_cpu_load_scheduling: Enables the experimental local execution scheduling based on CPU load, not estimation of actions one by one.  Experimental scheduling have showed the large benefit on a large local builds on a powerful machines with the large number of cores. Reccommended to use with --local_resources=cpu=HOST_CPUS
    --experimental_cpu_load_scheduling_window_size=: The size of window during experimental scheduling of action based on CPU load. Make sense to define only when flag --experimental_cpu_load_scheduling is enabled.
    --experimental_enable_critical_path_profiling: If set (the default), critical path profiling is enabled for the execution phase. This has a slight overhead in RAM and CPU, and may prevent Bazel from making certain aggressive RAM optimizations in some cases.
    --experimental_enable_skyfocus: If true, enable the use of --experimental_active_directories to reduce Bazel's memory footprint for incremental builds. This feature is known as Skyfocus.
    --experimental_extra_action_filter=: Deprecated in favor of aspects. Filters set of targets to schedule extra_actions for.
    --experimental_extra_action_top_level_only: Deprecated in favor of aspects. Only schedules extra_actions for top level targets.
    --experimental_frontier_violation_check=: Strategies to handle potential incorrectness from changes beyond the frontier (i.e. outside the active directories)
    --experimental_frontier_violation_verbose: If true, Bazel will print instructions for fixing Skycache violations
    --experimental_fsvc_threads=: The number of threads that are used by the `FileSystemValueChecker`.
    --experimental_lazy_macro_expansion_packages=: List of packages in which symbolic macro are expanded only if necessary.
    --experimental_local_lockfree_output: When true, the local spawn runner doesn't lock the output tree during dynamic execution. Instead, spawns are allowed to execute until they are explicitly interrupted by a faster remote action.
    --experimental_local_retries_on_crash=: Number of times to retry a local action when we detect that it crashed. This exists to workaround a bug in OSXFUSE which is tickled by the use of the dynamic scheduler and --experimental_local_lockfree_output due to constant process churn. The bug can be triggered by a cancelled process that ran *before* the process we are trying to run, introducing corruption in its file reads.
    --experimental_materialize_param_files_directly: If materializing param files, do so with direct writes to disk.
    --experimental_max_directories_to_eagerly_visit_in_globbing=: If non-negative, the first time a glob is evaluated in a package, the subdirectories of the package will be traversed in order to warm filesystem caches and compensate for lack of parallelism in globbing. At most this many directories will be visited.
    --experimental_merged_skyframe_analysis_execution: If this flag is set, the analysis and execution phases of Skyframe are merged.
    --experimental_oom_sensitive_skyfunctions_semaphore_size=: 'Sets the size of the semaphore used to prevent SkyFunctions with large peak memory requirement from OOM-ing blaze. A value of 0 indicates that no semaphore should be used. Example value: `HOST_CPUS*0.5`.'
    --experimental_process_wrapper_graceful_sigterm: When true, make the process-wrapper propagate SIGTERMs (used by the dynamic scheduler to stop process trees) to the subprocesses themselves, giving them the grace period in --local_termination_grace_seconds before forcibly sending a SIGKILL.
    --experimental_remote_analysis_cache=: The URL for the remote analysis caching backend.
    --experimental_remote_analysis_cache_concurrency=: Target concurrency for remote analysis caching RPCs.
    --experimental_remote_analysis_cache_deadline=: Deadline to use for remote analysis cache operations.
    --experimental_remote_analysis_cache_max_batch_size=: Batch size limit for remote analysis caching RPCs.
    --experimental_remote_analysis_cache_mode=: The transport direction for the remote analysis cache.
    --experimental_remote_analysis_unreachable_cache_retry_interval=: How long to wait before retrying a cache get request that failed due to an UNREACHABLE channel. This is a workaround for the client library reporting 'ready' prematurely.
    --experimental_remote_analysis_write_proxy=: The address of the SkycacheStorageWriteProxyService. If set, this service will be used for uploading analysis cache data.
    --experimental_remote_cache_eviction_retries=: The maximum number of attempts to retry if the build encountered a transient remote cache error that would otherwise fail the build. Applies for example when artifacts are evicted from the remote cache, or in certain cache failure conditions. A new invocation id will be generated for each attempt.
    --experimental_run_bep_event_include_residue: Whether to include the command-line residue in run build events which could contain the residue. By default, the residue is not included in run command build events that could contain the residue.
    --experimental_skyfocus_dump_keys=: For debugging Skyfocus. Dump the focused SkyKeys (roots, leafs, focused deps, focused rdeps).
    --experimental_skyfocus_dump_post_gc_stats: For debugging Skyfocus. If enabled, trigger manual GC before/after focusing to report heap sizes reductions. This will increase the Skyfocus latency.
    --experimental_skyframe_cpu_heavy_skykeys_thread_pool_size=: 'If set to a positive value (e.g. `HOST_CPUS*1.5`), Skyframe will run the loading/analysis phase with 2 separate thread pools: 1 with `<value>` threads (ideally close to `HOST_CPUS`) reserved for CPU-heavy SkyKeys, and 1 "standard" thread pool (whose size is controlled by `--loading_phase_threads`) for the rest.'
    --experimental_skyframe_error_handling_refactor: 'Used solely for the safe rollout of simplifying Skyframe error handling. This will beremoved once the rollout is complete (expected timeframe: 1 release)'
    --experimental_skyframe_memory_dump=: Dump the memory use of individual nodes in the Skyframe graph after the build. This
    --experimental_skyframe_target_pattern_evaluator: Use the Skyframe-based target pattern evaluator; implies --experimental_interleave_loading_and_analysis.
    --experimental_skymeld_analysis_overlap_percentage=: The value represents the % of the analysis phase which will be overlapped with the execution phase. A value of x means Skyframe will queue up execution tasks and wait until there's x% of the top level target left to be analyzed before allowing them to launch. When the value is 0%, we'd wait for all analysis to finish before executing (no overlap). When it's 100%, the phases are free to overlap as much as they can.
    --experimental_stats_summary: Enable a modernized summary of the build stats.
    --experimental_stream_log_file_uploads: Stream log file uploads directly to the remote storage rather than writing them to disk.
    --experimental_use_validation_aspect: Whether to run validation actions using aspect (for parallelism with tests).
    --explain=: Causes the build system to explain each executed step of the build. The explanation is written to the specified log file.
    --fetch: Allows the command to fetch external dependencies. If set to false, the command will utilize any cached version of the dependency, and if none exists, the command will result in failure.
    --flaky_test_attempts=*: 'Each test will be retried up to the specified number of times in case of any test failure. Tests that required more than one attempt to pass are marked as ''FLAKY'' in the test summary. Normally the value specified is just an integer or the string ''default''. If an integer, then all tests will be run up to N times. If ''default'', then only a single test attempt will be made for regular tests and three for tests marked explicitly as flaky by their rule (flaky=1 attribute). Alternate syntax: regex_filter@flaky_test_attempts. Where flaky_test_attempts is as above and regex_filter stands for a list of include and exclude regular expression patterns (Also see --runs_per_test). Example: --flaky_test_attempts=//foo/.*,-//foo/bar/.*@3 deflakes all tests in //foo/ except those under foo/bar three times. This option can be passed multiple times. The most recently passed argument that matches takes precedence. If nothing matches, behavior is as if ''default'' above.'
    --genrule_strategy=: Specify how to execute genrules. This flag will be phased out. Instead, use --spawn_strategy=<value> to control all actions or --strategy=Genrule=<value> to control genrules only.
    --hide_aspect_results=: Comma-separated list of aspect names to not display in results (see `--show_result`).
    --incompatible_config_setting_private_default_visibility: If incompatible_enforce_config_setting_visibility=false, this is a noop. Else, if this flag is false, any config_setting without an explicit visibility attribute is //visibility:public. If this flag is true, config_setting follows the same visibility logic as all other rules. See https://github.com/bazelbuild/bazel/issues/12933.
    --incompatible_enforce_config_setting_visibility: If true, enforce config_setting visibility restrictions. If false, every config_setting is visible to every target. See https://github.com/bazelbuild/bazel/issues/12932.
    --incompatible_skip_genfiles_symlink: If set to true, the genfiles symlink will not be created. For more information, see
    --incremental: Whether to do an incremental install. If true, try to avoid unnecessary additional work by reading the state of the device the code is to be installed on and using that information to avoid unnecessary work. If false (the default), always do a full install.
    --incremental_install_verbosity=: The verbosity for incremental install. Set to 1 for debug logging.
    --legacy_globbing_threads=: Number of threads to use for glob evaluation. Takes an integer, or a keyword ("auto", "HOST_CPUS", "HOST_RAM"), optionally followed by an operation ([-|*]<float>) eg. "auto", "HOST_CPUS*.5". "auto" means to use a reasonable value derived from the machine's hardware profile (e.g. the number of processors).
    --legacy_important_outputs: Use this to suppress generation of the legacy `important_outputs` field in the
    --loading_phase_threads=: Number of parallel threads to use for the loading/analysis phase.Takes an integer, or a keyword ("auto", "HOST_CPUS", "HOST_RAM"), optionally followed by an operation ([-|*]<float>) eg. "auto", "HOST_CPUS*.5". "auto" sets a reasonable default based on host resources. Must be at least 1.
    --local_resources=*: 'Set the number of resources available to Bazel. Takes in an assignment to a float or HOST_RAM/HOST_CPUS, optionally followed by [-|*]<float> (eg. memory=HOST_RAM*.5 to use half the available RAM). Can be used multiple times to specify multiple types of resources. Bazel will limit concurrently running actions based on the available resources and the resources required. Tests can declare the amount of resources they need by using a tag of the "resources:<resource name>:<amount>" format. '
    --local_termination_grace_seconds=: Time to wait between terminating a local process due to timeout and forcefully shutting it down.
    --local_test_jobs=: The max number of local test jobs to run concurrently. Takes an integer, or a keyword ("auto", "HOST_CPUS", "HOST_RAM"), optionally followed by an operation ([-|*]<float>) eg. "auto", "HOST_CPUS*.5". 0 means local resources will limit the number of local test jobs to run concurrently instead. Setting this greater than the value for --jobs is ineffectual.
    --materialize_param_files: Writes intermediate parameter files to output tree even when using remote action execution or caching. Useful when debugging actions. This is implied by --subcommands and --verbose_failures.
    --max_config_changes_to_show=: When discarding the analysis cache due to a change in the build options, displays up to the given number of changed option names. If the number given is -1, all changed options will be displayed.
    --max_test_output_bytes=: Specifies maximum per-test-log size that can be emitted when --test_output is 'errors' or 'all'. Useful for avoiding overwhelming the output with excessively noisy test output. The test header is included in the log size. Negative values imply no limit. Output is all or nothing.
