    --output_groups=*: A list of comma-separated output group names, each of which optionally prefixed by a `+`
    --output_tree_tracking: If set, tell the output service (if any) to track when files in the output tree have been modified externally (not by the build system). This should improve incremental build speed when an appropriate output service is enabled.
    --package_path=: A colon-separated list of where to look for packages. Elements beginning with '%workspace%' are relative to the enclosing workspace. If omitted or empty, the default is the output of 'bazel info default-package-path'.
    --progress_report_interval=: The number of seconds to wait between reports on still running jobs. The
    --remote_analysis_json_log=: If set, a JSON file is written to this location that contains a detailed log of the behavior of remote analysis caching. It's interpreted as a path relative to the current working directory.
    --rewind_lost_inputs: Whether to use action rewinding to recover from lost inputs.
    --run_in_client: If true, the mobile-install deployer command will be sent to the bazel client for execution. Useful for configurations where the bazel client is on a different machine than the bazel server.
    --run_validations: Whether to run validation actions as part of the build. See [Validation Actions].
    --serialized_frontier_profile=: Dump a profile of serialized frontier bytes. Specifies the output path.
    --show_loading_progress: If enabled, causes Bazel to print "Loading package:" messages.
    --show_result=: Show the results of the build. For each target, state whether or not it was brought
    --skip_incompatible_explicit_targets: Skip incompatible targets that are explicitly listed on the command line.
    --spawn_strategy=: Specify how spawn actions are executed by default. Accepts a comma-separated list of strategies from highest to lowest priority. For each action Bazel picks the strategy with the highest priority that can execute the action. The default value is "remote,worker,sandboxed,local". See https://blog.bazel.build/2019/06/19/list-strategy.html for details.
    --split_apks: Whether to use split apks to install and update the application on the device. Works only with devices with Marshmallow or later
    --start=: How the app should be started after installing it. Set to WARM to preserve and restore application state on incremental installs.
    --start_app=: Whether to start the app after installing it.
    --strategy=*: Specify how to distribute compilation of other spawn actions. Accepts a comma-separated list of strategies from highest to lowest priority. For each action Bazel picks the strategy with the highest priority that can execute the action. The default value is "remote,worker,sandboxed,local". This flag overrides the values set by --spawn_strategy (and --genrule_strategy if used with mnemonic Genrule). See https://blog.bazel.build/2019/06/19/list-strategy.html for details.
    --strategy_regexp=*: 'Override which spawn strategy should be used to execute spawn actions that have descriptions matching a certain regex_filter. See --per_file_copt for details onregex_filter matching. The last regex_filter that matches the description is used. This option overrides other flags for specifying strategy. Example: --strategy_regexp=//foo.*\\.cc,-//foo/bar=local means to run actions using local strategy if their descriptions match //foo.*.cc but not //foo/bar. Example: --strategy_regexp=''Compiling.*/bar=local  --strategy_regexp=Compiling=sandboxed will run ''Compiling //foo/bar/baz'' with the ''local'' strategy, but reversing the order would run it with ''sandboxed''. '
    --symlink_prefix=: The prefix that is prepended to any of the convenience symlinks that are created
    --target_pattern_file=: If set, build will read patterns from the file named here, rather than on the command line. It is an error to specify a file here as well as command-line patterns.
    --test_keep_going: When disabled, any non-passing test will cause the entire build to stop. By default all tests are run, even if some do not pass.
    --test_lang_filters=: Specifies a comma-separated list of test languages. Each language can be optionally preceded with '-' to specify excluded languages. Only those test targets will be found that are written in the specified languages. The name used for each language should be the same as the language prefix in the *_test rule, e.g. one of 'cc', 'java', 'py', etc. This option affects --build_tests_only behavior and the test command.
    --test_output=: Specifies desired output mode. Valid values are 'summary' to output only test status summary, 'errors' to also print test logs for failed tests, 'all' to print logs for all tests and 'streamed' to output logs for all tests in real time (this will force tests to be executed locally one at a time regardless of --test_strategy value).
    --test_size_filters=: Specifies a comma-separated list of test sizes. Each size can be optionally preceded with '-' to specify excluded sizes. Only those test targets will be found that contain at least one included size and do not contain any excluded sizes. This option affects --build_tests_only behavior and the test command.
    --test_strategy=: Specifies which strategy to use when running tests.
    --test_summary=: Specifies the desired format of the test summary. Valid values are 'short' to print information only about tests executed, 'terse', to print information only about unsuccessful tests that were run, 'detailed' to print detailed information about failed test cases, 'testcase' to print summary in test case resolution, do not print detailed information about failed test cases and 'none' to omit the summary.
    --test_tag_filters=: Specifies a comma-separated list of test tags. Each tag can be optionally preceded with '-' to specify excluded tags. Only those test targets will be found that contain at least one included tag and do not contain any excluded tags. This option affects --build_tests_only behavior and the test command.
    --test_timeout_filters=: Specifies a comma-separated list of test timeouts. Each timeout can be optionally preceded with '-' to specify excluded timeouts. Only those test targets will be found that contain at least one included timeout and do not contain any excluded timeouts. This option affects --build_tests_only behavior and the test command.
    --test_tmpdir=: Specifies the base temporary directory for 'bazel test' to use.
    --use_action_cache: Whether to use the action cache
    --verbose_failures: If a command fails, print out the full command line.
    --version_window_for_dirty_node_gc=: Nodes that have been dirty for more than this many versions will be deleted from the graph upon the next update. Values must be non-negative long integers, or -1 indicating the maximum possible window.
    -j, --jobs=: The number of concurrent jobs to run. Takes an integer, or a keyword ("auto", "HOST_CPUS", "HOST_RAM"), optionally followed by an operation ([-|*]<float>) eg. "auto", "HOST_CPUS*.5". Values must be between 1 and 5000. Values above 2500 may cause memory issues. "auto" calculates a reasonable default based on host resources.
    -k, --keep_going: Continue as much as possible after an error.  While the target that failed and those that depend on it cannot be analyzed, other prerequisites of these targets can be.
    -s, --subcommands=: 'Display the subcommands executed during a build. Related flags: --execution_log_json_file, --execution_log_binary_file (for logging subcommands to a file in a tool-friendly format).'
