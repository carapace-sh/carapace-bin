dvorak: |
  Dvorak layout. Places the most common keys on the home row for faster touch typing. The ANSI Dvorak variant — the most widely used Dvorak layout.
colemak: |
  Colemak layout. Modern alternative to QWERTY that keeps common keys on the home row while minimizing changes from QWERTY. Easier to learn than Dvorak for QWERTY typists.
